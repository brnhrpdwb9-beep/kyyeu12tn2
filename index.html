<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050918" />
  <title>Hệ Hành Tinh Tin Học</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg-1:#02030a;
      --bg-2:#050918;
      --bg-3:#0a1230;
      --bg-4:#130f2d;
      --text:#eef4ff;
      --muted:#aab7df;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      min-height:100%;
      font-family:"Inter",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 15% 18%, rgba(93,126,255,.18), transparent 18%),
        radial-gradient(circle at 82% 16%, rgba(87,226,255,.12), transparent 18%),
        radial-gradient(circle at 50% 76%, rgba(201,105,255,.10), transparent 22%),
        radial-gradient(circle at 48% 50%, rgba(255,255,255,.025), transparent 26%),
        linear-gradient(135deg,var(--bg-1),var(--bg-2) 40%,var(--bg-3) 72%,var(--bg-4));
      overflow-x:hidden;
    }
    body{position:relative}
    a{color:inherit;text-decoration:none}

    .universe{
      position:fixed;
      inset:0;
      overflow:hidden;
      pointer-events:none;
      z-index:0;
    }
    .nebula,.nebula::before,.nebula::after{
      content:"";
      position:absolute;
      inset:-16%;
      filter:blur(58px);
    }
    .nebula{
      background:
        radial-gradient(circle at 15% 28%, rgba(82,110,255,.22), transparent 14%),
        radial-gradient(circle at 78% 20%, rgba(84,234,255,.14), transparent 16%),
        radial-gradient(circle at 45% 76%, rgba(192,96,255,.14), transparent 18%),
        radial-gradient(circle at 60% 48%, rgba(255,255,255,.05), transparent 7%);
      animation:driftNebula 24s ease-in-out infinite alternate;
    }
    .nebula::before{
      background:
        radial-gradient(circle at 24% 64%, rgba(109,151,255,.16), transparent 14%),
        radial-gradient(circle at 68% 58%, rgba(106,241,255,.09), transparent 14%),
        radial-gradient(circle at 88% 70%, rgba(190,117,255,.10), transparent 12%);
      mix-blend-mode:screen;
      animation:driftNebula 30s ease-in-out infinite alternate-reverse;
    }
    .nebula::after{
      background:
        radial-gradient(circle at 48% 36%, rgba(255,255,255,.07), transparent 9%),
        radial-gradient(circle at 56% 28%, rgba(100,245,255,.08), transparent 12%),
        radial-gradient(circle at 36% 84%, rgba(186,120,255,.09), transparent 14%);
      mix-blend-mode:screen;
      animation:driftNebula 36s ease-in-out infinite alternate;
    }
    .nebula-detail{
      position:absolute;
      inset:-10%;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.04), transparent 1.2%),
        radial-gradient(circle at 40% 72%, rgba(255,255,255,.03), transparent 1.4%),
        radial-gradient(circle at 70% 40%, rgba(103,231,255,.05), transparent 1.8%),
        radial-gradient(circle at 82% 60%, rgba(198,121,255,.05), transparent 1.6%);
      background-size:520px 520px,640px 640px,780px 780px,840px 840px;
      opacity:.65;
      filter:blur(2px);
      animation:driftDust 48s linear infinite;
    }
    .space-grid{
      position:absolute;
      inset:0;
      background:
        linear-gradient(rgba(130,170,255,.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(130,170,255,.045) 1px, transparent 1px);
      background-size:90px 90px;
      mask-image:radial-gradient(circle at center, rgba(0,0,0,.9), transparent 88%);
      opacity:.28;
      transform:perspective(1200px) rotateX(78deg) scale(1.8) translateY(16%);
    }
    .cosmic-dust{
      position:absolute;
      inset:0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.45), transparent),
        radial-gradient(1px 1px at 24% 66%, rgba(133,212,255,.38), transparent),
        radial-gradient(1px 1px at 48% 42%, rgba(255,255,255,.34), transparent),
        radial-gradient(1px 1px at 60% 74%, rgba(201,135,255,.30), transparent),
        radial-gradient(1px 1px at 82% 30%, rgba(255,255,255,.42), transparent),
        radial-gradient(1px 1px at 90% 64%, rgba(102,235,255,.28), transparent);
      background-size:360px 360px;
      opacity:.75;
      animation:driftDust 60s linear infinite reverse;
    }
    .stars,.stars2,.stars3{
      position:absolute;
      inset:0;
      background-repeat:repeat;
      animation-timing-function:linear;
      animation-iteration-count:infinite;
    }
    .stars{
      background-image:
        radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.5px 1.5px at 120px 80px, rgba(130,190,255,.95), transparent),
        radial-gradient(2px 2px at 250px 140px, rgba(255,255,255,.9), transparent),
        radial-gradient(1.8px 1.8px at 350px 40px, rgba(178,125,255,.95), transparent);
      background-size:800px 300px;
      animation:driftStars 90s linear infinite;
      opacity:.95;
    }
    .stars2{
      background-image:
        radial-gradient(1.2px 1.2px at 40px 60px, rgba(255,255,255,.85), transparent),
        radial-gradient(1.7px 1.7px at 200px 120px, rgba(97,231,255,.75), transparent),
        radial-gradient(1.2px 1.2px at 420px 40px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.3px 1.3px at 600px 200px, rgba(170,140,255,.8), transparent);
      background-size:900px 380px;
      animation:driftStarsReverse 130s linear infinite;
      opacity:.7;
    }
    .stars3{
      background-image:
        radial-gradient(3px 3px at 100px 90px, rgba(255,255,255,.9), transparent),
        radial-gradient(2.5px 2.5px at 500px 60px, rgba(97,231,255,.9), transparent),
        radial-gradient(3px 3px at 780px 170px, rgba(186,122,255,.85), transparent);
      background-size:1000px 420px;
      animation:twinkle 5s ease-in-out infinite alternate;
      opacity:.9;
    }

    .page{
      position:relative;
      z-index:2;
      width:min(1400px, calc(100% - 32px));
      margin:0 auto;
      padding:24px 0 80px;
    }
    .hero{
      position:relative;
      text-align:center;
      padding:42px 16px 18px;
      margin-bottom:8px;
    }
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 16px;
      border-radius:999px;
      background:linear-gradient(145deg,#101b3d,#0a122d);
      border:1px solid rgba(137,162,255,.18);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 8px 20px rgba(0,0,0,.24);
      font-size:.88rem;
      margin-bottom:18px;
    }
    .eyebrow::before{
      content:"";
      width:8px;
      height:8px;
      border-radius:50%;
      background:linear-gradient(135deg,#66dcff,#cb7bff);
      box-shadow:0 0 14px rgba(103,232,255,.8);
    }
    .hero h1{
      font-size:clamp(2rem, 4vw, 3.6rem);
      line-height:1.05;
      margin-bottom:12px;
      letter-spacing:-.03em;
      text-shadow:0 10px 30px rgba(0,0,0,.35);
    }
    .hero p{
      max-width:720px;
      margin:0 auto;
      color:var(--muted);
      line-height:1.7;
      font-size:1rem;
    }

    .galaxy-map{
      position:relative;
      height:980px;
      margin-top:26px;
      perspective:1800px;
      transform-style:preserve-3d;
      isolation:isolate;
    }
    .galaxy-glow{
      position:absolute;
      left:50%;
      top:50%;
      width:860px;
      height:860px;
      transform:translate(-50%,-50%);
      border-radius:50%;
      background:
        radial-gradient(circle, rgba(107,146,255,.14), transparent 44%),
        radial-gradient(circle, rgba(108,240,255,.10), transparent 48%),
        radial-gradient(circle, rgba(189,109,255,.12), transparent 58%);
      filter:blur(30px);
      z-index:0;
      animation:haloPulse 8s ease-in-out infinite;
    }
    .galaxy-core{
      position:absolute;
      left:50%;
      top:50%;
      width:310px;
      height:310px;
      transform:translate(-50%,-50%);
      border-radius:50%;
      background:
        radial-gradient(circle at 28% 26%, rgba(255,255,255,.98), rgba(255,255,255,.26) 8%, transparent 14%),
        radial-gradient(circle at 42% 38%, rgba(255,244,214,.56), transparent 18%),
        radial-gradient(circle at 58% 56%, rgba(110,225,255,.16), transparent 26%),
        radial-gradient(circle at 45% 45%, rgba(255,255,255,.08), transparent 62%),
        linear-gradient(145deg,#4a67da,#192b68 44%,#090f27 100%);
      box-shadow:
        inset -40px -50px 60px rgba(0,0,0,.5),
        inset 20px 20px 36px rgba(255,255,255,.10),
        0 50px 110px rgba(0,0,0,.5),
        0 0 70px rgba(101,144,255,.26),
        0 0 180px rgba(84,226,255,.14),
        0 0 260px rgba(197,119,255,.08);
      animation:coreFloat 8s ease-in-out infinite;
      z-index:1;
    }
    .core-swirl{
      position:absolute;
      left:50%;
      top:50%;
      width:580px;
      height:580px;
      transform:translate(-50%,-50%);
      border-radius:50%;
      background:
        conic-gradient(from 0deg, rgba(98,230,255,.18), transparent 70deg, rgba(201,118,255,.22) 150deg, transparent 220deg, rgba(102,141,255,.18) 300deg, transparent 360deg);
      filter:blur(30px);
      opacity:.5;
      animation:swirlSpin 22s linear infinite;
      z-index:0;
    }
    .orbit{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      border-radius:50%;
      border:1px solid rgba(255,255,255,.07);
      box-shadow:0 0 12px rgba(255,255,255,.04);
      z-index:0;
    }
    .orbit.one{width:520px;height:520px;animation:spinOrbit1 24s linear infinite}
    .orbit.two{width:760px;height:760px;animation:spinOrbit2 34s linear infinite reverse}
    .orbit.three{width:980px;height:980px;animation:spinOrbit3 42s linear infinite}

    .planet-system{
      position:relative;
      width:100%;
      height:100%;
      z-index:3;
    }
    .subject-planet{
      position:absolute;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
      z-index:4;
      transform-style:preserve-3d;
    }
    .planet-link{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
      position:relative;
    }
    .planet-link::before{
      content:"";
      position:absolute;
      width:190px;
      height:190px;
      border-radius:50%;
      background:
        radial-gradient(circle, rgba(116,160,255,.20), transparent 56%),
        radial-gradient(circle, rgba(196,122,255,.09), transparent 72%);
      filter:blur(18px);
      opacity:0;
      transition:.4s ease;
      z-index:-3;
    }
    .subject-planet:hover .planet-link::before{opacity:1;transform:scale(1.12)}

    .planet-ball{
      position:relative;
      border-radius:50%;
      transform-style:preserve-3d;
      transition:transform .35s ease, box-shadow .35s ease, filter .35s ease;
      box-shadow:
        inset -30px -34px 46px rgba(0,0,0,.48),
        inset 12px 12px 24px rgba(255,255,255,.10),
        inset -6px -8px 14px rgba(0,0,0,.2),
        0 26px 46px rgba(0,0,0,.38);
      animation:planetFloat 6.5s ease-in-out infinite;
      cursor:pointer;
      overflow:visible;
      isolation:isolate;
    }
    .planet-ball::before{
      content:"";
      position:absolute;
      inset:7%;
      border-radius:50%;
      background:
        radial-gradient(circle at 28% 24%, rgba(255,255,255,.34), transparent 24%),
        radial-gradient(circle at 36% 34%, rgba(255,255,255,.14), transparent 18%),
        radial-gradient(circle at 72% 70%, rgba(255,255,255,.06), transparent 24%);
      filter:blur(7px);
      z-index:6;
      pointer-events:none;
    }
    .planet-ball::after{
      content:"";
      position:absolute;
      inset:-10px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 0 22px rgba(119,166,255,.10), inset 0 0 18px rgba(255,255,255,.04);
      pointer-events:none;
      z-index:2;
    }
    .planet-aura{
      position:absolute;
      inset:-20%;
      border-radius:50%;
      background:
        radial-gradient(circle, rgba(126,174,255,.18), transparent 60%),
        radial-gradient(circle, rgba(196,122,255,.08), transparent 76%);
      filter:blur(16px);
      opacity:.9;
      animation:auraPulse 4.5s ease-in-out infinite;
      z-index:-2;
    }
    .planet-atmosphere{
      position:absolute;
      inset:-4px;
      border-radius:50%;
      mix-blend-mode:screen;
      filter:blur(2px);
      opacity:.88;
      z-index:5;
      animation:atmosphereRotate 32s linear infinite;
    }
    .planet-surface{
      position:absolute;
      inset:8%;
      border-radius:50%;
      overflow:hidden;
      z-index:3;
      mix-blend-mode:soft-light;
      opacity:.82;
    }
    .planet-surface::before{
      content:"";
      position:absolute;
      inset:-10%;
      background:
        radial-gradient(circle at 24% 36%, rgba(255,255,255,.18), transparent 10%),
        radial-gradient(circle at 60% 26%, rgba(255,255,255,.10), transparent 8%),
        radial-gradient(circle at 56% 60%, rgba(0,0,0,.20), transparent 14%),
        radial-gradient(circle at 34% 72%, rgba(255,255,255,.08), transparent 11%),
        radial-gradient(circle at 74% 66%, rgba(0,0,0,.12), transparent 12%);
      filter:blur(5px);
      animation:surfaceDrift 24s linear infinite;
    }
    .planet-surface::after{
      content:"";
      position:absolute;
      inset:-14%;
      background:repeating-linear-gradient(155deg, rgba(255,255,255,.05) 0 10px, rgba(255,255,255,0) 10px 24px);
      opacity:.34;
      filter:blur(3px);
      transform:rotate(-10deg);
    }
    .planet-night{position:absolute;inset:0;border-radius:50%;z-index:4}
    .planet-band{
      position:absolute;
      left:10%;
      right:10%;
      top:42%;
      height:16%;
      border-radius:999px;
      filter:blur(4px);
      opacity:.72;
      z-index:6;
      animation:bandShift 9s ease-in-out infinite;
    }
    .planet-crater{
      position:absolute;
      border-radius:50%;
      background:radial-gradient(circle at 35% 35%, rgba(255,255,255,.16), rgba(0,0,0,.14) 70%, transparent 72%);
      opacity:.42;
      mix-blend-mode:screen;
      z-index:6;
    }
    .planet-crater.c1{width:18%;height:18%;left:24%;top:46%}
    .planet-crater.c2{width:12%;height:12%;left:58%;top:28%;opacity:.28}
    .planet-crater.c3{width:10%;height:10%;left:48%;top:62%;opacity:.22}
    .planet-orbit{
      position:absolute;
      left:50%;
      top:50%;
      border-radius:50%;
      transform-style:preserve-3d;
      pointer-events:none;
      z-index:1;
    }
    .planet-orbit::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      border:1px solid rgba(255,255,255,.15);
      box-shadow:0 0 8px rgba(255,255,255,.1);
    }
    .planet-orbit::after{
      content:"";
      position:absolute;
      inset:-2px;
      border-radius:inherit;
      border:1px dashed rgba(255,255,255,.2);
      filter:blur(.5px);
    }
    .planet-ring{position:absolute;border-radius:50%;pointer-events:none;transform-style:preserve-3d;z-index:1}
    .planet-wave{
      position:absolute;
      inset:-18%;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 0 24px rgba(103,232,255,.08), 0 0 38px rgba(194,120,255,.06);
      opacity:0;
      transform:scale(.88);
      z-index:-1;
    }
    .planet-moon{position:absolute;border-radius:50%;z-index:7;pointer-events:none}
    .planet-shadow{
      width:72%;
      height:18px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,0,0,.46), transparent 72%);
      filter:blur(10px);
      opacity:.78;
      transform:translateY(-10px);
      transition:.35s ease;
    }
    .planet-label{text-align:center;max-width:190px}
    .planet-label strong{
      display:block;
      font-size:1.02rem;
      font-weight:800;
      margin-bottom:6px;
      text-shadow:0 4px 16px rgba(85,125,255,.2), 0 0 18px rgba(120,168,255,.12);
    }
    .planet-label span{
      display:block;
      font-size:.91rem;
      color:var(--muted);
      line-height:1.6;
    }

    .physics .planet-ball{
      background:
        radial-gradient(circle at 28% 24%, rgba(255,255,255,.98), rgba(255,255,255,.18) 12%, transparent 18%),
        radial-gradient(circle at 52% 58%, rgba(225,230,238,.12), transparent 26%),
        linear-gradient(155deg,#f8fafc 0%, #c7cdd6 38%, #676f7d 68%, #171c25 100%);
    }
    .physics .planet-surface{
      background:
        radial-gradient(circle at 26% 36%, rgba(255,255,255,.20), transparent 16%),
        radial-gradient(circle at 54% 56%, rgba(18,22,30,.22), transparent 22%),
        radial-gradient(circle at 68% 30%, rgba(232,236,243,.12), transparent 12%);
    }
    .physics .planet-atmosphere{
      background:
        radial-gradient(circle at 26% 24%, rgba(255,255,255,.10), transparent 32%),
        conic-gradient(from 0deg, rgba(255,255,255,0) 0deg, rgba(229,234,240,.16) 124deg, rgba(255,255,255,0) 190deg, rgba(182,189,200,.12) 260deg, rgba(255,255,255,0) 360deg);
    }
    .physics .planet-night{background:linear-gradient(120deg, transparent 35%, rgba(0,0,0,.68) 85%)}
    .physics .planet-band{transform:rotate(-15deg);background:linear-gradient(90deg, transparent, rgba(232,236,242,.28), transparent)}
    .physics .planet-orbit.po1{width:190%;height:190%;animation:pOrbit1 12s linear infinite}
    .physics .planet-orbit.po2{width:250%;height:250%;animation:pOrbit2 24s linear infinite reverse}
    .physics .planet-orbit::before{border-color:rgba(220,226,236,.22);box-shadow:0 0 10px rgba(220,226,236,.14)}
    .physics .planet-orbit::after{border-color:rgba(186,194,206,.22)}
    .physics .planet-ring{
      width:210%;
      height:210%;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%) rotateX(72deg) rotateY(15deg);
      border:2px solid rgba(255,255,255,.10);
      border-left-color:rgba(230,235,242,.34);
    }
    .physics .planet-moon.one{width:16px;height:16px;top:-12%;right:-25%;animation:moonOrbit1 8s ease-in-out infinite}
    .physics .planet-moon.two{width:11px;height:11px;bottom:-18%;left:-32%;animation:moonOrbit2 10s ease-in-out infinite}
    .physics .planet-moon.one,.physics .planet-moon.two{
      background:radial-gradient(circle at 30% 28%, rgba(255,255,255,.95), transparent 22%), linear-gradient(145deg, #f6f8fb, #b8bfca 62%, #353c48);
      box-shadow:inset -4px -5px 8px rgba(0,0,0,.35), 0 0 16px rgba(224,229,238,.20);
    }

    .subject-planet.main-planet{
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
    }
    .subject-planet.main-planet .planet-link{cursor:default}
    .subject-planet.main-planet .planet-ball{width:176px;height:176px}
    .subject-planet.main-planet .planet-link::before{width:280px;height:280px}
    .subject-planet.main-planet .planet-label strong{font-size:1.25rem}
    .subject-planet.main-planet .planet-label span{font-size:.96rem}

    .subject-planet.mini-planet{display:none}
    .subject-planet.mini-planet .planet-ball{width:88px;height:88px}
    .subject-planet.mini-planet .planet-link{gap:10px}
    .subject-planet.mini-planet .planet-link::before{width:150px;height:150px}
    .subject-planet.mini-planet .planet-label{max-width:132px}
    .subject-planet.mini-planet .planet-label strong{font-size:.92rem}
    .subject-planet.mini-planet .planet-label span{font-size:.8rem}

    @media (hover:hover) and (pointer:fine){
      .subject-planet:hover .planet-wave{animation:planetWavePulse 1.8s ease-out infinite}
      .subject-planet:hover .planet-ball{
        transform:translateY(-14px) scale(1.11) rotateX(11deg) rotateY(-10deg) !important;
        filter:brightness(1.08) saturate(1.12);
        box-shadow:
          inset -32px -38px 52px rgba(0,0,0,.5),
          inset 12px 12px 24px rgba(255,255,255,.12),
          0 34px 54px rgba(0,0,0,.44),
          0 0 26px rgba(126,180,255,.18);
      }
      .subject-planet:hover .planet-ball::after{box-shadow:0 0 24px rgba(103,232,255,.14), 0 0 48px rgba(194,120,255,.16)}
      .subject-planet:hover .planet-shadow{transform:translateY(-2px) scale(1.16);opacity:1}
    }

    @media (max-width: 780px){
      .page{width:min(100% - 20px, 100%)}
      .hero{padding-top:10px}
      .galaxy-map{height:740px;padding:12px 0 0;margin-top:18px}
      .galaxy-core,.galaxy-glow,.core-swirl,.orbit{display:none !important;animation:none !important}
      .subject-planet{position:absolute;margin:0}
      .subject-planet.main-planet .planet-ball{width:168px;height:168px}
      .subject-planet.main-planet .planet-link::before{width:250px;height:250px}
      .subject-planet.main-planet .planet-label{max-width:220px}
      .subject-planet.mini-planet{display:flex}
      .subject-planet.mini-planet.top-left{left:8%;top:16%}
      .subject-planet.mini-planet.top-right{right:8%;top:18%}
      .subject-planet.mini-planet.bottom-center{left:50%;bottom:10%;transform:translateX(-50%)}
    }

    @keyframes driftNebula{0%{transform:translate3d(0,0,0) scale(1);opacity:.8}100%{transform:translate3d(-2%,2%,0) scale(1.05);opacity:1}}
    @keyframes driftDust{from{transform:translate3d(0,0,0)}to{transform:translate3d(-60px,-40px,0)}}
    @keyframes driftStars{from{transform:translate3d(0,0,0)}to{transform:translate3d(-80px,-280px,0)}}
    @keyframes driftStarsReverse{from{transform:translate3d(0,0,0)}to{transform:translate3d(60px,220px,0)}}
    @keyframes twinkle{0%{opacity:.35;transform:scale(1)}100%{opacity:1;transform:scale(1.03)}}
    @keyframes shooting{0%,100%{opacity:0;transform:translate3d(0,0,0) rotate(-25deg) scaleX(.7)}8%{opacity:1}18%{opacity:0;transform:translate3d(-220px,140px,0) rotate(-25deg) scaleX(1)}}
    @keyframes haloPulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.8}50%{transform:translate(-50%,-50%) scale(1.05);opacity:1}}
    @keyframes coreFloat{0%,100%{transform:translate(-50%,-50%) translateY(0)}50%{transform:translate(-50%,-50%) translateY(-16px)}}
    @keyframes swirlSpin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
    @keyframes spinOrbit1{from{transform:translate(-50%,-50%) rotateX(77deg) rotateZ(0deg)}to{transform:translate(-50%,-50%) rotateX(77deg) rotateZ(360deg)}}
    @keyframes spinOrbit2{from{transform:translate(-50%,-50%) rotateX(80deg) rotateY(22deg) rotateZ(0deg)}to{transform:translate(-50%,-50%) rotateX(80deg) rotateY(22deg) rotateZ(360deg)}}
    @keyframes spinOrbit3{from{transform:translate(-50%,-50%) rotateX(84deg) rotateZ(20deg)}to{transform:translate(-50%,-50%) rotateX(84deg) rotateZ(380deg)}}
    @keyframes planetFloat{0%,100%{transform:translateY(0) rotateZ(0deg)}50%{transform:translateY(-10px) rotateZ(.4deg)}}
    @keyframes auraPulse{0%,100%{transform:scale(1);opacity:.72}50%{transform:scale(1.08);opacity:1}}
    @keyframes surfaceDrift{from{transform:translateX(0) rotate(0deg)}to{transform:translateX(-10px) rotate(8deg)}}
    @keyframes atmosphereRotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes bandShift{0%,100%{transform:translateY(0);opacity:.55}50%{transform:translateY(2px);opacity:.86}}
    @keyframes moonOrbit1{0%,100%{transform:translate3d(0,0,0) scale(1)}50%{transform:translate3d(14px,-16px,0) scale(1.08)}}
    @keyframes moonOrbit2{0%,100%{transform:translate3d(0,0,0) scale(1)}50%{transform:translate3d(-12px,14px,0) scale(.92)}}
    @keyframes planetWavePulse{0%{opacity:0;transform:scale(.82)}20%{opacity:.45}100%{opacity:0;transform:scale(1.22)}}
    @keyframes pOrbit1{from{transform:translate(-50%,-50%) rotateX(72deg) rotateY(15deg) rotateZ(0deg)}to{transform:translate(-50%,-50%) rotateX(72deg) rotateY(15deg) rotateZ(360deg)}}
    @keyframes pOrbit2{from{transform:translate(-50%,-50%) rotateX(68deg) rotateY(5deg) rotateZ(0deg)}to{transform:translate(-50%,-50%) rotateX(68deg) rotateY(5deg) rotateZ(360deg)}}
  </style>
</head>
<body>

    <div class="nebula"></div>

  <main class="page">
    <section class="hero">

    <section class="galaxy-map" id="galaxyMap">
      <div class="galaxy-glow"></div>

      <div class="orbit two"></div>
      <div class="orbit three"></div>
      <div class="galaxy-core"></div>

      <div class="planet-system">
        <article class="subject-planet physics main-planet">
          <div class="planet-link" aria-hidden="true">
            <div class="planet-ball">
              <div class="planet-aura"></div>
              <div class="planet-wave"></div>
              <div class="planet-atmosphere"></div>
              <div class="planet-surface"></div>

              <div class="planet-band"></div>

              <div class="planet-crater c2"></div>
              <div class="planet-crater c3"></div>
              <div class="planet-orbit po1"></div>
              <div class="planet-orbit po2"></div>
              <div class="planet-ring"></div>
              <div class="planet-moon one"></div>
              <div class="planet-moon two"></div>
            </div>
            <div class="planet-shadow"></div>
            <div class="planet-label">
           
            </div>
          </div>
        </article>

        <article class="subject-planet physics mini-planet top-left">
          <a class="planet-link" href="tnsinh1.html">
            <div class="planet-ball">
              <div class="planet-aura"></div>
              <div class="planet-wave"></div>
              <div class="planet-atmosphere"></div>
              <div class="planet-surface"></div>
              <div class="planet-night"></div>
              <div class="planet-band"></div>
              <div class="planet-crater c1"></div>
              <div class="planet-crater c2"></div>
              <div class="planet-crater c3"></div>
              <div class="planet-orbit po1"></div>
              <div class="planet-ring"></div>
            </div>
            <div class="planet-shadow"></div>
            <div class="planet-label">
              <strong>Hành tinh 1</strong>
            </div>
          </a>
        </article>

        <article class="subject-planet physics mini-planet top-right">
          <a class="planet-link" href="tnsinh2.html">
            <div class="planet-ball">
              <div class="planet-aura"></div>
              <div class="planet-wave"></div>
              <div class="planet-atmosphere"></div>
              <div class="planet-surface"></div>
              <div class="planet-night"></div>
              <div class="planet-band"></div>
              <div class="planet-crater c1"></div>
              <div class="planet-crater c2"></div>

      </div>
    </section>
  </main>

  <script>
    const isDesktop = window.matchMedia("(hover: hover) and (pointer: fine)").matches;

    if (isDesktop) {
      const planets = document.querySelectorAll(".subject-planet");
      const galaxyMap = document.getElementById("galaxyMap");

      planets.forEach((planet) => {
        const ball = planet.querySelector(".planet-ball");
        let ticking = false;

        planet.addEventListener("mousemove", (e) => {
          if (planet.classList.contains("mini-planet")) return;
          if (ticking) return;

          requestAnimationFrame(() => {
            const rect = planet.getBoundingClientRect();
            const rotateY = (e.clientX - rect.left - rect.width / 2) / 12;
            const rotateX = (rect.height / 2 - (e.clientY - rect.top)) / 12;
            ball.style.transform = `translateY(-14px) scale(1.08) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            ticking = false;
          });

          ticking = true;
        });

        planet.addEventListener("mouseleave", () => {
          ball.style.transform = "";
        });
      });

      if (galaxyMap) {
        const core = galaxyMap.querySelector(".galaxy-core");
        const glow = galaxyMap.querySelector(".galaxy-glow");
        const swirl = galaxyMap.querySelector(".core-swirl");
        const orbits = galaxyMap.querySelectorAll(".orbit");
        let mapTicking = false;

        galaxyMap.addEventListener("mousemove", (e) => {
          if (mapTicking) return;

          requestAnimationFrame(() => {
            const rect = galaxyMap.getBoundingClientRect();
            const moveX = (e.clientX - rect.left - rect.width / 2) / 70;
            const moveY = (e.clientY - rect.top - rect.height / 2) / 70;

            if (core) core.style.transform = `translate(calc(-50% + ${moveX * 2}px), calc(-50% + ${moveY * 2}px))`;
            if (glow) glow.style.transform = `translate(calc(-50% + ${moveX * 1.5}px), calc(-50% + ${moveY * 1.5}px))`;
            if (swirl) swirl.style.transform = `translate(calc(-50% + ${moveX * .9}px), calc(-50% + ${moveY * .9}px)) rotate(0deg)`;

            orbits.forEach((orbit, index) => {
              const factor = (index + 1) * 0.9;
              orbit.style.marginLeft = `${moveX * factor}px`;
              orbit.style.marginTop = `${moveY * factor}px`;
            });

            mapTicking = false;
          });

          mapTicking = true;
        });
      }
    }
  </script>
