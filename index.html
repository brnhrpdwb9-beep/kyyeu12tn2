<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vũ Trụ Tri Thức</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg-1:#02030a;
      --bg-2:#050918;
      --bg-3:#0a1230;
      --bg-4:#130f2d;

      --text:#eef4ff;
      --muted:#aab7df;
      --cyan:#67e9ff;
      --violet:#c47dff;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html,body{
      min-height:100%;
      font-family:"Inter",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 15% 18%, rgba(93,126,255,.18), transparent 18%),
        radial-gradient(circle at 82% 16%, rgba(87,226,255,.12), transparent 18%),
        radial-gradient(circle at 50% 76%, rgba(201,105,255,.10), transparent 22%),
        radial-gradient(circle at 48% 50%, rgba(255,255,255,.025), transparent 26%),
        linear-gradient(135deg,var(--bg-1),var(--bg-2) 40%,var(--bg-3) 72%,var(--bg-4));
      overflow-x:hidden;
    }

    body{
      position:relative;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .universe{
      position:fixed;
      inset:0;
      overflow:hidden;
      z-index:0;
      pointer-events:none;
    }

    .nebula,
    .nebula::before,
    .nebula::after{
      content:"";
      position:absolute;
      inset:-16%;
      animation:hueShift 24s linear infinite;
      filter:blur(60px);
    }

    .nebula{
      background:
        radial-gradient(circle at 15% 28%, rgba(82,110,255,.22), transparent 14%),
        radial-gradient(circle at 78% 20%, rgba(84,234,255,.14), transparent 16%),
        radial-gradient(circle at 45% 76%, rgba(192,96,255,.14), transparent 18%),
        radial-gradient(circle at 60% 48%, rgba(255,255,255,.05), transparent 7%);
      opacity:.95;
    }

    .nebula::before{
      background:
        radial-gradient(circle at 24% 64%, rgba(109,151,255,.16), transparent 14%),
        radial-gradient(circle at 68% 58%, rgba(106,241,255,.09), transparent 14%),
        radial-gradient(circle at 88% 70%, rgba(190,117,255,.10), transparent 12%);
      animation-duration:30s;
      mix-blend-mode:screen;
    }

    .nebula::after{
      background:
        radial-gradient(circle at 48% 36%, rgba(255,255,255,.07), transparent 9%),
        radial-gradient(circle at 56% 28%, rgba(100,245,255,.08), transparent 12%),
        radial-gradient(circle at 36% 84%, rgba(186,120,255,.09), transparent 14%);
      animation-duration:36s;
      mix-blend-mode:screen;
    }

    .nebula-detail{
      position:absolute;
      inset:-10%;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.04), transparent 1.2%),
        radial-gradient(circle at 40% 72%, rgba(255,255,255,.03), transparent 1.4%),
        radial-gradient(circle at 70% 40%, rgba(103,231,255,.05), transparent 1.8%),
        radial-gradient(circle at 82% 60%, rgba(198,121,255,.05), transparent 1.6%);
      background-size:520px 520px, 640px 640px, 780px 780px, 840px 840px;
      opacity:.65;
      filter:blur(2px);
      animation:driftDust 48s linear infinite;
    }

    .space-grid{
      position:absolute;
      inset:0;
      background:
        linear-gradient(rgba(130,170,255,.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(130,170,255,.045) 1px, transparent 1px);
      background-size:90px 90px;
      mask-image:radial-gradient(circle at center, rgba(0,0,0,.9), transparent 88%);
      opacity:.28;
      transform:perspective(1200px) rotateX(78deg) scale(1.8) translateY(16%);
      transform-origin:center center;
    }

    .cosmic-dust{
      position:absolute;
      inset:0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.45), transparent),
        radial-gradient(1px 1px at 24% 66%, rgba(133,212,255,.38), transparent),
        radial-gradient(1px 1px at 48% 42%, rgba(255,255,255,.34), transparent),
        radial-gradient(1px 1px at 60% 74%, rgba(201,135,255,.30), transparent),
        radial-gradient(1px 1px at 82% 30%, rgba(255,255,255,.42), transparent),
        radial-gradient(1px 1px at 90% 64%, rgba(102,235,255,.28), transparent);
      background-size:360px 360px;
      opacity:.75;
      animation:driftDust 60s linear infinite reverse;
    }

    @keyframes hueShift{
      0%{transform:translate3d(0,0,0) scale(1); filter:blur(60px) hue-rotate(0deg);}
      50%{transform:translate3d(-2%,2%,0) scale(1.07); filter:blur(68px) hue-rotate(26deg);}
      100%{transform:translate3d(0,0,0) scale(1); filter:blur(60px) hue-rotate(0deg);}
    }

    @keyframes driftDust{
      from{transform:translate3d(0,0,0);}
      to{transform:translate3d(-60px,-40px,0);}
    }

    .stars,
    .stars2,
    .stars3{
      position:absolute;
      inset:0;
      background-repeat:repeat;
      animation-timing-function:linear;
      animation-iteration-count:infinite;
    }

    .stars{
      background-image:
        radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.5px 1.5px at 120px 80px, rgba(130,190,255,.95), transparent),
        radial-gradient(2px 2px at 250px 140px, rgba(255,255,255,.9), transparent),
        radial-gradient(1.8px 1.8px at 350px 40px, rgba(178,125,255,.95), transparent),
        radial-gradient(2px 2px at 500px 160px, rgba(97,231,255,.95), transparent),
        radial-gradient(1.5px 1.5px at 700px 60px, rgba(255,255,255,.85), transparent);
      background-size:800px 300px;
      animation:driftStars 90s linear infinite;
      opacity:.95;
    }

    .stars2{
      background-image:
        radial-gradient(1.2px 1.2px at 40px 60px, rgba(255,255,255,.85), transparent),
        radial-gradient(1.7px 1.7px at 200px 120px, rgba(97,231,255,.75), transparent),
        radial-gradient(1.2px 1.2px at 420px 40px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.3px 1.3px at 600px 200px, rgba(170,140,255,.8), transparent),
        radial-gradient(1.5px 1.5px at 760px 100px, rgba(255,255,255,.8), transparent);
      background-size:900px 380px;
      animation:driftStarsReverse 130s linear infinite;
      opacity:.7;
    }

    .stars3{
      background-image:
        radial-gradient(3px 3px at 100px 90px, rgba(255,255,255,.9), transparent),
        radial-gradient(2.5px 2.5px at 500px 60px, rgba(97,231,255,.9), transparent),
        radial-gradient(3px 3px at 780px 170px, rgba(186,122,255,.85), transparent);
      background-size:1000px 420px;
      animation:twinkle 5s ease-in-out infinite alternate;
      opacity:.9;
      filter:drop-shadow(0 0 8px rgba(255,255,255,.35));
    }

    @keyframes driftStars{
      from{transform:translateY(0) translateX(0);}
      to{transform:translateY(-280px) translateX(-80px);}
    }

    @keyframes driftStarsReverse{
      from{transform:translateY(0) translateX(0);}
      to{transform:translateY(220px) translateX(60px);}
    }

    @keyframes twinkle{
      0%{opacity:.35; transform:scale(1);}
      100%{opacity:1; transform:scale(1.03);}
    }

    .shooting-star{
      position:absolute;
      width:180px;
      height:2px;
      background:linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,1), rgba(103,220,255,0));
      border-radius:999px;
      filter:drop-shadow(0 0 12px rgba(255,255,255,.8));
      opacity:0;
      transform:rotate(-25deg);
      animation:shooting 8s ease-in-out infinite;
    }

    .shooting-star.one{top:12%; left:72%; animation-delay:1s;}
    .shooting-star.two{top:26%; left:18%; animation-delay:4s; width:140px;}
    .shooting-star.three{top:8%; left:45%; animation-delay:6.5s; width:210px;}

    @keyframes shooting{
      0%,100%{opacity:0; transform:translate3d(0,0,0) rotate(-25deg) scaleX(.7);}
      8%{opacity:1;}
      18%{opacity:0; transform:translate3d(-220px,140px,0) rotate(-25deg) scaleX(1);}
    }

    .page{
      position:relative;
      z-index:2;
      width:min(1400px, calc(100% - 32px));
      margin:0 auto;
      padding:24px 0 80px;
    }

    .hero{
      position:relative;
      text-align:center;
      padding:42px 16px 18px;
      margin-bottom:8px;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 16px;
      border-radius:999px;
      background:linear-gradient(145deg,#101b3d,#0a122d);
      border:1px solid rgba(137,162,255,.18);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        0 8px 20px rgba(0,0,0,.24);
      font-size:.88rem;
      margin-bottom:20px;
    }

    .eyebrow::before{
      content:"";
      width:8px;
      height:8px;
      border-radius:50%;
      background:linear-gradient(135deg,#66dcff,#cb7bff);
      box-shadow:0 0 14px rgba(103,232,255,.8);
    }

    .galaxy-map{
      position:relative;
      height:1020px;
      margin-top:34px;
      perspective:1800px;
      transform-style:preserve-3d;
      isolation:isolate;
    }

    .galaxy-glow{
      position:absolute;
      left:50%;
      top:50%;
      width:860px;
      height:860px;
      transform:translate(-50%,-50%);
      border-radius:50%;
      background:
        radial-gradient(circle, rgba(107,146,255,.14), transparent 44%),
        radial-gradient(circle, rgba(108,240,255,.10), transparent 48%),
        radial-gradient(circle, rgba(189,109,255,.12), transparent 58%);
      filter:blur(30px);
      z-index:0;
      animation:haloPulse 8s ease-in-out infinite;
    }

    @keyframes haloPulse{
      0%,100%{transform:translate(-50%,-50%) scale(1); opacity:.8;}
      50%{transform:translate(-50%,-50%) scale(1.05); opacity:1;}
    }

    .galaxy-core{
      position:absolute;
      left:50%;
      top:50%;
      width:310px;
      height:310px;
      transform:translate(-50%,-50%);
      border-radius:50%;
      background:
        radial-gradient(circle at 28% 26%, rgba(255,255,255,.98), rgba(255,255,255,.26) 8%, transparent 14%),
        radial-gradient(circle at 42% 38%, rgba(255,244,214,.56), transparent 18%),
        radial-gradient(circle at 58% 56%, rgba(110,225,255,.16), transparent 26%),
        radial-gradient(circle at 45% 45%, rgba(255,255,255,.08), transparent 62%),
        linear-gradient(145deg,#4a67da,#192b68 44%,#090f27 100%);
      box-shadow:
        inset -40px -50px 60px rgba(0,0,0,.5),
        inset 20px 20px 36px rgba(255,255,255,.10),
        0 50px 110px rgba(0,0,0,.5),
        0 0 70px rgba(101,144,255,.26),
        0 0 180px rgba(84,226,255,.14),
        0 0 260px rgba(197,119,255,.08);
      animation:coreFloat 8s ease-in-out infinite;
      z-index:4;
    }

    .galaxy-core::before{
      content:"";
      position:absolute;
      inset:-26px;
      border-radius:50%;
      border:1px solid rgba(150,193,255,.14);
      box-shadow:
        0 0 20px rgba(90,187,255,.18),
        0 0 60px rgba(194,124,255,.10);
    }

    .galaxy-core::after{
      content:"";
      position:absolute;
      inset:-50px;
      border-radius:50%;
      background:
        radial-gradient(circle, rgba(117,154,255,.16), transparent 52%),
        radial-gradient(circle, rgba(114,238,255,.10), transparent 48%),
        radial-gradient(circle, rgba(201,122,255,.12), transparent 62%);
      filter:blur(20px);
      animation:coreAura 5.5s ease-in-out infinite;
      z-index:-1;
    }

    .core-swirl{
      position:absolute;
      left:50%;
      top:50%;
      width:430px;
      height:430px;
      transform:translate(-50%,-50%);
      border-radius:50%;
      background:
        conic-gradient(
          from 0deg,
          rgba(255,255,255,0) 0deg,
          rgba(140,176,255,.12) 60deg,
          rgba(102,237,255,.10) 120deg,
          rgba(0,0,0,0) 180deg,
          rgba(203,123,255,.12) 250deg,
          rgba(0,0,0,0) 360deg
        );
      filter:blur(10px);
      animation:swirlSpin 18s linear infinite;
      z-index:2;
      pointer-events:none;
    }

    @keyframes swirlSpin{
      from{transform:translate(-50%,-50%) rotate(0deg);}
      to{transform:translate(-50%,-50%) rotate(360deg);}
    }

    @keyframes coreAura{
      0%,100%{transform:scale(1); opacity:.8;}
      50%{transform:scale(1.08); opacity:1;}
    }

    @keyframes coreFloat{
      0%,100%{transform:translate(-50%,-50%) translateY(0) rotateX(8deg) rotateY(-10deg);}
      50%{transform:translate(-50%,-50%) translateY(-14px) rotateX(-2deg) rotateY(10deg);}
    }

    .orbit{
      position:absolute;
      left:50%;
      top:50%;
      border-radius:50%;
      transform-style:preserve-3d;
      pointer-events:none;
      z-index:1;
      overflow:visible;
    }

    .orbit::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      border:1px solid rgba(140,170,255,.16);
      box-shadow:
        0 0 14px rgba(90,160,255,.12),
        inset 0 0 14px rgba(130,214,255,.04);
    }

    .orbit::after{
      content:"";
      position:absolute;
      inset:-1px;
      border-radius:inherit;
      border:1px dashed rgba(117,235,255,.08);
      filter:blur(.2px);
      opacity:.7;
    }

    .orbit.one{
      width:520px;
      height:520px;
      transform:translate(-50%,-50%) rotateX(77deg) rotateZ(0deg);
      animation:spinOrbit1 24s linear infinite;
    }

    .orbit.two{
      width:760px;
      height:760px;
      transform:translate(-50%,-50%) rotateX(80deg) rotateY(22deg) rotateZ(0deg);
      animation:spinOrbit2 34s linear infinite reverse;
    }

    .orbit.three{
      width:980px;
      height:980px;
      transform:translate(-50%,-50%) rotateX(84deg) rotateZ(20deg);
      animation:spinOrbit3 42s linear infinite;
    }

    @keyframes spinOrbit1{
      from{transform:translate(-50%,-50%) rotateX(77deg) rotateZ(0deg);}
      to{transform:translate(-50%,-50%) rotateX(77deg) rotateZ(360deg);}
    }

    @keyframes spinOrbit2{
      from{transform:translate(-50%,-50%) rotateX(80deg) rotateY(22deg) rotateZ(0deg);}
      to{transform:translate(-50%,-50%) rotateX(80deg) rotateY(22deg) rotateZ(360deg);}
    }

    @keyframes spinOrbit3{
      from{transform:translate(-50%,-50%) rotateX(84deg) rotateZ(20deg);}
      to{transform:translate(-50%,-50%) rotateX(84deg) rotateZ(380deg);}
    }

.subject-planet{
  position:absolute;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  z-index:6;
  transition:transform .35s ease;
  transform-style:preserve-3d;
}

.subject-planet:hover{
  z-index:20;
}

.planet-link{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  position:relative;
}

.planet-link::before{
  content:"";
  position:absolute;
  width:190px;
  height:190px;
  border-radius:50%;
  background:
    radial-gradient(circle, rgba(116,160,255,.20), transparent 56%),
    radial-gradient(circle, rgba(196,122,255,.09), transparent 72%);
  filter:blur(18px);
  opacity:0;
  transition:.4s ease;
  z-index:-3;
}

.subject-planet:hover .planet-link::before{
  opacity:1;
  transform:scale(1.12);
}

.planet-ball{
  position:relative;
  border-radius:50%;
  transform-style:preserve-3d;
  transition:transform .35s ease, box-shadow .35s ease, filter .35s ease;
  box-shadow:
    inset -30px -34px 46px rgba(0,0,0,.48),
    inset 12px 12px 24px rgba(255,255,255,.10),
    inset -6px -8px 14px rgba(0,0,0,.2),
    0 26px 46px rgba(0,0,0,.38);
  animation:planetFloat 6.5s ease-in-out infinite;
  cursor:pointer;
  will-change:transform;
  overflow:visible;
  isolation:isolate;
}

/* phản quang và chiều sâu */
.planet-ball::before{
  content:"";
  position:absolute;
  inset:7%;
  border-radius:50%;
  background:
    radial-gradient(circle at 28% 24%, rgba(255,255,255,.34), transparent 24%),
    radial-gradient(circle at 36% 34%, rgba(255,255,255,.14), transparent 18%),
    radial-gradient(circle at 72% 70%, rgba(255,255,255,.06), transparent 24%);
  filter:blur(7px);
  z-index:6;
  pointer-events:none;
}

/* viền khí quyển ngoài */
.planet-ball::after{
  content:"";
  position:absolute;
  inset:-10px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.10);
  box-shadow:
    0 0 22px rgba(119,166,255,.10),
    inset 0 0 18px rgba(255,255,255,.04);
  pointer-events:none;
  z-index:2;
}

.planet-aura{
  position:absolute;
  inset:-20%;
  border-radius:50%;
  background:
    radial-gradient(circle, rgba(126,174,255,.18), transparent 60%),
    radial-gradient(circle, rgba(196,122,255,.08), transparent 76%);
  filter:blur(16px);
  opacity:.9;
  animation:auraPulse 4.5s ease-in-out infinite;
  z-index:-2;
}

/* lớp khí quyển xoay nhẹ */
.planet-atmosphere{
  position:absolute;
  inset:-4px;
  border-radius:50%;
  background:
    radial-gradient(circle at 26% 24%, rgba(255,255,255,.10), transparent 32%),
    radial-gradient(circle at 50% 50%, transparent 62%, rgba(110,225,255,.18) 71%, transparent 78%),
    conic-gradient(
      from 0deg,
      rgba(255,255,255,0) 0deg,
      rgba(255,255,255,.04) 52deg,
      rgba(103,232,255,.10) 120deg,
      rgba(255,255,255,0) 190deg,
      rgba(194,120,255,.08) 260deg,
      rgba(255,255,255,0) 360deg
    );
  mix-blend-mode:screen;
  filter:blur(2px);
  opacity:.88;
  pointer-events:none;
  z-index:5;
  animation:atmosphereRotate 32s linear infinite;
}

/* bề mặt hành tinh */
.planet-surface{
  position:absolute;
  inset:8%;
  border-radius:50%;
  overflow:hidden;
  z-index:3;
  mix-blend-mode:soft-light;
  opacity:.82;
}

.planet-surface::before{
  content:"";
  position:absolute;
  inset:-10%;
  background:
    radial-gradient(circle at 24% 36%, rgba(255,255,255,.18), transparent 10%),
    radial-gradient(circle at 60% 26%, rgba(255,255,255,.10), transparent 8%),
    radial-gradient(circle at 56% 60%, rgba(0,0,0,.20), transparent 14%),
    radial-gradient(circle at 34% 72%, rgba(255,255,255,.08), transparent 11%),
    radial-gradient(circle at 74% 66%, rgba(0,0,0,.12), transparent 12%);
  filter:blur(5px);
  animation:surfaceDrift 24s linear infinite;
}

.planet-surface::after{
  content:"";
  position:absolute;
  inset:-14%;
  background:
    repeating-linear-gradient(
      155deg,
      rgba(255,255,255,.05) 0 10px,
      rgba(255,255,255,0) 10px 24px
    );
  opacity:.34;
  filter:blur(3px);
  transform:rotate(-10deg);
}

/* nửa tối của hành tinh */
.planet-night{
  position:absolute;
  inset:0;
  border-radius:50%;
  background:
    linear-gradient(
      112deg,
      rgba(255,255,255,0) 0%,
      rgba(255,255,255,0) 44%,
      rgba(0,0,0,.10) 58%,
      rgba(0,0,0,.28) 78%,
      rgba(0,0,0,.44) 100%
    );
  pointer-events:none;
  z-index:4;
}

/* dải sáng ngang */
.planet-band{
  position:absolute;
  left:10%;
  right:10%;
  top:42%;
  height:16%;
  border-radius:999px;
  background:
    linear-gradient(90deg,
      rgba(255,255,255,0),
      rgba(255,255,255,.14),
      rgba(102,235,255,.18),
      rgba(255,255,255,.08),
      rgba(255,255,255,0));
  filter:blur(4px);
  opacity:.72;
  transform:rotate(-14deg);
  z-index:6;
  animation:bandShift 9s ease-in-out infinite;
}

.planet-crater{
  position:absolute;
  border-radius:50%;
  background:
    radial-gradient(circle at 35% 35%, rgba(255,255,255,.16), rgba(0,0,0,.14) 70%, transparent 72%);
  opacity:.42;
  mix-blend-mode:screen;
  z-index:6;
}

.planet-crater.c1{ width:18%; height:18%; left:24%; top:46%; }
.planet-crater.c2{ width:12%; height:12%; left:58%; top:28%; opacity:.28; }
.planet-crater.c3{ width:10%; height:10%; left:48%; top:62%; opacity:.22; }

/* quỹ đạo vệ tinh */
.planet-moon-orbit{
  position:absolute;
  left:50%;
  top:50%;
  width:146%;
  height:42%;
  border-radius:50%;
  border:1px dashed rgba(255,255,255,.10);
  transform:translate(-50%,-50%) rotateX(77deg) rotateZ(14deg);
  opacity:.55;
  pointer-events:none;
  z-index:0;
}

/* vệ tinh */
.planet-moon{
  position:absolute;
  border-radius:50%;
  z-index:7;
  pointer-events:none;
}

.planet-moon.one{
  top:10%;
  right:-8%;
  width:16px;
  height:16px;
  animation:moonOrbit1 8s ease-in-out infinite;
}

.planet-moon.two{
  bottom:12%;
  left:-10%;
  width:11px;
  height:11px;
  opacity:.86;
  animation:moonOrbit2 10s ease-in-out infinite;
}

/* vành hành tinh */
.planet-ring{
  position:absolute;
  left:50%;
  top:50%;
  border-radius:50%;
  pointer-events:none;
  transform-style:preserve-3d;
  box-shadow:
    0 0 10px rgba(255,255,255,.08),
    0 0 26px rgba(118,233,255,.08);
}

.planet-ring.small{
  width:126%;
  height:34%;
  border:2px solid rgba(255,255,255,.16);
  border-left-color:rgba(255,255,255,.28);
  border-right-color:rgba(103,232,255,.10);

}

.planet-ring.medium{

  height:40%;
  border:2px solid rgba(255,255,255,.15);
  border-left-color:rgba(255,255,255,.24);
  border-right-color:rgba(255,255,255,.08);
  transform:translate(-50%, -50%) rotateX(78deg) rotateZ(-14deg);
}

.planet-ring.glow{
  width:144%;
  height:42%;
  border:1px solid rgba(103,232,255,.18);
  filter:blur(1px);
  opacity:.85;
}

/* bụi vành đai */
.planet-ring.dust{
  width:150%;
  height:46%;
  transform:translate(-50%, -50%) rotateX(78deg) rotateZ(14deg);
  background:
    radial-gradient(circle at 10% 50%, rgba(255,255,255,.14), transparent 2.3%),

    radial-gradient(circle at 40% 50%, rgba(103,232,255,.12), transparent 2.4%),
    radial-gradient(circle at 58% 50%, rgba(255,255,255,.10), transparent 2.1%),
    radial-gradient(circle at 76% 50%, rgba(194,120,255,.11), transparent 2.3%),
    radial-gradient(circle at 90% 50%, rgba(255,255,255,.10), transparent 2.1%);
  filter:blur(.8px);
  opacity:.65;
}

/* sóng tín hiệu khi hover */
.planet-wave{
  position:absolute;
  inset:-18%;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:
    0 0 24px rgba(103,232,255,.08),
    0 0 38px rgba(194,120,255,.06);
  opacity:0;
  transform:scale(.88);
  pointer-events:none;
  z-index:-1;
}

.subject-planet:hover .planet-wave{
  animation:planetWavePulse 1.8s ease-out infinite;
}

.subject-planet:hover .planet-ball{
  transform:translateY(-14px) scale(1.11) rotateX(11deg) rotateY(-10deg);
  filter:brightness(1.08) saturate(1.12);
  box-shadow:
    inset -32px -38px 52px rgba(0,0,0,.5),
    inset 12px 12px 24px rgba(255,255,255,.12),
    0 34px 54px rgba(0,0,0,.44),
    0 0 26px rgba(126,180,255,.18);
}

.subject-planet:hover .planet-ball::after{
  box-shadow:
    0 0 24px rgba(103,232,255,.14),
    0 0 48px rgba(194,120,255,.16);
}

.planet-shadow{
  width:72%;
  height:18px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(0,0,0,.46), transparent 72%);
  filter:blur(10px);
  opacity:.78;
  transform:translateY(-10px);
  transition:.35s ease;
}

.subject-planet:hover .planet-shadow{
  transform:translateY(-2px) scale(1.16);
  opacity:1;
}

.planet-label{
  text-align:center;
  max-width:190px;
}

.planet-label strong{
  display:block;
  font-size:1.02rem;
  font-weight:800;
  margin-bottom:6px;
  text-shadow:
    0 4px 16px rgba(85,125,255,.2),
    0 0 18px rgba(120,168,255,.12);
}

.planet-label span{
  display:block;
  font-size:.91rem;
  color:var(--muted);
  line-height:1.6;
}

.click-hint{
  margin-top:8px;
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:7px 12px;
  border-radius:999px;
  font-size:.78rem;
  font-weight:700;
  color:#d8e5ff;
  background:linear-gradient(145deg, rgba(18,28,62,.92), rgba(10,14,34,.82));
  border:1px solid rgba(132,176,255,.16);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.05),
    0 10px 18px rgba(0,0,0,.24);
  opacity:0;
  transform:translateY(8px);
  transition:.35s ease;
}

.click-hint::before{
  content:"";
  width:8px;
  height:8px;
  border-radius:50%;
  background:linear-gradient(135deg, var(--cyan), var(--violet));
  box-shadow:0 0 12px rgba(103,233,255,.7);
}

.subject-planet:hover .click-hint{
  opacity:1;
  transform:translateY(0);
}

@keyframes planetFloat{
  0%,100%{transform:translateY(0) rotateZ(0deg);}
  50%{transform:translateY(-10px) rotateZ(.4deg);}
}

@keyframes auraPulse{
  0%,100%{transform:scale(1); opacity:.72;}
  50%{transform:scale(1.08); opacity:1;}
}

@keyframes surfaceDrift{
  from{transform:translateX(0) rotate(0deg);}
  to{transform:translateX(-10px) rotate(8deg);}
}

@keyframes atmosphereRotate{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

@keyframes bandShift{
  0%,100%{transform:rotate(-14deg) translateX(0); opacity:.55;}
  50%{transform:rotate(-14deg) translateX(4px); opacity:.86;}
}

@keyframes moonOrbit1{
  0%,100%{transform:translate3d(0,0,0) scale(1);}
  50%{transform:translate3d(8px,-10px,0) scale(1.08);}
}

@keyframes moonOrbit2{
  0%,100%{transform:translate3d(0,0,0) scale(1);}
  50%{transform:translate3d(-7px,8px,0) scale(.92);}
}

@keyframes planetWavePulse{
  0%{
    opacity:0;
    transform:scale(.82);
  }
  20%{
    opacity:.45;
  }
  100%{
    opacity:0;
    transform:scale(1.22);
  }
}

  <script>
    const planets = document.querySelectorAll(".subject-planet");
    const galaxyMap = document.getElementById("galaxyMap");

    planets.forEach((planet) => {
      const ball = planet.querySelector(".planet-ball");

      planet.addEventListener("mousemove", (e) => {
        const rect = planet.getBoundingClientRect();
        const rotateY = (e.clientX - rect.left - rect.width / 2) / 10;
        const rotateX = (rect.height / 2 - (e.clientY - rect.top)) / 10;

        ball.style.transform =
          `translateY(-14px) scale(1.1) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
      });

      planet.addEventListener("mouseleave", () => {
        ball.style.transform = "";
      });
    });

    if (galaxyMap && window.innerWidth > 780) {
      const core = galaxyMap.querySelector(".galaxy-core");
      const glow = galaxyMap.querySelector(".galaxy-glow");
      const swirl = galaxyMap.querySelector(".core-swirl");
      const orbits = galaxyMap.querySelectorAll(".orbit");

      galaxyMap.addEventListener("mousemove", (e) => {
        const rect = galaxyMap.getBoundingClientRect();
        const moveX = (e.clientX - rect.left - rect.width / 2) / 70;
        const moveY = (e.clientY - rect.top - rect.height / 2) / 70;

        if (core) {
          core.style.filter =
            `drop-shadow(${moveX}px ${moveY}px 24px rgba(90,140,255,.18))`;
        }

        if (glow) {
          glow.style.transform =
            `translate(calc(-50% + ${moveX * 1.5}px), calc(-50% + ${moveY * 1.5}px))`;
        }

        if (swirl) {
          swirl.style.marginLeft = `${moveX * .8}px`;
          swirl.style.marginTop = `${moveY * .8}px`;
        }

        orbits.forEach((orbit, index) => {
          const factor = (index + 1) * 0.9;
          orbit.style.marginLeft = `${moveX * factor}px`;
          orbit.style.marginTop = `${moveY * factor}px`;
        });
      });

      galaxyMap.addEventListener("mouseleave", () => {
        if (core) core.style.filter = "";
        if (glow) glow.style.transform = "translate(-50%,-50%)";

        if (swirl) {
          swirl.style.marginLeft = "";
          swirl.style.marginTop = "";
        }

        orbits.forEach((orbit) => {
          orbit.style.marginLeft = "";
          orbit.style.marginTop = "";
        });
      });
    }
  </script>
