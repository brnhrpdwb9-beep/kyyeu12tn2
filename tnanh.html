<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <meta name="theme-color" content="#050918">
  <title>Hành Tinh Tin Học</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg-1:#040608;
      --bg-2:#0b1016;
      --bg-3:#151b23;
      --bg-4:#202833;

      --text:#eef4ff;
      --muted:#c6ccd6;
      --success:#e8edf5;
      --warning:#ffb763;
      --danger:#ff7a92;

      --planet-energy:.28;
      --planet-scale:1;
      --planet-hue:0deg;
      --planet-sat:1;
      --planet-bright:1;
      --planet-contrast:1;
      --planet-depth:.14;
      --planet-shadow-strength:.34;

      --planet-core:#f5f7fa;
      --planet-core-2:#c1c8d2;
      --planet-core-3:#3b424c;
      --planet-glow-color:rgba(222,228,238,.24);

      --planet-ring-opacity:.18;
      --planet-surface-pattern-opacity:.78;

      --planet-crack:0;
      --fracture-intensity:0;
      --fragment-opacity:0;
      --fragment-burst:0;
      --fragment-heat:0;
      --hole-opacity:0;
      --orbit-emphasis:0;
      --orbit-scale:1;
      --orbit-speed:1;
      --orbit-dash-opacity:.16;

      --lava-opacity:0;
      --ice-opacity:0;
      --continent-opacity:0;
      --continent-glow-opacity:0;
      --cloud-opacity:0;
      --ocean-opacity:0;
      --aurora-opacity:0;
      --debris-opacity:0;

      --ring-thin-opacity:0;
      --ring-outer-opacity:0;
      --ring-burst-scale:1;
      --ring-count-boost:1;

      --mini-planet-1:#eef2f7;
      --mini-planet-2:#b7bfca;
      --mini-planet-3:#ffffff;
      --mini-planet-glow:rgba(220,226,236,.18);
      --mini-orbit-shift:0px;

      --mini-visible-1:0;
      --mini-visible-2:0;
      --mini-visible-3:0;
      --mini-visible-4:0;
      --mini-visible-5:0;

      --camera-zoom:1;
      --camera-rot-x:0deg;
      --camera-rot-y:0deg;

      --fx-blur-nebula:42px;
      --fx-blur-stage:22px;
      --fx-blur-aura:14px;
      --use-backdrop:1;
    }

    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{
      min-height:100%;
      font-family:"Inter",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 14% 18%, rgba(137,255,166,.18), transparent 18%),
        radial-gradient(circle at 84% 14%, rgba(73,212,149,.12), transparent 20%),
        radial-gradient(circle at 50% 78%, rgba(202,255,112,.10), transparent 22%),
        radial-gradient(circle at 48% 50%, rgba(255,255,255,.03), transparent 26%),
        linear-gradient(135deg,var(--bg-1),var(--bg-2) 38%,var(--bg-3) 72%,var(--bg-4));
      overflow-x:hidden;
      overflow-y:auto;
    }
    body{position:relative}
    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:1;
    }
    body::before{
      background:
        radial-gradient(circle at 12% 24%, rgba(210,255,190,.08) 0 1.4%, transparent 1.8%),
        radial-gradient(circle at 26% 68%, rgba(120,255,156,.07) 0 1.2%, transparent 1.7%),
        radial-gradient(circle at 72% 34%, rgba(198,255,141,.07) 0 1.5%, transparent 1.9%),
        radial-gradient(circle at 82% 74%, rgba(110,255,168,.06) 0 1.3%, transparent 1.8%);
      background-size:260px 260px, 340px 340px, 300px 300px, 380px 380px;
      opacity:.65;
      animation:driftDust 88s linear infinite reverse;
    }
    body::after{
      background:
        radial-gradient(circle at 20% 30%, rgba(124,255,146,.05), transparent 18%),
        radial-gradient(circle at 78% 26%, rgba(228,255,143,.04), transparent 16%),
        radial-gradient(circle at 60% 72%, rgba(118,231,151,.04), transparent 20%);
      filter:blur(26px);
      opacity:.7;
    }
    button{font-family:inherit}

    .universe,.stars,.stars2,.stars3,.cosmic-dust,.space-grid,.nebula-detail{position:absolute;inset:0}
    .universe{
      position:fixed;
      overflow:hidden;
      z-index:0;
      pointer-events:none;
      transform:translateZ(0);
      contain:layout paint style;
    }

    .nebula,.nebula::before,.nebula::after{
      content:"";
      position:absolute;
      inset:-16%;
      animation:hueShift 24s linear infinite;
      filter:blur(var(--fx-blur-nebula));
      transform:translateZ(0);
    }
    .nebula{
      background:
        radial-gradient(circle at 15% 28%, rgba(116,255,154,.20), transparent 14%),
        radial-gradient(circle at 78% 20%, rgba(76,214,155,.16), transparent 16%),
        radial-gradient(circle at 45% 76%, rgba(217,255,120,.12), transparent 18%),
        radial-gradient(circle at 60% 48%, rgba(255,255,255,.05), transparent 7%);
      opacity:.95;
    }
    .nebula::before{
      background:
        radial-gradient(circle at 24% 64%, rgba(170,255,131,.14), transparent 14%),
        radial-gradient(circle at 68% 58%, rgba(108,255,182,.10), transparent 14%),
        radial-gradient(circle at 88% 70%, rgba(201,255,164,.09), transparent 12%);
      animation-duration:30s;
      mix-blend-mode:screen;
    }
    .nebula::after{
      background:
        radial-gradient(circle at 48% 36%, rgba(255,255,255,.07), transparent 9%),
        radial-gradient(circle at 56% 28%, rgba(111,255,166,.09), transparent 12%),
        radial-gradient(circle at 36% 84%, rgba(222,255,127,.08), transparent 14%);
      animation-duration:36s;
      mix-blend-mode:screen;
    }

    .nebula-detail{
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.04), transparent 1.2%),
        radial-gradient(circle at 40% 72%, rgba(255,255,255,.03), transparent 1.4%),
        radial-gradient(circle at 70% 40%, rgba(120,255,164,.05), transparent 1.8%),
        radial-gradient(circle at 82% 60%, rgba(198,255,121,.05), transparent 1.6%);
      background-size:520px 520px,640px 640px,780px 780px,840px 840px;
      opacity:.55;
      filter:blur(1px);
      animation:driftDust 56s linear infinite;
    }

    .space-grid{
      background:
        linear-gradient(rgba(130,223,169,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(130,223,169,.04) 1px, transparent 1px);
      background-size:90px 90px;
      mask-image:radial-gradient(circle at center, rgba(0,0,0,.9), transparent 88%);
      opacity:.22;
      transform:perspective(1200px) rotateX(78deg) scale(1.8) translateY(16%);
      transform-origin:center center;
    }

    .cosmic-dust{
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.45), transparent),
        radial-gradient(1px 1px at 24% 66%, rgba(142,255,181,.34), transparent),
        radial-gradient(1px 1px at 48% 42%, rgba(255,255,255,.34), transparent),
        radial-gradient(1px 1px at 60% 74%, rgba(201,255,135,.24), transparent),
        radial-gradient(1px 1px at 82% 30%, rgba(255,255,255,.42), transparent),
        radial-gradient(1px 1px at 90% 64%, rgba(111,244,175,.28), transparent);
      background-size:360px 360px;
      opacity:.62;
      animation:driftDust 72s linear infinite reverse;
    }

    .stars,.stars2,.stars3{
      background-repeat:repeat;
      animation-timing-function:linear;
      animation-iteration-count:infinite;
      transform:translateZ(0);
    }
    .stars{
      background-image:
        radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.5px 1.5px at 120px 80px, rgba(130,190,255,.95), transparent),
        radial-gradient(2px 2px at 250px 140px, rgba(255,255,255,.9), transparent),
        radial-gradient(1.8px 1.8px at 350px 40px, rgba(178,125,255,.95), transparent),
        radial-gradient(2px 2px at 500px 160px, rgba(97,231,255,.95), transparent),
        radial-gradient(1.5px 1.5px at 700px 60px, rgba(255,255,255,.85), transparent);
      background-size:800px 300px;
      animation:driftStars 100s linear infinite;
      opacity:.9;
    }
    .stars2{
      background-image:
        radial-gradient(1.2px 1.2px at 40px 60px, rgba(255,255,255,.85), transparent),
        radial-gradient(1.7px 1.7px at 200px 120px, rgba(97,231,255,.75), transparent),
        radial-gradient(1.2px 1.2px at 420px 40px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.3px 1.3px at 600px 200px, rgba(170,140,255,.8), transparent),
        radial-gradient(1.5px 1.5px at 760px 100px, rgba(255,255,255,.8), transparent);
      background-size:900px 380px;
      animation:driftStarsReverse 145s linear infinite;
      opacity:.55;
    }
    .stars3{
      background-image:
        radial-gradient(3px 3px at 100px 90px, rgba(255,255,255,.9), transparent),
        radial-gradient(2.5px 2.5px at 500px 60px, rgba(97,231,255,.9), transparent),
        radial-gradient(3px 3px at 780px 170px, rgba(186,122,255,.85), transparent);
      background-size:1000px 420px;
      animation:twinkle 7s ease-in-out infinite alternate;
      opacity:.7;
      filter:drop-shadow(0 0 4px rgba(255,255,255,.22));
    }

    .shooting-star{
      position:absolute;
      width:180px;
      height:2px;
      background:linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,1), rgba(103,220,255,0));
      border-radius:999px;
      filter:drop-shadow(0 0 12px rgba(255,255,255,.8));
      opacity:0;
      pointer-events:none;
      transform:rotate(-25deg);
      animation:shooting 9s ease-in-out infinite;
      will-change:transform,opacity;
    }
    .shooting-star.one{top:12%;left:72%;animation-delay:0s}
    .shooting-star.two{top:26%;left:18%;width:140px;animation-delay:3s}
    .shooting-star.three{top:8%;left:45%;width:210px;animation-delay:6s}

    .meteor-cluster{
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:0;
      transition:opacity .35s ease;
    }
    body.meteor-combo .meteor-cluster{opacity:1}
    .shooting-star.combo{animation-duration:9s}
    .shooting-star.combo.c1{top:14%;left:82%;width:180px;animation-delay:.2s}
    .shooting-star.combo.c2{top:22%;left:64%;width:140px;animation-delay:.9s}
    .shooting-star.combo.c3{top:18%;left:92%;width:210px;animation-delay:1.5s}
    .shooting-star.combo.c4{top:34%;left:74%;width:180px;animation-delay:2.1s}
    .shooting-star.combo.c5{top:10%;left:58%;width:140px;animation-delay:2.8s}
    .shooting-star.combo.c6{top:28%;left:88%;width:210px;animation-delay:3.3s}

    .flag-burst{
      --flag-shift-x:-22px;
      --flag-shift-y:0px;
      --flag-tilt:-6deg;
      --flag-scale:1;
      --flag-origin-x:50%;
      --flag-origin-y:50%;
      position:absolute;
      right:max(6%, 24px);
      top:92px;
      width:min(340px, 38vw);
      aspect-ratio:5 / 3;
      pointer-events:none;
      opacity:0;
      transform-origin:var(--flag-origin-x) var(--flag-origin-y);
      transform:translate3d(var(--flag-shift-x), calc(var(--flag-shift-y) + 16px), 0) rotate(var(--flag-tilt)) scale(.95);
      transition:opacity .85s ease, transform .85s ease, filter .85s ease;
      filter:drop-shadow(0 0 16px rgba(255,214,136,.12));
      z-index:2;
    }
    .flag-burst::before{
      content:"";
      position:absolute;
      inset:-10% -8%;
      background:
        radial-gradient(circle at 50% 48%, rgba(255,205,112,.18), transparent 34%),
        radial-gradient(circle at 50% 52%, rgba(255,244,218,.08), transparent 58%);
      filter:blur(24px);
      opacity:0;
      transform:scale(.88);
      transition:opacity .9s ease, transform 1s ease;
    }
    .flag-burst::after{
      content:"";
      position:absolute;
      inset:8% 12%;
      background:radial-gradient(circle at 50% 50%, rgba(255,232,170,.18), transparent 62%);
      filter:blur(28px);
      opacity:0;
    }
    body.flag-burst-active .flag-burst{
      opacity:1;
      transform:translate3d(var(--flag-shift-x), var(--flag-shift-y), 0) rotate(var(--flag-tilt)) scale(var(--flag-scale));
      filter:drop-shadow(0 0 24px rgba(255,224,158,.24));
    }
    body.flag-burst-active .flag-burst::before{
      opacity:.78;
      transform:scale(1);
      animation:flagAuraPulse 2.8s ease-in-out infinite alternate;
    }
    body.flag-burst-active .flag-burst::after{
      opacity:.58;
      animation:flagAuraDrift 3.2s ease-in-out infinite alternate;
    }
    .flag-burst svg{
      position:relative;
      width:100%;
      height:100%;
      overflow:visible;
    }
    .flag-dot{
      fill:#ffe4a0;
      opacity:0;
      transform-box:fill-box;
      transform-origin:center;
      filter:drop-shadow(0 0 5px rgba(255,224,154,.32));
    }
    .flag-dot.major{
      fill:#fff5d6;
      filter:drop-shadow(0 0 10px rgba(255,238,196,.52));
    }
    .flag-dot.soft{
      fill:#ffd27f;
      filter:drop-shadow(0 0 4px rgba(255,202,108,.24));
    }
    body.flag-burst-active .flag-dot{
      animation:
        flagDotAppear .9s ease forwards,
        flagDotTwinkle 2.25s ease-in-out infinite alternate;
      animation-delay:var(--delay, 0s), calc(var(--delay, 0s) + .92s);
    }
    body.flag-burst-active .flag-dot.soft{
      animation-duration:1s, 1.9s;
    }
    body.flag-burst-active .flag-dot.major{
      animation-duration:.82s, 2.5s;
    }

    .mobile-emblem-burst{
      --emblem-shift-x:0px;
      --emblem-shift-y:0px;
      position:absolute;
      right:10px;
      top:126px;
      width:min(124px, 34vw);
      aspect-ratio:1;
      pointer-events:none;
      opacity:0;
      display:none;
      transform:translate3d(var(--emblem-shift-x), calc(var(--emblem-shift-y) + 10px), 0) scale(.88);
      transition:opacity .7s ease, transform .7s ease, filter .7s ease;
      filter:drop-shadow(0 0 12px rgba(255,86,86,.16));
      z-index:2;
    }
    .mobile-emblem-burst::before{
      content:"";
      position:absolute;
      inset:-14%;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,86,86,.24), transparent 48%),
        radial-gradient(circle at 50% 50%, rgba(255,220,140,.10), transparent 70%);
      filter:blur(16px);
      opacity:0;
      transform:scale(.86);
      transition:opacity .8s ease, transform .8s ease;
    }
    body.flag-burst-active .mobile-emblem-burst{
      opacity:1;
      transform:translate3d(var(--emblem-shift-x), var(--emblem-shift-y), 0) scale(1);
      filter:drop-shadow(0 0 18px rgba(255,96,96,.26));
    }
    body.flag-burst-active .mobile-emblem-burst::before{
      opacity:.82;
      transform:scale(1);
      animation:mobileEmblemHalo 2.4s ease-in-out infinite alternate;
    }
    .mobile-emblem-burst svg{
      width:100%;
      height:100%;
      overflow:visible;
    }
    .mobile-emblem-disk,
    .mobile-emblem-ring,
    .mobile-emblem-part,
    .mobile-emblem-star,
    .mobile-emblem-spark{
      opacity:0;
      transform-box:fill-box;
      transform-origin:center;
    }
    .mobile-emblem-disk{
      fill:#a60d14;
    }
    .mobile-emblem-ring{
      fill:none;
      stroke:rgba(255,216,150,.72);
      stroke-width:4.5;
    }
    .mobile-emblem-part,
    .mobile-emblem-star{
      fill:#ffd86e;
      filter:drop-shadow(0 0 6px rgba(255,226,148,.30));
    }
    .mobile-emblem-sickle{
      fill:none;
      stroke:#ffd86e;
      stroke-width:15;
      stroke-linecap:round;
      filter:drop-shadow(0 0 6px rgba(255,226,148,.28));
    }
    .mobile-emblem-sickle-inner{
      fill:none;
      stroke:#a60d14;
      stroke-width:7.5;
      stroke-linecap:round;
    }
    .mobile-emblem-spark{
      fill:#ffe8ad;
      filter:drop-shadow(0 0 5px rgba(255,236,172,.28));
    }
    body.flag-burst-active .mobile-emblem-disk{
      animation:mobileEmblemAppear .64s ease forwards;
    }
    body.flag-burst-active .mobile-emblem-ring,
    body.flag-burst-active .mobile-emblem-part,
    body.flag-burst-active .mobile-emblem-star{
      animation:
        mobileEmblemAppear .8s ease forwards,
        mobileEmblemPulse 2.2s ease-in-out infinite alternate;
      animation-delay:var(--delay, 0s), calc(var(--delay, 0s) + .86s);
    }
    body.flag-burst-active .mobile-emblem-spark{
      animation:
        mobileEmblemSpark .72s ease forwards,
        flagDotTwinkle 2s ease-in-out infinite alternate;
      animation-delay:var(--delay, 0s), calc(var(--delay, 0s) + .8s);
    }

    @keyframes shooting{
      0%,100%{opacity:0;transform:translate3d(0,0,0) rotate(-25deg) scaleX(.7);}
      8%{opacity:1;}
      18%{opacity:0;transform:translate3d(-220px,140px,0) rotate(-25deg) scaleX(1);}
    }
    @keyframes flagDotAppear{
      0%{opacity:0;transform:scale(.18)}
      42%{opacity:.46;transform:scale(.72)}
      100%{opacity:1;transform:scale(1)}
    }
    @keyframes flagDotTwinkle{
      0%{opacity:.16;filter:drop-shadow(0 0 4px rgba(255,214,140,.22))}
      36%{opacity:1;filter:drop-shadow(0 0 13px rgba(255,240,196,.76))}
      100%{opacity:.34;filter:drop-shadow(0 0 7px rgba(255,226,170,.42))}
    }
    @keyframes mobileEmblemAppear{
      0%{opacity:0;transform:scale(.24) rotate(-6deg)}
      100%{opacity:1;transform:scale(1) rotate(0deg)}
    }
    @keyframes mobileEmblemSpark{
      0%{opacity:0;transform:scale(.14)}
      100%{opacity:1;transform:scale(1)}
    }
    @keyframes mobileEmblemPulse{
      0%{filter:drop-shadow(0 0 4px rgba(255,214,140,.18))}
      100%{filter:drop-shadow(0 0 10px rgba(255,240,196,.34))}
    }
    @keyframes mobileEmblemHalo{
      0%{opacity:.32;transform:scale(.92)}
      100%{opacity:.82;transform:scale(1.08)}
    }
    @keyframes flagAuraPulse{
      0%{opacity:.28;transform:scale(.92)}
      100%{opacity:.82;transform:scale(1.05)}
    }
    @keyframes flagAuraDrift{
      0%{opacity:.18;transform:translate3d(-6px,4px,0) scale(.96)}
      100%{opacity:.58;transform:translate3d(8px,-5px,0) scale(1.08)}
    }

    .page{
      position:relative;
      z-index:2;
      width:min(1040px,calc(100% - 20px));
      margin:0 auto;
      padding:20px 0 34px;
    }

    .planet-stage{
      position:relative;
      min-height:760px;
      overflow:hidden;
      border-radius:34px;
      background:transparent;
      border:1px solid rgba(214,221,232,.08);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03),0 20px 50px rgba(0,0,0,.08);
      contain:layout paint;
    }
    .planet-stage::before{
      content:"";
      position:absolute;left:50%;top:34%;width:760px;height:760px;transform:translate(-50%,-50%);
      border-radius:50%;
      background:
        radial-gradient(circle, rgba(167,255,135,.18), transparent 40%),
        radial-gradient(circle, rgba(91,222,134,.11), transparent 50%),
        radial-gradient(circle, rgba(235,255,182,.08), transparent 62%);
      filter:blur(var(--fx-blur-stage));
      z-index:0;
      animation:haloPulseStage 10s ease-in-out infinite;
    }
    .planet-stage::after{
      content:"";
      position:absolute;left:50%;top:30%;width:560px;height:560px;transform:translate(-50%,-50%);
      border-radius:50%;
      border:1px dashed rgba(146,241,164,.12);
      opacity:.45;
      z-index:0;
    }

    .planet-inner{
      position:relative;
      z-index:2;
      padding:24px 18px 20px;
      display:grid;
      gap:20px;
      grid-template-columns:1fr;
    }

    .top-head{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
      text-align:center;
    }

    .planet-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      background:linear-gradient(145deg, rgba(18,53,39,.58), rgba(10,24,18,.40));
      border:1px solid rgba(145,235,169,.18);
      color:#effff1;
      font-size:12px;
      font-weight:800;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 10px 18px rgba(0,0,0,.18),0 0 18px rgba(112,232,146,.08);
    }
    .planet-badge::before{
      content:"";
      width:8px;height:8px;border-radius:50%;
      background:linear-gradient(135deg,#d7ff89,#60d65b);
      box-shadow:0 0 12px rgba(135,255,146,.58);
    }

    .command-grid{
      display:grid;
      grid-template-columns:360px minmax(0,1fr);
      gap:24px;
      align-items:start;
    }

    .planet-column{
      position:relative;
      min-height:560px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
    }

    .floating-star,.mini-planet{
      position:absolute;
      border-radius:50%;
      transform:translateZ(0);
    }
    .floating-star{
      background:#fff;
      opacity:.65;
      filter:drop-shadow(0 0 4px rgba(255,255,255,.45));
      z-index:0;
      animation:starBlink 5s ease-in-out infinite alternate;
    }
    .floating-star.s1{width:5px;height:5px;top:48px;left:28px;animation-delay:.2s}
    .floating-star.s2{width:4px;height:4px;top:140px;right:42px;animation-delay:1s}
    .floating-star.s3{width:6px;height:6px;top:250px;left:58px;animation-delay:2s}
    .floating-star.s4{width:4px;height:4px;bottom:180px;right:60px;animation-delay:1.5s}
    .floating-star.s5{width:5px;height:5px;bottom:110px;left:44px;animation-delay:2.8s}

      filter:blur(.6px);

    .planet-ring.thin{
      width:138%;
      height:42%;
      border:1px solid rgba(196,255,188,.20);
      transform:translate(-50%,-50%) rotateX(79deg) rotateZ(10deg) scale(calc(var(--ring-burst-scale) * 1.06));
      opacity:var(--ring-thin-opacity);
    }
    .planet-ring.outer{
      width:188%;
      height:64%;
      border:1px dashed rgba(169,255,183,.18);
      transform:translate(-50%,-50%) rotateX(77deg) rotateZ(-20deg) scale(calc(var(--ring-burst-scale) * 1.08));
      opacity:var(--ring-outer-opacity);
      filter:blur(.4px);
    }

    .planet-lava,
    .planet-continents,
    .planet-ice{
      position:absolute;
      inset:8%;
      border-radius:50%;
      pointer-events:none;
    }

    .planet-lava{
      z-index:6;
      opacity:var(--lava-opacity);
      background:
        radial-gradient(circle at 32% 52%, rgba(255,212,118,.0) 0 10%, rgba(255,184,72,.92) 14%, rgba(255,112,28,.58) 19%, transparent 28%),
        radial-gradient(circle at 66% 34%, rgba(255,228,136,.0) 0 8%, rgba(255,178,68,.86) 12%, rgba(255,92,20,.50) 18%, transparent 26%),
        radial-gradient(circle at 60% 72%, rgba(255,221,124,.0) 0 8%, rgba(255,174,60,.78) 12%, rgba(255,86,18,.42) 20%, transparent 28%);
      mix-blend-mode:screen;
      filter:blur(2px) saturate(1.2);
      animation:lavaPulse 4.5s ease-in-out infinite;
    }

    .planet-continents{
      z-index:6;
      opacity:var(--continent-opacity);
      background:
        radial-gradient(ellipse at 34% 52%, rgba(132,224,116,.98) 0 15%, rgba(48,98,39,.60) 18%, transparent 24%),
        radial-gradient(ellipse at 64% 38%, rgba(156,238,132,.94) 0 12%, rgba(46,90,34,.54) 15%, transparent 21%),
        radial-gradient(ellipse at 56% 70%, rgba(104,208,102,.90) 0 11%, rgba(36,82,34,.50) 14%, transparent 22%);
      filter:blur(1px);
      mix-blend-mode:screen;
    }

    .planet-continents-glow{
      inset:6%;
      z-index:7;
      opacity:var(--continent-glow-opacity);
      background:
        radial-gradient(ellipse at 34% 52%, rgba(192,255,154,.84) 0 14%, rgba(94,214,82,.22) 18%, transparent 26%),
        radial-gradient(ellipse at 64% 38%, rgba(210,255,166,.80) 0 12%, rgba(112,220,96,.20) 16%, transparent 24%),
        radial-gradient(ellipse at 56% 70%, rgba(174,255,146,.76) 0 11%, rgba(82,202,84,.18) 15%, transparent 23%);
      mix-blend-mode:screen;
      filter:blur(7px) saturate(1.3);
    }

    .planet-ice{
      z-index:6;
      opacity:var(--ice-opacity);
      background:
        conic-gradient(from 40deg, transparent 0 18%, rgba(255,250,218,.7) 20%, transparent 24%, transparent 40%, rgba(220,240,255,.62) 43%, transparent 48%, transparent 70%, rgba(255,248,218,.65) 74%, transparent 79%),
        radial-gradient(circle at 24% 26%, rgba(240,250,255,.60), transparent 16%),
        radial-gradient(circle at 76% 74%, rgba(220,240,255,.50), transparent 14%);
      filter:blur(1px);
      mix-blend-mode:screen;
    }

    .planet-crack-svg{
      inset:0;
      z-index:13;
      pointer-events:none;
      opacity:clamp(0, calc(var(--planet-crack) * .22), 1);
      transition:opacity .35s ease, transform .35s ease, filter .35s ease;
      mix-blend-mode:screen;
      filter:
        drop-shadow(0 0 calc(1px + var(--planet-crack) * 1.2px) rgba(255,246,228,.95))
        drop-shadow(0 0 calc(3px + var(--planet-crack) * 2.2px) rgba(255,154,72,.42))
        drop-shadow(0 0 calc(5px + var(--planet-crack) * 2.8px) rgba(255,86,28,.18));
    }
    .planet-crack-svg svg{
      width:100%;
      height:100%;
      display:block;
    }
    .crack-core{
      fill:none;
      stroke:rgba(18,3,0,.98);
      stroke-linecap:round;
      stroke-linejoin:round;
      vector-effect:non-scaling-stroke;
    }
    .crack-glow{
      fill:none;
      stroke:rgba(255,232,212,.96);
      stroke-linecap:round;
      stroke-linejoin:round;
      vector-effect:non-scaling-stroke;
      mix-blend-mode:screen;
    }
    .crack-heat{
      fill:none;
      stroke:rgba(255,120,42,.50);
      stroke-linecap:round;
      stroke-linejoin:round;
      vector-effect:non-scaling-stroke;
    }

    .planet-hole-svg{
      inset:0;
      z-index:12;
      pointer-events:none;
      opacity:var(--hole-opacity);
      transition:opacity .35s ease;
    }
    .planet-hole-svg svg{
      width:100%;
      height:100%;
      display:block;
    }

    .planet-fragments{
      inset:-30%;
      z-index:18;
      pointer-events:none;
      overflow:visible;
      opacity:var(--fragment-opacity);
      contain:layout paint;
    }
    .fragment-chip{
      position:absolute;
      left:50%;
      top:50%;
      width:var(--size,18px);
      height:var(--size,18px);
      margin-left:calc(var(--size,18px) * -.5);
      margin-top:calc(var(--size,18px) * -.5);
      border-radius:44% 56% 48% 52%;
      background:
        radial-gradient(circle at 28% 24%, rgba(255,252,234,.48), transparent 24%),
        linear-gradient(150deg,var(--planet-core) 0%, var(--planet-core-2) 46%, var(--planet-core-3) 86%, #241406 100%);
      box-shadow:
        inset -7px -8px 10px rgba(52,20,0,.34),
        inset 3px 3px 5px rgba(255,255,255,.08),
        0 8px 16px rgba(0,0,0,.22),
        0 0 12px rgba(255,188,74,.12);
      clip-path:var(--clip);
      transform:
        translate3d(var(--x,0px), var(--y,0px), 0)
        rotate(var(--r,0deg))
        scale(var(--s,1));
      will-change:transform,opacity;
      opacity:calc(var(--fragment-opacity) * var(--o,1));
      transition:
        transform .62s cubic-bezier(.18,.74,.24,1),
        opacity .38s ease,
        filter .38s ease;
      filter:drop-shadow(0 0 calc(2px + var(--fragment-heat) * 4px) rgba(255,144,72,.24));
    }

    .planet-particles{
      position:absolute;
      inset:-34%;
      pointer-events:none;
      z-index:25;
      contain:layout paint;
    }
    .fx-particle{
      position:absolute;
      left:50%;
      top:50%;
      width:10px;height:10px;border-radius:50%;
      opacity:0;
      pointer-events:none;
      display:none;
      will-change:transform,opacity;
    }
    .fx-particle.good{
      background:radial-gradient(circle, rgba(255,255,255,1), rgba(220,225,234,.88) 42%, rgba(220,225,234,0));
      box-shadow:0 0 12px rgba(255,255,255,.34), 0 0 24px rgba(188,194,206,.16);
      animation:particleArcGood 1.05s cubic-bezier(.18,.78,.24,1) forwards;
    }
    .fx-particle.bad{
      background:radial-gradient(circle, #ffe6ca, #ff9c5b 48%, rgba(255,122,146,0));
      box-shadow:0 0 10px rgba(255,152,88,.4);
      animation:particleBurstBad .86s ease-out forwards;
    }

    .planet-shadow{
      width:76%;height:16px;border-radius:50%;
      background:radial-gradient(circle, rgba(0,0,0,.46), transparent 72%);
      filter:blur(7px);
      opacity:.72;
      transform:translateY(-10px);
    }

    .planet-mini-status{
      width:100%;
      max-width:260px;
      display:grid;
      gap:6px;
      text-align:center;
      padding:10px 6px 4px;
      color:var(--muted);
      font-size:12px;
      line-height:1.5;
      background:transparent;
      border:none;
      box-shadow:none;
      backdrop-filter:none;
      -webkit-backdrop-filter:none;
    }
    .planet-mini-status strong{
      color:#f3f6fb;
      font-size:13px;
      text-shadow:0 0 18px rgba(255,255,255,.12), 0 10px 18px rgba(0,0,0,.18);
    }
    .upgrade-pill{
      margin-top:6px;
      justify-self:center;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:0;
      border-radius:999px;
      border:none;
      background:transparent;
      color:#f7f9fc;
      font:800 11px/1.1 monospace;
      letter-spacing:.12em;
      text-transform:uppercase;
      box-shadow:none;
      text-shadow:0 0 20px rgba(255,255,255,.18),0 10px 20px rgba(0,0,0,.22);
    }
    .upgrade-pill::before{
      content:"";
      width:8px;height:8px;border-radius:50%;
      background:radial-gradient(circle at 30% 30%, #ffffff, #a9afb8 72%, #555b64 100%);
      box-shadow:0 0 16px rgba(255,255,255,.28);
      flex:none;
    }

    #mission-text{
      margin-top:2px;
      font-size:11px;
      line-height:1.55;
      color:#d7dde7;
      text-shadow:0 10px 18px rgba(0,0,0,.20);
    }

    .mission-panel{
      position:relative;
      border-radius:30px;
      background:linear-gradient(180deg, rgba(13,17,22,.62), rgba(8,11,16,.42));
      border:1px solid rgba(214,221,232,.12);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 18px 40px rgba(0,0,0,.12);
      overflow:hidden;
    }
    .mission-panel::before{
      content:"";
      position:absolute;inset:0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.025), transparent 24%),
        radial-gradient(circle at top right, rgba(232,238,247,.06), transparent 22%),
        radial-gradient(circle at bottom left, rgba(189,197,208,.05), transparent 24%);
      pointer-events:none;
    }

    .mission-inner{
      position:relative;
      z-index:2;
      padding:20px;
    }

    .question{
      font-size:clamp(20px,2.3vw,29px);
      font-weight:800;
      line-height:1.5;
      color:#f4f7fb;
      margin-bottom:18px;
      text-shadow:0 8px 18px rgba(0,0,0,.16),0 0 18px rgba(228,234,242,.10);
    }
    .question-context{
      display:grid;
      gap:12px;
      margin:0 0 18px;
    }
    .question-context[hidden]{
      display:none;
    }
    .reading-card{
      border:1px solid rgba(219,225,234,.14);
      border-radius:22px;
      background:linear-gradient(145deg, rgba(22,28,36,.58), rgba(11,14,20,.34));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 12px 24px rgba(0,0,0,.10);
      padding:18px 18px 16px;
    }
    .reading-label{
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-bottom:10px;
      padding:7px 11px;
      border-radius:999px;
      border:1px solid rgba(168,235,188,.22);
      background:rgba(94,149,112,.12);
      color:#ecfff0;
      font-size:11px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .reading-title{
      margin:0 0 10px;
      font-size:clamp(16px,1.5vw,20px);
      line-height:1.45;
      font-weight:800;
      color:#f5f8fe;
    }
    .reading-instruction{
      margin:0 0 12px;
      color:#dce4f1;
      line-height:1.65;
      font-size:14px;
    }
    .reading-passage{
      color:#eef4ff;
      line-height:1.85;
      font-size:15px;
      white-space:normal;
    }
    .reading-passage strong{
      color:#ffffff;
    }
    .question-media{
      margin:-4px 0 16px;
      border-radius:22px;
      overflow:hidden;
      border:1px solid rgba(219,225,234,.14);
      background:linear-gradient(145deg, rgba(22,28,36,.58), rgba(11,14,20,.34));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 12px 24px rgba(0,0,0,.10);
    }
    .question-media img{
      display:block;
      width:100%;
      max-height:320px;
      object-fit:cover;
    }
    .options{display:grid;gap:12px}
    .option-btn{
      width:100%;padding:14px 16px;border-radius:18px;border:1px solid rgba(208,216,228,.14);
      text-align:left;display:flex;align-items:center;gap:14px;font-size:15px;color:#eef2f7;
      background:linear-gradient(145deg, rgba(22,28,36,.60), rgba(10,14,20,.30));
      backdrop-filter:blur(calc(2px * var(--use-backdrop)));
      -webkit-backdrop-filter:blur(calc(2px * var(--use-backdrop)));
      transition:transform .16s,border-color .16s,box-shadow .16s,background .16s,opacity .16s;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03),0 8px 14px rgba(0,0,0,.07);
      will-change:transform;
    }
    .option-btn:hover:not(:disabled){
      transform:translateY(-2px);
      border-color:rgba(227,232,240,.24);
      background:linear-gradient(145deg, rgba(31,38,48,.72), rgba(14,18,26,.40));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 10px 16px rgba(0,0,0,.10),0 0 12px rgba(210,216,226,.08);
    }
    .option-btn:disabled{cursor:default}

    .letter{
      width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      flex-shrink:0;font-weight:900;color:#f0f3f8;background:rgba(255,255,255,.06);
      border:1px solid rgba(228,232,238,.10);box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
    }

    .option-btn.correct{
      border-color:rgba(226,231,239,.44);background:rgba(86,95,110,.18);color:#f5f8fc;font-weight:700;
      box-shadow:0 0 0 1px rgba(226,231,239,.10),0 10px 18px rgba(0,0,0,.11),0 0 12px rgba(226,231,239,.06);
    }
    .option-btn.correct .letter{
      background:linear-gradient(145deg,#ffffff,#aeb5bf);color:#11151b;border-color:transparent;
      box-shadow:0 0 10px rgba(228,232,239,.18);
    }
    .option-btn.wrong{
      border-color:rgba(255,144,94,.50);background:rgba(66,28,16,.20);color:#ffe8ed;
      box-shadow:0 0 0 1px rgba(255,144,94,.08),0 10px 18px rgba(0,0,0,.11),0 0 10px rgba(255,144,94,.05);
    }
    .option-btn.wrong .letter{
      background:linear-gradient(145deg,#ffad69,#db6b2f);color:#fff;border-color:transparent;
      box-shadow:0 0 10px rgba(255,144,94,.16);
    }

    .tf-board{
      display:grid;
      gap:10px;
    }
    .tf-card{
      border-radius:18px;
      border:1px solid rgba(208,216,228,.14);
      background:linear-gradient(145deg, rgba(22,28,36,.60), rgba(10,14,20,.30));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03),0 8px 14px rgba(0,0,0,.07);
      padding:13px 14px 12px;
      display:grid;
      gap:10px;
    }
    .tf-card.answered{
      border-color:rgba(224,229,237,.20);
    }
    .tf-statement{
      display:grid;
      grid-template-columns:auto 1fr;
      gap:10px;
      align-items:flex-start;
      color:#eef2f7;
      line-height:1.58;
      font-size:14px;
    }
    .tf-letter{
      width:30px;
      height:30px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
      font-weight:900;
      color:#eff3f8;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(228,232,238,.10);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
      flex-shrink:0;
    }
    .tf-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .tf-toggle{
      min-width:88px;
      padding:8px 12px;
      border-radius:12px;
      border:1px solid rgba(210,217,227,.14);
      background:rgba(255,255,255,.04);
      color:#edf1f7;
      font-weight:800;
      font-size:13px;
      line-height:1.2;
      cursor:pointer;
      transition:transform .16s,border-color .16s,background .16s,box-shadow .16s,opacity .16s;
    }
    .tf-toggle:hover:not(:disabled){
      transform:translateY(-1px);
      border-color:rgba(227,232,240,.24);
      background:rgba(31,38,49,.54);
      box-shadow:0 8px 14px rgba(0,0,0,.10),0 0 12px rgba(210,216,226,.08);
    }
    .tf-toggle.active{
      border-color:rgba(229,233,240,.32);
      background:rgba(86,95,110,.34);
      box-shadow:0 0 0 1px rgba(227,232,239,.08),0 0 10px rgba(214,220,229,.07);
    }
    .tf-toggle.correct{
      border-color:rgba(226,231,239,.44);
      background:rgba(86,95,110,.20);
      color:#f4f7fb;
    }
    .tf-toggle.wrong{
      border-color:rgba(255,144,94,.50);
      background:rgba(66,28,16,.24);
      color:#ffe8ed;
    }
    .tf-toggle:disabled{
      cursor:default;
    }
    .tf-feedback{
      margin-top:2px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.06);
      font-size:13px;
      line-height:1.55;
      background:rgba(255,255,255,.03);
    }
    .tf-feedback.correct{
      border-color:rgba(226,231,239,.20);
      background:rgba(86,95,110,.16);
      color:#f4f7fb;
    }
    .tf-feedback.wrong{
      border-color:rgba(255,144,94,.24);
      background:rgba(66,28,16,.18);
      color:#fff0e8;
    }
    .tf-feedback strong{
      font-weight:900;
    }
    @media (max-width: 720px){
      .tf-card{
        padding:12px;
      }
      .tf-actions{
        display:grid;
        grid-template-columns:repeat(2, minmax(0,1fr));
      }
      .tf-toggle{
        min-width:0;
        width:100%;
      }
    }

    .explanation{
      display:none;margin-top:16px;padding:16px 18px;border-radius:20px;font-size:14px;line-height:1.78;
      background:rgba(8,27,18,.28);
      backdrop-filter:blur(calc(2px * var(--use-backdrop)));
      -webkit-backdrop-filter:blur(calc(2px * var(--use-backdrop)));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
    }

    /* ===== Toolbar đã bỏ nền riêng, nằm chung tự nhiên với khối trắc nghiệm ===== */
    .question-toolbar{
      display:grid;
      grid-template-columns:auto minmax(0,1fr) auto;
      align-items:center;
      gap:12px;
      margin:0 0 18px;
      padding:0;
      border-radius:0;
      background:transparent;
      border:none;
      box-shadow:none;
    }

    .toolbar-bar{
      width:100%;
      min-width:0;
      height:10px;
    }

    .progress-mini{
      color:#e2ffea;
      font-size:12px;
      font-weight:900;
      letter-spacing:.08em;
      white-space:nowrap;
      padding:0 2px 0 0;
      user-select:none;
    }

    .toolbar-actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-shrink:0;
    }

    .nav-icon{
      width:44px;
      height:44px;
      padding:0;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      font-weight:900;
      border-radius:14px;
      flex:none;
      position:relative;
      overflow:hidden;
      transform:translateZ(0);
      will-change:transform;
    }

    .nav-icon.prev{
      color:#e9fff0;
      background:linear-gradient(145deg, rgba(24,62,42,.44), rgba(10,22,17,.28));
      border:1px solid rgba(145,237,170,.16);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 8px 18px rgba(0,0,0,.10);
    }

    .nav-icon.prev:hover:not(:disabled){
      transform:translateY(-1px);
      border-color:rgba(175,255,183,.24);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        0 10px 22px rgba(0,0,0,.14),
        0 0 14px rgba(112,232,146,.08);
    }

    .nav-icon.next{
      color:#0f1115;
      background:linear-gradient(135deg, #f7f8fa 0%, #d3d7de 42%, #7c838d 100%);
      border:1px solid rgba(255,255,255,.26);
      box-shadow:
        0 10px 22px rgba(119,126,138,.28),
        0 0 18px rgba(255,255,255,.18),
        inset 0 1px 0 rgba(255,255,255,.44);
    }

    .nav-icon.next::before{
      content:"";
      position:absolute;
      inset:-30%;
      background:
        radial-gradient(circle, rgba(255,255,255,.52) 0%, rgba(205,210,220,.18) 38%, transparent 68%);
      opacity:.95;
      filter:blur(10px);
      z-index:0;
      animation:nextPulse 1.8s ease-in-out infinite;
    }

    .nav-icon.next::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(120deg,
          transparent 0%,
          rgba(255,255,255,.00) 30%,
          rgba(255,255,255,.28) 48%,
          rgba(255,255,255,.00) 66%,
          transparent 100%);
      transform:translateX(-140%);
      animation:nextShine 2.8s ease-in-out infinite;
    }

    .nav-icon.next > *{position:relative;z-index:1}

    .nav-icon.next:hover:not(:disabled){
      transform:translateY(-1px) scale(1.03);
      filter:brightness(1.04);
      box-shadow:
        0 14px 28px rgba(118,124,134,.30),
        0 0 24px rgba(255,255,255,.22),
        0 0 44px rgba(182,188,198,.14),
        inset 0 1px 0 rgba(255,255,255,.52);
    }

    .nav-icon:disabled{
      opacity:.32;
      cursor:not-allowed;
      box-shadow:none;
      filter:none;
    }

    .nav-icon.next:disabled::before,
    .nav-icon.next:disabled::after{display:none}

    .journey-bar{
      height:10px;
      border-radius:999px;
      background:rgba(255,255,255,.05);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.05);
      box-shadow:
        inset 0 0 10px rgba(0,0,0,.14),
        0 0 0 1px rgba(255,255,255,.02);
    }

    .journey-fill{
      height:100%;
      width:0%;
      border-radius:inherit;
      background:linear-gradient(90deg,#d7ff8b 0%, #84da5f 48%, #4ecf72 100%);
      box-shadow:
        0 0 12px rgba(164,255,128,.18),
        0 0 20px rgba(101,224,121,.12);

    .planet-stage.is-phase-shift .planet-bloom{ animation:phaseBloom 1.08s ease forwards; }
    .planet-stage.is-phase-shift .planet-shockwave{ animation:phaseShockwave 1.05s cubic-bezier(.18,.72,.24,1) forwards; }
    .planet-stage.is-phase-shift .planet-flare{ animation:phaseFlare 1.1s ease forwards; }
    .planet-stage.is-phase-shift .planet-ring.medium,

    @keyframes boostPlanet{
      0%{transform:scale(1) rotateZ(0deg)}

      65%{transform:scale(1.06) rotateZ(1deg)}
      100%{transform:scale(1) rotateZ(0deg)}
    }
    @keyframes damagePlanet{
      0%{transform:translateX(0) rotate(0)}
      20%{transform:translateX(-8px) rotate(-2deg)}

      100%{transform:translateX(0) rotate(0)}

    @keyframes successBloom{

      18%{opacity:.95}
      52%{opacity:.46}
      100%{opacity:0;transform:scale(1.24)}
    }
    @keyframes successShockwave{
      0%{opacity:0;transform:scale(.64)}
      16%{opacity:.68}
      100%{opacity:0;transform:scale(1.34)}
    }
    @keyframes successFlare{

    @keyframes particleArcGood{
      0%{opacity:0; transform:translate(-50%,-50%) scale(.2)}
      10%{opacity:1}

    @keyframes particleBurstBad{
      0%{opacity:.95; transform:translate(-50%,-50%) scale(.4)}

    @keyframes phaseStageFlash{

      100%{filter:brightness(1)}

    @keyframes phaseShellShift{
      0%{transform:scale(1) rotateZ(0deg);filter:saturate(1) brightness(1)}
      18%{transform:scale(.92) rotateZ(-4deg);filter:saturate(1.12) brightness(.92)}
      42%{transform:scale(1.15) rotateZ(3deg);filter:saturate(1.5) brightness(1.24)}
      68%{transform:scale(1.06) rotateZ(-2deg);filter:saturate(1.22) brightness(1.10)}
      100%{transform:scale(1) rotateZ(0deg);filter:saturate(1) brightness(1)}
    }
    @keyframes cameraPhaseShift{
      0%{transform:scale(1) rotateX(0deg) rotateY(0deg)}
      18%{transform:scale(.92) rotateX(10deg) rotateY(-10deg)}
      42%{transform:scale(1.28) rotateX(-12deg) rotateY(11deg)}

      100%{transform:scale(1) rotateX(0deg) rotateY(0deg)}

    @keyframes phaseBloom{
      0%{opacity:0;transform:scale(.42)}
      18%{opacity:.92}
      50%{opacity:.62}
      100%{opacity:0;transform:scale(1.45)}
    }
    @keyframes phaseShockwave{
      0%{opacity:0;transform:scale(.48)}
      16%{opacity:.78}
      100%{opacity:0;transform:scale(1.56)}
    }
    @keyframes phaseFlare{
      0%{opacity:0;transform:scale(.6) rotate(-20deg)}
      24%{opacity:.92}
      100%{opacity:0;transform:scale(1.2) rotate(78deg)}

    @keyframes ringBurst{
      0%{transform:translate(-50%,-50%) rotateX(78deg) rotateZ(-14deg) scale(1);opacity:var(--planet-ring-opacity)}

      100%{transform:translate(-50%,-50%) rotateX(78deg) rotateZ(-14deg) scale(1);opacity:var(--planet-ring-opacity)}

    @keyframes orbitPhaseBurst{

      45%{transform:scale(calc(var(--orbit-scale) * 1.08));opacity:.92}

    @keyframes lavaPulse{

    @keyframes damageCrack{

    @keyframes healCrack{

    @keyframes fragmentShake{

      .command-grid{grid-template-columns:1fr}
      .planet-column{min-height:auto}

        --fx-blur-stage:12px;

        --use-backdrop:0;
      }

      .page{width:100%;padding:8px 8px 16px;min-height:100vh;height:auto}
      .planet-stage{border-radius:22px;min-height:calc(100vh - 16px);height:auto;overflow:visible}
      .planet-inner{padding:12px 10px 12px;height:auto;display:flex;flex-direction:column;gap:10px}
      .top-head{gap:8px}
      .planet-badge{padding:8px 12px;font-size:11px}
      .command-grid{grid-template-columns:1fr;gap:10px}
      .planet-column{min-height:unset;display:grid;grid-template-columns:120px 1fr;align-items:center;gap:10px;padding:6px 4px 2px}
      .planet-wrap{min-height:auto;margin:0;width:120px;height:120px}
      .planet-link-wrap{gap:6px}
      .history-planet-shell,.history-planet{width:88px;height:88px}
      .planet-link-wrap::before{width:170px;height:170px}
      .planet-shadow{width:70%;height:12px;transform:translateY(-6px)}

    function shuffleArray(arr) {
      const clone = [...arr];
      for (let i = clone.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [clone[i], clone[j]] = [clone[j], clone[i]];
      }
      return clone;

    function coerceTrueFalseValue(value) {

    function toQuestionArray(rawSource) {
      if (Array.isArray(rawSource)) {
        return {
          items: shuffleArray(rawSource),
          preserveOrder: false
        };
      }

      if (rawSource && Array.isArray(rawSource.sections)) {
        const items = [];

        rawSource.sections.forEach((section, sectionIndex) => {
          const questions = Array.isArray(section?.questions) ? section.questions : [];

          questions.forEach((question, questionIndex) => {
            items.push({
              ...question,
              sectionTitle: section.title || "",
              sectionInstruction: section.instruction || "",
              sectionPassage: section.passage || "",
              sectionType: section.type || "",
              subject: rawSource.subject || "",
              format: rawSource.format || "",
              sourceSectionIndex: sectionIndex,
              sourceQuestionIndex: questionIndex
            });
          });
        });

        return {
          items,
          preserveOrder: true
        };
      }

      return {
        items: [],
        preserveOrder: true
      };
    }

    function normalizeQuizData(rawData) {
      const { items } = toQuestionArray(rawData);

      return items.map((item, qIndex) => {
        if (Array.isArray(item.statements) && item.statements.length === 4) {
          const statements = item.statements.map((statement, idx) => {
            const letter = LETTERS[idx];
            const source = typeof statement === "string" ? { text: statement } : (statement || {});
            const explanationMap = item.r || {};
            const fallbackExplanation = explanationMap[letter] || explanationMap[letter.toLowerCase()] || "";

            return {
              letter,
              text: source.text || source.statement || "",
              answer: coerceTrueFalseValue(
                source.answer ??
                source.correct ??
                source.isTrue ??
                (Array.isArray(item.a) ? item.a[idx] : item.a?.[letter] ?? item.a?.[letter.toLowerCase()])
              ),
              explanation:
                source.explanation ??
                source.reason ??
                fallbackExplanation
            };
          });

          return {
            id: item.id ?? qIndex + 1,
            q: item.q,
            questionType: "true_false",
            image: item.image || item.img || "",
            imageAlt: item.imageAlt || item.q,
            sectionTitle: item.sectionTitle || "",
            sectionInstruction: item.sectionInstruction || "",
            sectionPassage: item.sectionPassage || "",
            sectionType: item.sectionType || "",
            subject: item.subject || "",
            statements
          };
        }

        const correctLetter = item.a;
        const rawOptions = Array.isArray(item.o) ? item.o : [];
        const originalOptions = rawOptions.map((text, idx) => ({
          originalLetter: LETTERS[idx],
          text
        }));

        const shuffledOptions = shuffleArray(originalOptions);

        return {
          id: item.id ?? qIndex + 1,
          q: item.q,
          questionType: "single",
          options: shuffledOptions.map((opt, idx) => ({
            letter: LETTERS[idx],
            text: opt.text,
            isCorrect: opt.originalLetter === correctLetter,
            originalLetter: opt.originalLetter
          })),
          correctLetter: LETTERS[shuffledOptions.findIndex(opt => opt.originalLetter === correctLetter)],
          explanationMap: item.r || {},
          image: item.image || item.img || "",
          imageAlt: item.imageAlt || item.q,
          sectionTitle: item.sectionTitle || "",
          sectionInstruction: item.sectionInstruction || "",
          sectionPassage: item.sectionPassage || "",
          sectionType: item.sectionType || "",
          subject: item.subject || ""
        };
      });
    }

    function ensureAudioContext() {
      const AudioClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioClass) return null;

      if (!state.audioCtx || state.audioCtx.state === "closed") {
        state.audioCtx = new AudioClass();
        state.masterGain = state.audioCtx.createGain();
        state.masterGain.gain.value = 0.15;
        state.masterGain.connect(state.audioCtx.destination);
      }
      return state.audioCtx;
    }

    async function warmupAudio() {
      const ctx = ensureAudioContext();
      if (!ctx) return;
      if (ctx.state !== "running") await ctx.resume();
    }

    function createTone({ freq, type = "sine", start = 0, dur = 0.15, gain = 0.05, endFreq = null, filterFreq = 2600 }) {
      if (!state.audioCtx || !state.masterGain) return;
      const now = state.audioCtx.currentTime;
      const osc = state.audioCtx.createOscillator();
      const env = state.audioCtx.createGain();
      const filter = state.audioCtx.createBiquadFilter();

      osc.type = type;
      osc.frequency.setValueAtTime(freq, now + start);
      if (endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, now + start + dur);

      filter.type = "lowpass";
      filter.frequency.setValueAtTime(filterFreq, now + start);
      filter.Q.value = 1.1;

      env.gain.setValueAtTime(0.0001, now + start);
      env.gain.exponentialRampToValueAtTime(gain, now + start + 0.018);
      env.gain.exponentialRampToValueAtTime(0.0001, now + start + dur);

      osc.connect(filter);
      filter.connect(env);
      env.connect(state.masterGain);

      osc.start(now + start);
      osc.stop(now + start + dur + 0.02);
    }

        createTone({ freq: 587.33, type: "triangle", start: 0.06, dur: 0.13, gain: 0.036, filterFreq: 2900 });
        createTone({ freq: 783.99, type: "sine", start: 0.12, dur: 0.20, gain: 0.032, filterFreq: 3600 });

    function isQuestionAnswered(index) {
      const data = state.quizData[index];
      const answer = state.userAnswers[index];
      if (!data) return false;
      if (isTrueFalseQuestion(data)) {
        return !!answer && data.statements.every(statement => typeof answer[statement.letter] === "boolean");
      }
      return answer !== undefined;
    }

    function isQuestionCorrect(index) {
      const data = state.quizData[index];
      const answer = state.userAnswers[index];
      if (!data || !isQuestionAnswered(index)) return false;
      if (isTrueFalseQuestion(data)) {
        return data.statements.every(statement => answer[statement.letter] === statement.answer);
      }
      return answer === data.correctLetter;
    }

    function getPhaseIndexByPercent(percent) {
      let idx = 0;
      for (let i = 0; i < EVOLUTION_PHASES.length; i++) {
        if (percent >= EVOLUTION_PHASES[i].threshold) idx = i;
      }
      return idx;
    }

    function getCurrentUnlock(answered) {
      let current = COMPUTING_UNLOCKS[0];
      for (let i = 0; i < COMPUTING_UNLOCKS.length; i++) {
        if (answered >= COMPUTING_UNLOCKS[i].min) current = COMPUTING_UNLOCKS[i];
      }
      return current;
    }

    function updateMeteorComboState() {
      if (els.upgradePill) {
        els.upgradePill.dataset.combo = state.correctStreak >= 5 ? "ready" : "idle";
        els.upgradePill.title = state.correctStreak >= 5
          ? `Đã đạt chuỗi đúng ${state.correctStreak} câu`
          : "";
      }
    }

    function triggerMeteorBurst() {
      restartBodyAnimationClass("meteor-combo", "meteorBurstRAF");
      if (state.meteorBurstTimer) {
        clearTimeout(state.meteorBurstTimer);
      }
      state.meteorBurstTimer = window.setTimeout(() => {
        document.body.classList.remove("meteor-combo");
        state.meteorBurstTimer = 0;
      }, 5200);
    }

    function triggerFlagBurst() {
      randomizeFlagBurstPose();
      restartBodyAnimationClass("flag-burst-active", "flagBurstRAF");
      if (state.flagBurstTimer) {
        clearTimeout(state.flagBurstTimer);
      }
      const burstDuration =
        state.perfMode === "low" ? 4200 :
        state.perfMode === "medium" ? 5200 :
        6200;
      state.flagBurstTimer = window.setTimeout(() => {
        document.body.classList.remove("flag-burst-active");
        state.flagBurstTimer = 0;
      }, burstDuration);

    function getPlanetVisualStage() {
      return EVOLUTION_PHASES[getPhaseIndexByPercent(getConquestPercent())];
    }

        function getFinalSummary() {
      const percent = Math.round(getConquestPercent() * 100);
      if (percent >= 90) return { title: "Hành tinh đen-bạc đã hoàn thiện", desc: "Bạn đã đưa hành tinh từ bụi tro số lên đúng dạng obsidian đen-bạc như mẫu trong su.html." };
      if (percent >= 72) return { title: "Đã vào pha graphite cao cấp", desc: "Các vành quỹ đạo, vùng sáng bạc và bề mặt tối đã gần khớp hoàn toàn với hành tinh cuối." };
      if (percent >= 50) return { title: "Đã hình thành vỏ obsidian", desc: "Hành tinh đã rời pha thô, bắt đầu có bề mặt đen sâu và phản sáng kim loại rõ rệt." };
      return { title: "Mới gom cụm bụi tro số", desc: "Hành tinh vẫn còn ở giai đoạn đầu, đang kết tụ từ những mảnh dữ liệu lạnh để đi tới lõi graphite." };
    }

    function setupPerfMode() {
      const isMobile = window.innerWidth <= 720;
      const verySmallScreen = window.innerWidth <= 480;
      const lowThreads = navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4;
      const lowMemory = navigator.deviceMemory && navigator.deviceMemory <= 4;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      if (reducedMotion) {
        state.perfMode = "low";
        document.body.classList.add("low-perf", "reduced-motion");
        applyRootVars({
          "--fx-blur-nebula": "10px",
          "--fx-blur-stage": "6px",
          "--fx-blur-aura": "3px",
          "--use-backdrop": "0"
        });
        return;
      }

      if (isMobile && (lowThreads || lowMemory || verySmallScreen)) {
        state.perfMode = "low";
        document.body.classList.add("low-perf");
        applyRootVars({
          "--fx-blur-nebula": "12px",
          "--fx-blur-stage": "7px",
          "--fx-blur-aura": "4px",
          "--use-backdrop": "0"
        });
      } else if (isMobile) {
        state.perfMode = "medium";
        document.body.classList.add("mid-perf");
        applyRootVars({
          "--fx-blur-nebula": "18px",
          "--fx-blur-stage": "10px",
          "--fx-blur-aura": "5px",
          "--use-backdrop": "0"
        });
      } else {
        state.perfMode = "full";
      }
    }

    function initParticlePool() {
      const total =
        state.perfMode === "low" ? 6 :
        state.perfMode === "medium" ? 10 :
        16;

      const frag = document.createDocumentFragment();
      state.particlePool.length = 0;

      for (let i = 0; i < total; i++) {
        const node = document.createElement("span");
        node.className = "fx-particle";
        node.hidden = true;
        frag.appendChild(node);
        state.particlePool.push(node);
      }

      els.planetParticles.appendChild(frag);
    }

    function useParticleNode() {
      for (let i = 0; i < state.particlePool.length; i++) {
        if (state.particlePool[i].hidden) return state.particlePool[i];
      }
      return null;
    }

    function spawnPlanetParticles(type) {
      const base = type === "good" ? 10 : 7;
      const count = state.perfMode === "low" ? Math.max(4, base - 4) : state.perfMode === "medium" ? Math.max(5, base - 2) : base;

      for (let i = 0; i < count; i++) {
        const p = useParticleNode();
        if (!p) break;

        p.className = `fx-particle ${type}`;
        const angle = Math.random() * Math.PI * 2;
        const distance = type === "good" ? 58 + Math.random() * 54 : 36 + Math.random() * 34;
        const lift = type === "good" ? 18 + Math.random() * 20 : 0;
        const dx = Math.cos(angle) * distance;
        const dy = Math.sin(angle) * distance - lift;
        const size = `${type === "good" ? 6 + Math.random() * 8 : 5 + Math.random() * 6}px`;

        p.style.setProperty("--dx", `${dx}px`);
        p.style.setProperty("--dy", `${dy}px`);
        p.style.setProperty("--rot", `${-30 + Math.random() * 60}deg`);
        p.style.width = size;
        p.style.height = size;
        p.hidden = false;

        p.onanimationend = () => {
          p.hidden = true;
          p.className = "fx-particle";
          p.onanimationend = null;
        };
      }
    }

    function setStageFx(stateClass) {
      els.planetStage.classList.remove("is-boost", "is-damage", "is-heal", "is-phase-shift");
      if (!stateClass) return;
      els.planetStage.classList.add(stateClass);

      clearTimeout(setStageFx.timer);
      setStageFx.timer = setTimeout(() => {
        els.planetStage.classList.remove("is-boost", "is-damage", "is-heal", "is-phase-shift");
      }, stateClass === "is-phase-shift" ? 1180 : 980);
    }

    function triggerPhaseShiftCutscene() {
      setStageFx("is-phase-shift");
      rootStyle.setProperty("--camera-zoom", "1.22");
      rootStyle.setProperty("--camera-rot-x", "-9deg");
      rootStyle.setProperty("--camera-rot-y", "8deg");
      rootStyle.setProperty("--ring-burst-scale", "1.16");

      setTimeout(() => {
        rootStyle.setProperty("--camera-zoom", "1");
        rootStyle.setProperty("--camera-rot-x", "0deg");
        rootStyle.setProperty("--camera-rot-y", "0deg");
        rootStyle.setProperty("--ring-burst-scale", "1");
      }, 620);

      playPhaseShiftSound();
    }

    function mulberry32(seed) {
      let t = seed >>> 0;
      return function() {
        t += 0x6D2B79F5;
        let r = Math.imul(t ^ (t >>> 15), 1 | t);
        r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
        return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
      };
    }

    function polarPoint(cx, cy, angleDeg, radius) {
      const a = angleDeg * Math.PI / 180;
      return [cx + Math.cos(a) * radius, cy + Math.sin(a) * radius];
    }

    function linePath(points) {
      return points.map((p, i) => `${i ? "L" : "M"} ${p[0].toFixed(2)} ${p[1].toFixed(2)}`).join(" ");
    }

    function createSvgPath(d, cls, strokeWidth, opacity = 1) {
      const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
      p.setAttribute("d", d);
      p.setAttribute("class", cls);
      p.setAttribute("stroke-width", strokeWidth);
      p.setAttribute("opacity", opacity);
      return p;
    }

    function createMaskCircle(cx, cy, r) {
      const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      c.setAttribute("cx", cx);
      c.setAttribute("cy", cy);
      c.setAttribute("r", r);
      c.setAttribute("fill", "black");
      return c;
    }

    function createHoleVisualPath(d, fill, opacity) {
      const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
      p.setAttribute("d", d);
      p.setAttribute("fill", fill);
      p.setAttribute("opacity", opacity);
      return p;
    }

    function createRimPath(d, cls, width, opacity) {
      const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
      p.setAttribute("d", d);
      p.setAttribute("class", cls);
      p.setAttribute("stroke-width", width);
      p.setAttribute("opacity", opacity);
      return p;
    }

    function clamp(min, value, max) {
      return Math.max(min, Math.min(max, value));
    }

    function randomBetween(min, max) {
      return min + Math.random() * (max - min);
    }

    function randomizeFlagBurstPose() {
      if (!els.flagBurst) return;

      const compact = window.innerWidth <= 720;
      const lightMode = state.perfMode === "low";
      const shiftX = compact ? randomBetween(lightMode ? -24 : -42, lightMode ? 10 : 18) : randomBetween(-120, 24);
      const shiftY = compact ? randomBetween(lightMode ? -10 : -18, lightMode ? 12 : 20) : randomBetween(-26, 42);
      const tilt = compact ? randomBetween(lightMode ? -5 : -9, lightMode ? 5 : 9) : randomBetween(-14, 14);
      const scale = compact ? randomBetween(lightMode ? .96 : .92, lightMode ? 1.00 : 1.02) : randomBetween(.96, 1.08);
      const originX = randomBetween(38, 62);
      const originY = randomBetween(34, 66);

      els.flagBurst.style.setProperty("--flag-shift-x", `${shiftX.toFixed(1)}px`);
      els.flagBurst.style.setProperty("--flag-shift-y", `${shiftY.toFixed(1)}px`);
      els.flagBurst.style.setProperty("--flag-tilt", `${tilt.toFixed(1)}deg`);
      els.flagBurst.style.setProperty("--flag-scale", scale.toFixed(3));
      els.flagBurst.style.setProperty("--flag-origin-x", `${originX.toFixed(1)}%`);
      els.flagBurst.style.setProperty("--flag-origin-y", `${originY.toFixed(1)}%`);
    }

    function nextDamageSeed(sourceIndex) {
      state.damageSeed = (Math.imul(state.damageSeed ^ (sourceIndex + 11), 1664525) + 1013904223) >>> 0;
      return state.damageSeed;
    }

    function buildFractureGeometry(damage, seedBase = 1) {
      els.crackGlowGroup.innerHTML = "";
      els.crackHeatGroup.innerHTML = "";
      els.crackCoreGroup.innerHTML = "";
      els.planetHoleMaskGroup.innerHTML = "";
      els.planetHoleVisualGroup.innerHTML = "";
      els.planetHoleRimOuterGroup.innerHTML = "";
      els.planetHoleRimInnerGroup.innerHTML = "";

      state.holeFragments = [];

      if (damage <= 0) return;

      const rnd = mulberry32(seedBase + damage * 131);
      const centers = [];
      const centerCount = clamp(1, 1 + Math.floor((damage - 1) / 2) + (damage >= 4 ? 1 : 0), 3);

      const centerPresets = [
        { x: 46, y: 50, r: 4.8 },
        { x: 61, y: 42, r: 3.8 },
        { x: 39, y: 66, r: 3.6 }
      ];

      for (let i = 0; i < centerCount; i++) {
        const preset = centerPresets[i];
        const cx = preset.x + (rnd() - 0.5) * (2 + damage * 0.8);
        const cy = preset.y + (rnd() - 0.5) * (2 + damage * 0.8);
        const r = preset.r + damage * 0.45 + rnd() * 0.9;
        centers.push({ cx, cy, r });
      }

      const allFragmentSeeds = [];

      centers.forEach((center, centerIndex) => {
        const arms = clamp(3, 4 + damage + centerIndex, 9);
        const baseSpread = 360 / arms;
        const localSeed = mulberry32(seedBase * 11 + centerIndex * 997 + damage * 17);

        if (damage >= 3) {
          els.planetHoleMaskGroup.appendChild(
            createMaskCircle(
              (center.cx / 100).toFixed(4),
              (center.cy / 100).toFixed(4),
              (center.r / 100).toFixed(4)
            )
          );

          const craterD = [
            `M ${(center.cx - center.r * .9).toFixed(2)} ${(center.cy - center.r * .2).toFixed(2)}`,
            `Q ${(center.cx - center.r * .5).toFixed(2)} ${(center.cy - center.r * 1.12).toFixed(2)} ${center.cx.toFixed(2)} ${(center.cy - center.r * .92).toFixed(2)}`,
            `Q ${(center.cx + center.r * .92).toFixed(2)} ${(center.cy - center.r * .82).toFixed(2)} ${(center.cx + center.r * 1.02).toFixed(2)} ${center.cy.toFixed(2)}`,
            `Q ${(center.cx + center.r * .78).toFixed(2)} ${(center.cy + center.r * 1.02).toFixed(2)} ${center.cx.toFixed(2)} ${(center.cy + center.r * 1.04).toFixed(2)}`,
            `Q ${(center.cx - center.r * 1.02).toFixed(2)} ${(center.cy + center.r * .62).toFixed(2)} ${(center.cx - center.r * .9).toFixed(2)} ${(center.cy - center.r * .2).toFixed(2)} Z`
          ].join(" ");

          els.planetHoleVisualGroup.appendChild(createHoleVisualPath(craterD, "rgba(18,3,0,.90)", .92));
          els.planetHoleVisualGroup.appendChild(createHoleVisualPath(craterD, "rgba(255,108,28,.14)", .46));
          els.planetHoleRimOuterGroup.appendChild(createRimPath(craterD, "hole-rim-outer", (1.15 + damage * .12).toFixed(2), .70));
          els.planetHoleRimInnerGroup.appendChild(createRimPath(craterD, "hole-rim-inner", (0.65 + damage * .08).toFixed(2), .60));

          allFragmentSeeds.push({
            angle: 20 + centerIndex * 100 + rnd() * 60,
            distance: 38 + damage * 8 + rnd() * 16,
            size: 15 + damage * 2 + rnd() * 4
          });
        }

        for (let a = 0; a < arms; a++) {
          const baseAngle = a * baseSpread + localSeed() * (18 + damage * 2);
          const outward = 9 + damage * 2.6 + localSeed() * (12 + damage * 3.6);
          const segs = 3 + Math.floor(localSeed() * 3);
          const pts = [[center.cx, center.cy]];
          let radiusAcc = center.r * .28;

          for (let s = 1; s <= segs; s++) {
            const jitterA = (localSeed() - .5) * (18 + damage * 5);
            const jitterR = (localSeed() - .5) * (2.2 + damage * .9);
            radiusAcc += outward / segs + jitterR;
            const angle = baseAngle + jitterA;
            pts.push(polarPoint(center.cx, center.cy, angle, radiusAcc));
          }

          const d = linePath(pts);
          const baseW = 0.9 + damage * .14 + localSeed() * .32;
          els.crackGlowGroup.appendChild(createSvgPath(d, "crack-glow", (baseW + 1.6).toFixed(2), .78));
          els.crackHeatGroup.appendChild(createSvgPath(d, "crack-heat", (baseW + .62).toFixed(2), .66));
          els.crackCoreGroup.appendChild(createSvgPath(d, "crack-core", baseW.toFixed(2), .96));

          const branchCount = clamp(1, Math.floor(localSeed() * (1 + damage)), damage >= 2 ? 4 : 2);
          for (let b = 0; b < branchCount; b++) {
            const pick = 1 + Math.floor(localSeed() * (pts.length - 1));
            const origin = pts[pick];
            const originAngle = Math.atan2(origin[1] - center.cy, origin[0] - center.cx) * 180 / Math.PI;
            const dir = originAngle + (localSeed() > .5 ? 1 : -1) * (18 + localSeed() * (40 + damage * 5));
            const len = 4 + localSeed() * (7 + damage * 2.8);
            const steps = 2 + Math.floor(localSeed() * 2);
            const bPts = [origin];

            for (let k = 1; k <= steps; k++) {
              const t = k / steps;
              const a2 = dir + (localSeed() - .5) * 16;
              const r2 = len * t;
              bPts.push([
                origin[0] + Math.cos(a2 * Math.PI / 180) * r2,
                origin[1] + Math.sin(a2 * Math.PI / 180) * r2
              ]);
            }

            const bd = linePath(bPts);
            const bw = Math.max(.48, baseW * .55);
            els.crackGlowGroup.appendChild(createSvgPath(bd, "crack-glow", (bw + .92).toFixed(2), .52));
            els.crackHeatGroup.appendChild(createSvgPath(bd, "crack-heat", (bw + .38).toFixed(2), .44));
            els.crackCoreGroup.appendChild(createSvgPath(bd, "crack-core", bw.toFixed(2), .82));
          }

          if (damage >= 4 && a % 2 === 0) {
            const last = pts[pts.length - 1];
            const tearRadius = 1.8 + damage * .34 + localSeed() * .8;
            els.planetHoleMaskGroup.appendChild(
              createMaskCircle(
                (last[0] / 100).toFixed(4),
                (last[1] / 100).toFixed(4),
                (tearRadius / 100).toFixed(4)
              )
            );

            const tearD = [
              `M ${(last[0] - tearRadius).toFixed(2)} ${last[1].toFixed(2)}`,
              `Q ${last[0].toFixed(2)} ${(last[1] - tearRadius * 1.2).toFixed(2)} ${(last[0] + tearRadius * 1.1).toFixed(2)} ${last[1].toFixed(2)}`,
              `Q ${last[0].toFixed(2)} ${(last[1] + tearRadius).toFixed(2)} ${(last[0] - tearRadius).toFixed(2)} ${last[1].toFixed(2)} Z`
            ].join(" ");

            els.planetHoleVisualGroup.appendChild(createHoleVisualPath(tearD, "rgba(14,2,0,.86)", .74));
            els.planetHoleRimOuterGroup.appendChild(createRimPath(tearD, "hole-rim-outer", "0.85", .56));
            els.planetHoleRimInnerGroup.appendChild(createRimPath(tearD, "hole-rim-inner", "0.45", .42));

            allFragmentSeeds.push({
              angle: baseAngle + (localSeed() - .5) * 40,
              distance: 28 + damage * 6 + localSeed() * 14,
              size: 10 + damage * 1.6 + localSeed() * 3
            });
          }
        }
      });

      state.holeFragments = allFragmentSeeds;
    }

    function initFragments() {
      const clips = [
        "polygon(8% 18%, 68% 0, 100% 40%, 78% 96%, 18% 82%, 0 48%)",
        "polygon(14% 6%, 84% 14%, 100% 62%, 54% 100%, 0 76%, 4% 28%)",
        "polygon(10% 18%, 64% 0, 100% 44%, 84% 100%, 26% 88%, 0 52%)",
        "polygon(6% 20%, 50% 2%, 94% 30%, 100% 70%, 62% 100%, 18% 84%, 0 50%)",
        "polygon(16% 4%, 82% 18%, 100% 58%, 76% 96%, 26% 100%, 0 52%)",
        "polygon(8% 8%, 72% 0, 100% 42%, 86% 88%, 34% 100%, 0 58%)",
        "polygon(18% 0, 90% 18%, 100% 62%, 68% 100%, 12% 84%, 0 34%)",
        "polygon(10% 10%, 58% 0, 100% 34%, 94% 84%, 42% 100%, 0 60%)",
        "polygon(4% 24%, 50% 0, 92% 16%, 100% 70%, 58% 100%, 14% 88%, 0 48%)"
      ];

      const frag = document.createDocumentFragment();
      state.fragmentNodes.length = 0;
      const total = state.perfMode === "low" ? 5 : state.perfMode === "medium" ? 7 : 9;

      for (let i = 0; i < total; i++) {
        const node = document.createElement("span");
        node.className = "fragment-chip";
        node.style.setProperty("--clip", clips[i % clips.length]);
        node.style.setProperty("--size", `${12 + i * 1.6}px`);
        node.style.setProperty("--o", `${i < 4 ? 1 : .76}`);
        frag.appendChild(node);
        state.fragmentNodes.push(node);
      }
      els.planetFragments.appendChild(frag);
    }

    function updateFragments(damage) {
      const burst = Math.max(0, damage - 2);
      rootStyle.setProperty("--fragment-opacity", burst > 0 ? Math.min(1, .12 + burst * .24).toFixed(3) : "0");
      rootStyle.setProperty("--fragment-burst", burst.toFixed(3));
      rootStyle.setProperty("--fragment-heat", (damage / 5).toFixed(3));

      const count = state.fragmentNodes.length;
      for (let i = 0; i < count; i++) {
        const node = state.fragmentNodes[i];
        const seed = state.holeFragments[i % Math.max(1, state.holeFragments.length)] || {
          angle: -30 + i * 40,
          distance: 24 + i * 6,
          size: 12 + i * 2
        };

        const rad = seed.angle * Math.PI / 180;
        const spread = seed.distance * burst * .56;
        const x = Math.cos(rad) * spread;
        const y = Math.sin(rad) * spread - burst * (i % 3 === 0 ? 6 : 0);
        const rot = (seed.angle * .9) + burst * (i % 2 === 0 ? 26 : -22);
        const scale = 1 + burst * (.04 + (i % 4) * .02);

        node.style.setProperty("--size", `${seed.size}px`);
        node.style.setProperty("--x", `${x.toFixed(2)}px`);
        node.style.setProperty("--y", `${y.toFixed(2)}px`);
        node.style.setProperty("--r", `${rot.toFixed(2)}deg`);
        node.style.setProperty("--s", `${scale.toFixed(3)}`);
      }
    }

    function updateProceduralDamageVisuals(force = false) {
      const key = `${state.planetDamage}|${state.damageSeed}`;
      if (!force && key === state.damageCacheKey) return;
      state.damageCacheKey = key;

      buildFractureGeometry(state.planetDamage, state.damageSeed);
      updateFragments(state.planetDamage);
    }

    function updateMiniOrbitVisibility(conquest, phaseIndex) {
      const orbitLevels = [
        conquest >= 0.10 ? 1 : 0,
        conquest >= 0.24 ? 1 : 0,
        conquest >= 0.40 ? 1 : 0,
        conquest >= 0.60 ? 1 : 0,
        conquest >= 0.82 ? 1 : 0
      ];

      rootStyle.setProperty("--mini-visible-1", orbitLevels[0]);
      rootStyle.setProperty("--mini-visible-2", orbitLevels[1]);
      rootStyle.setProperty("--mini-visible-3", orbitLevels[2]);
      rootStyle.setProperty("--mini-visible-4", orbitLevels[3]);
      rootStyle.setProperty("--mini-visible-5", orbitLevels[4]);
      rootStyle.setProperty("--mini-orbit-shift", `${Math.max(1, phaseIndex) * 1.2}px`);
    }

    function updatePlanetState(lastResult = null) {
      const conquest = getConquestPercent();
      const answered = getAnsweredCount();
      const visual = getPlanetVisualStage();
      const phaseIndex = getPhaseIndexByPercent(conquest);

      if (lastResult === "wrong") {
        if (state.planetDamage < 5) {
          state.planetDamage = Math.min(5, state.planetDamage + 1);
          nextDamageSeed(state.currentIndex);
        }
      } else if (lastResult === "correct" && state.planetDamage > 0) {
        state.planetDamage = Math.max(0, state.planetDamage - 1);
      }

      const energy = 0.16 + conquest * 0.84 + (phaseIndex * 0.012);
      const scale = 1 + conquest * 0.14;
      const fractureIntensity = state.planetDamage / 5;
      const holeOpacity = state.planetDamage >= 3 ? clamp(0, .18 + (state.planetDamage - 2) * .28, 1) : 0;

      applyRootVars({
        "--planet-energy": energy.toFixed(3),
        "--planet-scale": scale.toFixed(3),
        "--planet-bright": visual.bright.toFixed(3),
        "--planet-sat": visual.sat.toFixed(3),
        "--planet-contrast": visual.contrast.toFixed(3),
        "--planet-depth": visual.depth.toFixed(3),
        "--planet-shadow-strength": visual.shadow.toFixed(3),
        "--planet-hue": `${visual.hue.toFixed(1)}deg`,
        "--planet-core": visual.core,
        "--planet-core-2": visual.core2,
        "--planet-core-3": visual.core3,
        "--planet-ring-opacity": visual.ringOpacity,
        "--planet-glow-color": visual.glow,
        "--planet-surface-pattern-opacity": (0.66 + conquest * 0.24).toFixed(3),
        "--lava-opacity": visual.lava,
        "--continent-opacity": visual.continents,
        "--continent-glow-opacity": visual.continentGlow,
        "--ice-opacity": visual.ice,
        "--cloud-opacity": visual.cloud,
        "--ocean-opacity": visual.ocean,
        "--aurora-opacity": visual.aurora,
        "--debris-opacity": visual.debris,
        "--ring-thin-opacity": visual.thinRing,
        "--ring-outer-opacity": visual.outerRing,
        "--planet-crack": state.planetDamage,
        "--fracture-intensity": fractureIntensity.toFixed(3),
        "--mini-planet-1": visual.mini[0],
        "--mini-planet-2": visual.mini[1],
        "--mini-planet-3": visual.mini[2],
        "--mini-planet-glow": visual.glow,
        "--ring-count-boost": visual.ringBoost.toFixed(2),
        "--hole-opacity": holeOpacity.toFixed(3),
        "--orbit-emphasis": visual.orbitEmphasis.toFixed(3),
        "--orbit-scale": visual.orbitScale.toFixed(3),
        "--orbit-speed": visual.orbitSpeed.toFixed(3),
        "--orbit-dash-opacity": visual.orbitDash.toFixed(3)
      });

      updateMiniOrbitVisibility(conquest, phaseIndex);
      updateProceduralDamageVisuals();

      els.planetStage.dataset.phase = visual.key;

      const conquestLabel = visual.label;
      if (els.conquestLevel.textContent !== conquestLabel) {
        els.conquestLevel.textContent = conquestLabel;
      }

      const stabilityText = `${visual.type} • ${visual.status}`;
      if (els.planetStability.textContent !== stabilityText) {
        els.planetStability.textContent = stabilityText;
      }

      const scanText = `Chinh Phục Hành Tinh: ${phaseIndex + 1} / ${EVOLUTION_PHASES.length}`;
      if (els.scanProgress.textContent !== scanText) {
        els.scanProgress.textContent = scanText;
      }

      const missionText =
        answered < state.quizData.length
          ? `Đã trả lời ${answered}/${state.quizData.length} câu • ${visual.reaction}`
          : `Chiến dịch kết thúc • ${visual.reaction}`;

      if (els.missionText.textContent !== missionText) {
        els.missionText.textContent = missionText;
      }

      const unlock = getCurrentUnlock(answered);
      const upgradeText = `${unlock.label} • ${unlock.detail}`;
      if (els.upgradePill && els.upgradePill.textContent !== upgradeText) {
        els.upgradePill.textContent = upgradeText;
      }

      updateMeteorComboState();

      if (lastResult === "correct") {
        spawnPlanetParticles("good");
        setStageFx(state.planetDamage > 0 ? "is-heal" : "is-boost");
      }
      if (lastResult === "wrong") {
        spawnPlanetParticles("bad");
        setStageFx("is-damage");
      }

      if (phaseIndex !== state.currentPhaseIndex) {
        if (state.currentPhaseIndex !== -1) triggerPhaseShiftCutscene();
        state.currentPhaseIndex = phaseIndex;
      }
    }

    function createResultPlanetNode() {
      const shell = document.createElement("div");
      shell.className = "result-shell";
      shell.innerHTML = `
        <div class="planet-aura"></div>
        <div class="planet-wave"></div>
        <div class="planet-evolution-orbits">
          <div class="orbit o1"></div>
          <div class="orbit o2"></div>
          <div class="orbit o3"></div>
        </div>
        <div class="result-planet-core">
          <div class="planet-core-exposed"></div>

          <div class="planet-body">
            <div class="planet-atmosphere"></div>
            <div class="planet-surface"></div>
            <div class="planet-night"></div>
            <div class="planet-band"></div>
            <div class="planet-ocean"></div>
            <div class="planet-clouds"></div>
            <div class="planet-aurora"></div>
            <div class="planet-lava"></div>
            <div class="planet-continents"></div>
            <div class="planet-continents-glow"></div>
            <div class="planet-ice"></div>
            <div class="planet-debris"></div>
          </div>

          <div class="planet-hole-svg">
            <svg viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
              ${els.planetHoleVisualGroup.innerHTML}
            </svg>
          </div>
          <div class="planet-hole-rim">
            <svg viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
              ${els.planetHoleRimOuterGroup.innerHTML}
              ${els.planetHoleRimInnerGroup.innerHTML}
            </svg>
          </div>

          <div class="planet-crack-svg">
            <svg viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">

              ${els.crackHeatGroup.innerHTML}
              ${els.crackCoreGroup.innerHTML}

          </div>
