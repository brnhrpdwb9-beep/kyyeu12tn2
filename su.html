<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
 <meta name="theme-color" content="#050918">
  <title>Hành Tinh Lịch Sử</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg-1:#02030a;--bg-2:#050918;--bg-3:#0a1230;--bg-4:#130f2d;
      --text:#eef4ff;--muted:#aab7df;--cyan:#67e9ff;--violet:#c47dff;
      --success:#39d98a;--warning:#ffb763;--danger:#ff7a92;

      --planet-energy:.32;
      --planet-scale:1;
      --planet-shake:0px;
      --planet-hue:0deg;
      --planet-sat:1;
      --planet-bright:1;
      --planet-core:#ffd07c;
      --planet-core-2:#df8e36;
      --planet-core-3:#87471b;
      --planet-ring-opacity:.55;
      --planet-glow-color:rgba(255,190,99,.26);
      --planet-surface-pattern-opacity:.82;
    }

    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{
      min-height:100%;
      font-family:"Inter",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 15% 18%, rgba(93,126,255,.18), transparent 18%),
        radial-gradient(circle at 82% 16%, rgba(87,226,255,.12), transparent 18%),
        radial-gradient(circle at 50% 76%, rgba(201,105,255,.10), transparent 22%),
        radial-gradient(circle at 48% 50%, rgba(255,255,255,.025), transparent 26%),
        linear-gradient(135deg,var(--bg-1),var(--bg-2) 40%,var(--bg-3) 72%,var(--bg-4));
      overflow-x:hidden;
      overflow-y:auto;
      scroll-behavior:smooth;
    }
    body{position:relative}
    button{font-family:inherit}

    .universe,.stars,.stars2,.stars3,.cosmic-dust,.space-grid,.nebula-detail{position:absolute;inset:0}
    .universe{position:fixed;overflow:hidden;z-index:0;pointer-events:none}

    .nebula,.nebula::before,.nebula::after{
      content:"";position:absolute;inset:-16%;
      animation:hueShift 24s linear infinite;filter:blur(60px)
    }
    .nebula{
      background:
        radial-gradient(circle at 15% 28%, rgba(82,110,255,.22), transparent 14%),
        radial-gradient(circle at 78% 20%, rgba(84,234,255,.14), transparent 16%),
        radial-gradient(circle at 45% 76%, rgba(192,96,255,.14), transparent 18%),
        radial-gradient(circle at 60% 48%, rgba(255,255,255,.05), transparent 7%);
      opacity:.95;
    }
    .nebula::before{
      background:
        radial-gradient(circle at 24% 64%, rgba(109,151,255,.16), transparent 14%),
        radial-gradient(circle at 68% 58%, rgba(106,241,255,.09), transparent 14%),
        radial-gradient(circle at 88% 70%, rgba(190,117,255,.10), transparent 12%);
      animation-duration:30s;mix-blend-mode:screen;
    }
    .nebula::after{
      background:
        radial-gradient(circle at 48% 36%, rgba(255,255,255,.07), transparent 9%),
        radial-gradient(circle at 56% 28%, rgba(100,245,255,.08), transparent 12%),
        radial-gradient(circle at 36% 84%, rgba(186,120,255,.09), transparent 14%);
      animation-duration:36s;mix-blend-mode:screen;
    }

    .nebula-detail{
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.04), transparent 1.2%),
        radial-gradient(circle at 40% 72%, rgba(255,255,255,.03), transparent 1.4%),
        radial-gradient(circle at 70% 40%, rgba(103,231,255,.05), transparent 1.8%),
        radial-gradient(circle at 82% 60%, rgba(198,121,255,.05), transparent 1.6%);
      background-size:520px 520px,640px 640px,780px 780px,840px 840px;
      opacity:.65;filter:blur(2px);animation:driftDust 48s linear infinite;
    }

    .space-grid{
      background:
        linear-gradient(rgba(130,170,255,.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(130,170,255,.045) 1px, transparent 1px);
      background-size:90px 90px;
      mask-image:radial-gradient(circle at center, rgba(0,0,0,.9), transparent 88%);
      opacity:.28;
      transform:perspective(1200px) rotateX(78deg) scale(1.8) translateY(16%);
      transform-origin:center center;
    }

    .cosmic-dust{
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.45), transparent),
        radial-gradient(1px 1px at 24% 66%, rgba(133,212,255,.38), transparent),
        radial-gradient(1px 1px at 48% 42%, rgba(255,255,255,.34), transparent),
        radial-gradient(1px 1px at 60% 74%, rgba(201,135,255,.30), transparent),
        radial-gradient(1px 1px at 82% 30%, rgba(255,255,255,.42), transparent),
        radial-gradient(1px 1px at 90% 64%, rgba(102,235,255,.28), transparent);
      background-size:360px 360px;opacity:.75;animation:driftDust 60s linear infinite reverse;
    }

    .stars,.stars2,.stars3{background-repeat:repeat;animation-timing-function:linear;animation-iteration-count:infinite}
    .stars{
      background-image:
        radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.5px 1.5px at 120px 80px, rgba(130,190,255,.95), transparent),
        radial-gradient(2px 2px at 250px 140px, rgba(255,255,255,.9), transparent),
        radial-gradient(1.8px 1.8px at 350px 40px, rgba(178,125,255,.95), transparent),
        radial-gradient(2px 2px at 500px 160px, rgba(97,231,255,.95), transparent),
        radial-gradient(1.5px 1.5px at 700px 60px, rgba(255,255,255,.85), transparent);
      background-size:800px 300px;animation:driftStars 90s linear infinite;opacity:.95;
    }
    .stars2{
      background-image:
        radial-gradient(1.2px 1.2px at 40px 60px, rgba(255,255,255,.85), transparent),
        radial-gradient(1.7px 1.7px at 200px 120px, rgba(97,231,255,.75), transparent),
        radial-gradient(1.2px 1.2px at 420px 40px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.3px 1.3px at 600px 200px, rgba(170,140,255,.8), transparent),
        radial-gradient(1.5px 1.5px at 760px 100px, rgba(255,255,255,.8), transparent);
      background-size:900px 380px;animation:driftStarsReverse 130s linear infinite;opacity:.7;
    }
    .stars3{
      background-image:
        radial-gradient(3px 3px at 100px 90px, rgba(255,255,255,.9), transparent),
        radial-gradient(2.5px 2.5px at 500px 60px, rgba(97,231,255,.9), transparent),
        radial-gradient(3px 3px at 780px 170px, rgba(186,122,255,.85), transparent);
      background-size:1000px 420px;animation:twinkle 5s ease-in-out infinite alternate;
      opacity:.9;filter:drop-shadow(0 0 8px rgba(255,255,255,.35));
    }

    .shooting-star{
      position:absolute;width:180px;height:2px;
      background:linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,1), rgba(103,220,255,0));
      border-radius:999px;filter:drop-shadow(0 0 12px rgba(255,255,255,.8));
      opacity:0;transform:rotate(-25deg);animation:shooting 8s ease-in-out infinite;
    }
    .shooting-star.one{top:12%;left:72%;animation-delay:1s}
    .shooting-star.two{top:26%;left:18%;animation-delay:4s;width:140px}
    .shooting-star.three{top:8%;left:45%;animation-delay:6.5s;width:210px}

    .page{
      position:relative;
      z-index:2;
      width:min(1040px,calc(100% - 20px));
      margin:0 auto;
      padding:20px 0 34px;
    }

    .planet-stage{
      position:relative;
      min-height:760px;
      overflow:hidden;
      border-radius:34px;
      background:transparent;
      border:1px solid rgba(145,180,255,.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.03),
        0 20px 50px rgba(0,0,0,.08);
    }
    .planet-stage::before{
      content:"";
      position:absolute;left:50%;top:34%;width:720px;height:720px;transform:translate(-50%,-50%);
      border-radius:50%;
      background:
        radial-gradient(circle, rgba(107,146,255,.10), transparent 44%),
        radial-gradient(circle, rgba(108,240,255,.07), transparent 48%),
        radial-gradient(circle, rgba(189,109,255,.08), transparent 58%);
      filter:blur(30px);z-index:0;animation:haloPulseStage 8s ease-in-out infinite;
    }
    .planet-stage::after{
      content:"";
      position:absolute;left:50%;top:30%;width:560px;height:560px;transform:translate(-50%,-50%);
      border-radius:50%;border:1px dashed rgba(145,180,255,.08);opacity:.58;z-index:0;
    }

    .planet-inner{
      position:relative;z-index:2;padding:24px 18px 20px;
      display:grid;gap:20px;
      grid-template-columns:1fr;
    }

    .top-head{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
      text-align:center;
    }

    .planet-badge{
      display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;
      background:linear-gradient(145deg, rgba(18,28,62,.52), rgba(10,14,34,.40));
      border:1px solid rgba(132,176,255,.14);color:#dbe8ff;font-size:12px;font-weight:800;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 10px 18px rgba(0,0,0,.18);
    }
    .planet-badge::before{
      content:"";width:8px;height:8px;border-radius:50%;
      background:linear-gradient(135deg,#ffd06b,#ff8d4a);box-shadow:0 0 14px rgba(255,190,99,.8);
    }

    .command-grid{
      display:grid;
      grid-template-columns:360px minmax(0,1fr);
      gap:24px;
      align-items:start;
    }

    .planet-column{
      position:relative;
      min-height:560px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
    }

    .floating-star,.mini-planet{
      position:absolute;border-radius:50%;
    }
    .floating-star{
      background:#fff;opacity:.7;filter:drop-shadow(0 0 8px rgba(255,255,255,.7));
      z-index:0;animation:starBlink 4s ease-in-out infinite alternate;
    }
    .floating-star.s1{width:5px;height:5px;top:48px;left:28px;animation-delay:.2s}
    .floating-star.s2{width:4px;height:4px;top:140px;right:42px;animation-delay:1s}
    .floating-star.s3{width:6px;height:6px;top:250px;left:58px;animation-delay:2s}
    .floating-star.s4{width:4px;height:4px;bottom:180px;right:60px;animation-delay:1.5s}
    .floating-star.s5{width:5px;height:5px;bottom:110px;left:44px;animation-delay:2.8s}
    .floating-star.s6{width:4px;height:4px;top:52%;left:14%;animation-delay:2.1s}
    .floating-star.s7{width:6px;height:6px;top:20%;right:18%;animation-delay:.8s}

    .mini-planet{
      box-shadow:inset -8px -10px 14px rgba(0,0,0,.34),inset 5px 5px 8px rgba(255,255,255,.06),0 0 18px rgba(255,194,110,.12);
      animation:miniFloat 7s ease-in-out infinite;opacity:.95;
    }
    .mini-planet.one{width:24px;height:24px;top:17%;left:10%;background:linear-gradient(145deg,#7df2ff,#3ea6d8 62%,#17314a)}
    .mini-planet.two{width:18px;height:18px;right:12%;top:34%;background:linear-gradient(145deg,#c47dff,#7a56ff 62%,#2c1948);animation-delay:1.2s}
    .mini-planet.three{width:16px;height:16px;left:16%;bottom:17%;background:linear-gradient(145deg,#ffd07c,#df8e36 62%,#4a250d);animation-delay:2.2s}

    .planet-wrap{
      position:relative;width:100%;min-height:360px;display:flex;align-items:center;justify-content:center;
      margin:8px 0 12px;perspective:1400px;transform-style:preserve-3d;
    }

    .planet-link-wrap{
      position:relative;display:flex;flex-direction:column;align-items:center;gap:12px;z-index:3;
      transition:transform .3s ease;
    }
    .planet-link-wrap::before{
      content:"";position:absolute;width:250px;height:250px;border-radius:50%;
      background:
        radial-gradient(circle, rgba(255,183,92,.14), transparent 58%),
        radial-gradient(circle, rgba(255,113,71,.07), transparent 72%);
      filter:blur(18px);opacity:.95;z-index:-2;
    }

    .history-planet-shell{
      position:relative;width:130px;height:130px;display:flex;align-items:center;justify-content:center;
      transform-style:preserve-3d;transition:transform .35s ease,filter .35s ease;
      filter:hue-rotate(var(--planet-hue)) saturate(var(--planet-sat)) brightness(var(--planet-bright));
    }

    .planet-aura,.planet-wave,.planet-moon-orbit,.planet-ring,.planet-atmosphere,.planet-surface,.planet-night,.planet-band,.planet-moon,.planet-crater{
      position:absolute;border-radius:50%;
    }

    .planet-aura{
      inset:-22%;
      background:
        radial-gradient(circle, color-mix(in srgb, var(--planet-core) 62%, white 10%) calc(.12 + var(--planet-energy)), transparent 60%),
        radial-gradient(circle, rgba(196,122,255,.10), transparent 76%);
      filter:blur(18px);opacity:.95;animation:auraPulse 4.5s ease-in-out infinite;z-index:-2;
    }

    .planet-wave{
      inset:-18%;border:1px solid rgba(255,255,255,.08);
      box-shadow:0 0 24px rgba(255,183,92,.12),0 0 38px rgba(194,120,255,.06);
      opacity:0;transform:scale(.88);pointer-events:none;z-index:-1;animation:planetWavePulse 2.2s ease-out infinite;
    }

    .history-planet{
      position:relative;width:130px;height:130px;border-radius:50%;transform-style:preserve-3d;
      transition:transform .35s ease,box-shadow .35s ease,filter .35s ease, background .35s ease;
      transform:scale(var(--planet-scale)) translateX(var(--planet-shake));
      box-shadow:
        inset -22px -26px 34px rgba(0,0,0,.40),
        inset 9px 9px 16px rgba(255,255,255,.07),
        0 22px 42px rgba(0,0,0,.36),
        0 0 calc(30px + 80px * var(--planet-energy)) var(--planet-glow-color);
      animation:planetFloat 6.5s ease-in-out infinite;
      overflow:visible;isolation:isolate;
      background:
        radial-gradient(circle at 30% 26%, rgba(255,255,255,.95), rgba(255,255,255,.12) 12%, transparent 18%),
        radial-gradient(circle at 60% 62%, rgba(255,230,180,.14), transparent 26%),
        linear-gradient(150deg,var(--planet-core) 0%, var(--planet-core-2) 40%, var(--planet-core-3) 72%, #1a120d 100%);
    }

    .history-planet::before{
      content:"";position:absolute;inset:7%;border-radius:50%;
      background:
        radial-gradient(circle at 28% 24%, rgba(255,255,255,.34), transparent 24%),
        radial-gradient(circle at 36% 34%, rgba(255,255,255,.14), transparent 18%),
        radial-gradient(circle at 72% 70%, rgba(255,255,255,.06), transparent 24%);
      filter:blur(7px);z-index:6;pointer-events:none;
    }
    .history-planet::after{
      content:"";position:absolute;inset:-10px;border-radius:50%;
      border:1px solid rgba(255,255,255,.10);
      box-shadow:
        0 0 calc(20px + 30px * var(--planet-energy)) color-mix(in srgb, var(--planet-core) 58%, transparent),
        inset 0 0 18px rgba(255,255,255,.04);
      pointer-events:none;z-index:2;
    }

    .planet-atmosphere{
      inset:-4px;
      background:
        radial-gradient(circle at 28% 26%, rgba(255,255,255,.08), transparent 32%),
        radial-gradient(circle at 50% 50%, transparent 62%, rgba(255,194,110,.18) 72%, transparent 79%),
        conic-gradient(from 0deg,rgba(255,255,255,0) 0deg,rgba(255,230,170,.04) 54deg,rgba(255,170,90,.12) 128deg,rgba(255,255,255,0) 190deg,rgba(255,220,150,.08) 258deg,rgba(255,255,255,0) 360deg);
      mix-blend-mode:screen;filter:blur(2px);opacity:.88;pointer-events:none;z-index:5;animation:atmosphereRotate 32s linear infinite;
    }

    .planet-surface{
      inset:8%;overflow:hidden;z-index:3;mix-blend-mode:soft-light;opacity:var(--planet-surface-pattern-opacity);
      background:
        radial-gradient(circle at 30% 44%, rgba(255,255,255,.14), transparent 14%),
        radial-gradient(circle at 58% 26%, rgba(110,50,12,.18), transparent 18%),
        radial-gradient(circle at 62% 68%, rgba(255,220,180,.10), transparent 12%);
    }
    .planet-surface::before{
      content:"";position:absolute;inset:-10%;
      background:
        radial-gradient(circle at 24% 36%, rgba(255,255,255,.18), transparent 10%),
        radial-gradient(circle at 60% 26%, rgba(255,255,255,.10), transparent 8%),
        radial-gradient(circle at 56% 60%, rgba(0,0,0,.20), transparent 14%),
        radial-gradient(circle at 34% 72%, rgba(255,255,255,.08), transparent 11%),
        radial-gradient(circle at 74% 66%, rgba(0,0,0,.12), transparent 12%);
      filter:blur(5px);animation:surfaceDrift 24s linear infinite;
    }
    .planet-surface::after{
      content:"";position:absolute;inset:-14%;
      background:repeating-linear-gradient(155deg,rgba(255,255,255,.05) 0 10px,rgba(255,255,255,0) 10px 24px);
      opacity:.34;filter:blur(3px);transform:rotate(-10deg);
    }

    .planet-night{
      inset:0;
      background:linear-gradient(112deg,rgba(255,255,255,0) 0%,rgba(255,255,255,0) 44%,rgba(0,0,0,.10) 58%,rgba(0,0,0,.28) 78%,rgba(0,0,0,.44) 100%);
      pointer-events:none;z-index:4;
    }
    .planet-band{
      left:10%;right:10%;top:42%;height:16%;border-radius:999px;
      background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,220,170,.10),rgba(255,183,92,.24),rgba(255,228,180,.10),rgba(255,255,255,0));
      filter:blur(4px);opacity:.72;transform:rotate(-14deg);z-index:6;animation:bandShift 9s ease-in-out infinite;
    }
    .planet-crater{
      background:radial-gradient(circle at 35% 35%, rgba(255,255,255,.16), rgba(0,0,0,.14) 70%, transparent 72%);
      opacity:.42;mix-blend-mode:screen;z-index:6;
    }
    .planet-crater.c1{width:18%;height:18%;left:24%;top:46%}
    .planet-crater.c2{width:12%;height:12%;left:58%;top:28%;opacity:.28}
    .planet-crater.c3{width:10%;height:10%;left:48%;top:62%;opacity:.22}

    .planet-moon-orbit{
      left:50%;top:50%;width:148%;height:44%;border:1px dashed rgba(255,255,255,.10);
      transform:translate(-50%,-50%) rotateX(77deg) rotateZ(14deg);opacity:.55;pointer-events:none;z-index:0;
    }

    .planet-moon{
      z-index:7;pointer-events:none;
      background:
        radial-gradient(circle at 30% 28%, rgba(255,250,235,.92), rgba(255,255,255,.16) 20%, transparent 22%),
        linear-gradient(145deg,#f6d3a3,#b58251 62%,#50301a);
      box-shadow:inset -4px -5px 8px rgba(0,0,0,.32),0 0 14px rgba(255,205,130,.18);
    }
    .planet-moon.one{top:10%;right:-8%;width:18px;height:18px;animation:moonOrbit1 8s ease-in-out infinite}
    .planet-moon.two{bottom:12%;left:-10%;width:12px;height:12px;opacity:.86;animation:moonOrbit2 10s ease-in-out infinite}

    .planet-ring{
      left:50%;top:50%;pointer-events:none;transform-style:preserve-3d;
      box-shadow:0 0 10px rgba(255,255,255,.08),0 0 26px rgba(255,190,99,.08);
      opacity:var(--planet-ring-opacity);
    }
    .planet-ring.medium{
      width:142%;height:44%;border:2px solid rgba(255,255,255,.15);
      border-left-color:rgba(255,255,255,.24);border-right-color:rgba(255,255,255,.08);
      transform:translate(-50%,-50%) rotateX(78deg) rotateZ(-14deg);
    }
    .planet-ring.glow{
      width:150%;height:46%;border:1px solid rgba(255,194,110,.18);
      transform:translate(-50%,-50%) rotateX(78deg) rotateZ(-14deg);filter:blur(1px);
    }
    .planet-ring.dust{
      width:158%;height:50%;transform:translate(-50%,-50%) rotateX(78deg) rotateZ(14deg);
      background:
        radial-gradient(circle at 10% 50%, rgba(255,255,255,.14), transparent 2.3%),
        radial-gradient(circle at 24% 50%, rgba(255,255,255,.10), transparent 2.1%),
        radial-gradient(circle at 40% 50%, rgba(103,232,255,.12), transparent 2.4%),
        radial-gradient(circle at 58% 50%, rgba(255,255,255,.10), transparent 2.1%),
        radial-gradient(circle at 76% 50%, rgba(194,120,255,.11), transparent 2.3%),
        radial-gradient(circle at 90% 50%, rgba(255,255,255,.10), transparent 2.1%);
      filter:blur(.8px);
    }

    .planet-shadow{
      width:76%;height:16px;border-radius:50%;
      background:radial-gradient(circle, rgba(0,0,0,.46), transparent 72%);
      filter:blur(10px);opacity:.78;transform:translateY(-10px);
    }

    .planet-mini-status{
      width:100%;
      max-width:260px;
      display:grid;
      gap:6px;
      text-align:center;
      padding:12px 14px;
      border-radius:18px;
      background:rgba(10,16,38,.14);
      border:1px solid rgba(145,180,255,.10);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
      color:var(--muted);
      font-size:12px;
      line-height:1.5;
    }

    .planet-mini-status strong{
      color:#eef6ff;
      font-size:13px;
    }

    #mission-text{
      margin-top:2px;
      font-size:11px;
      line-height:1.55;
      color:#c9d7ff;
    }

    .mission-panel{
      position:relative;
      border-radius:30px;
      background:transparent;
      border:1px solid rgba(145,180,255,.08);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03),0 18px 40px rgba(0,0,0,.08);
      overflow:hidden;
    }
    .mission-panel::before{
      content:"";
      position:absolute;inset:0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.025), transparent 24%),
        radial-gradient(circle at top right, rgba(103,233,255,.05), transparent 22%),
        radial-gradient(circle at bottom left, rgba(196,122,255,.04), transparent 24%);
      pointer-events:none;
    }

    .mission-inner{
      position:relative;
      z-index:2;
      padding:20px;
    }

    .question-meta{
      display:flex;justify-content:space-between;align-items:center;gap:12px;
      flex-wrap:wrap;margin-bottom:16px;
    }
    .progress-mini{color:var(--muted);font-size:12px;font-weight:800;letter-spacing:.08em}
    .journey-bar{
      width:min(260px,100%);height:10px;border-radius:999px;background:rgba(255,255,255,.05);
      overflow:hidden;border:1px solid rgba(255,255,255,.05);box-shadow:inset 0 0 14px rgba(0,0,0,.18);
    }
    .journey-fill{
      height:100%;width:0%;border-radius:inherit;
      background:linear-gradient(90deg,#67e9ff,#7a9dff 48%,#c47dff 100%);
      box-shadow:0 0 16px rgba(103,233,255,.22);transition:width .35s ease;
    }

    .question{
      font-size:clamp(20px,2.3vw,29px);font-weight:800;line-height:1.5;
      color:#f3f8ff;margin-bottom:18px;text-shadow:0 8px 24px rgba(0,0,0,.18);
    }
    .options{display:grid;gap:12px}
    .option-btn{
      width:100%;padding:14px 16px;border-radius:18px;border:1px solid rgba(145,180,255,.14);
      text-align:left;display:flex;align-items:center;gap:14px;font-size:15px;color:#edf4ff;
      background:rgba(14,20,46,.14);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
      transition:transform .2s,border-color .2s,box-shadow .2s,background .2s,opacity .2s;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03),0 10px 18px rgba(0,0,0,.08);
    }
    .option-btn:hover:not(:disabled){
      transform:translateY(-2px);border-color:rgba(103,233,255,.28);background:rgba(18,26,58,.20);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 14px 22px rgba(0,0,0,.12),0 0 18px rgba(103,233,255,.06);
    }
    .option-btn:disabled{cursor:default}

    .letter{
      width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      flex-shrink:0;font-weight:900;color:#dce8ff;background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
    }

    .option-btn.correct{
      border-color:rgba(57,217,138,.55);background:rgba(18,64,42,.20);color:#dffced;font-weight:700;
      box-shadow:0 0 0 1px rgba(57,217,138,.10),0 14px 24px rgba(0,0,0,.12),0 0 18px rgba(57,217,138,.08);
    }
    .option-btn.correct .letter{
      background:linear-gradient(145deg,#39d98a,#189c60);color:#fff;border-color:transparent;
      box-shadow:0 0 16px rgba(57,217,138,.24);
    }
    .option-btn.wrong{
      border-color:rgba(255,114,141,.50);background:rgba(66,18,34,.20);color:#ffe8ed;
      box-shadow:0 0 0 1px rgba(255,114,141,.08),0 14px 24px rgba(0,0,0,.12),0 0 16px rgba(255,114,141,.06);
    }
    .option-btn.wrong .letter{
      background:linear-gradient(145deg,#ff7a92,#db506b);color:#fff;border-color:transparent;
      box-shadow:0 0 16px rgba(255,114,141,.20);
    }

    .explanation{
      display:none;margin-top:16px;padding:16px 18px;border-radius:20px;font-size:14px;line-height:1.78;
      background:rgba(10,16,38,.12);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
    }

    .footer-controls{
      display:flex;
      gap:12px;
      margin-top:18px;
      margin-bottom:14px;
    }
    .nav-btn{
      border:none;border-radius:16px;font-size:15px;font-weight:800;padding:14px 16px;cursor:pointer;
      transition:transform .15s,filter .2s,opacity .2s;
    }
    .nav-btn:active{transform:scale(.98)}
    .nav-btn:disabled{opacity:.3;cursor:not-allowed}
    .nav-btn.prev{
      flex:1;color:#dce8ff;background:rgba(18,28,62,.24);
      border:1px solid rgba(145,180,255,.12);box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    }
    .nav-btn.next{
      flex:2;color:#fff;background:linear-gradient(135deg,#3782ff,#8d62ff);
      border:1px solid rgba(255,255,255,.10);box-shadow:0 12px 20px rgba(70,92,255,.24),inset 0 1px 0 rgba(255,255,255,.16);
    }

    .nav-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:7px}
    .nav-dot{
      aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:12px;
      font-size:11px;font-weight:800;color:#dce8ff;cursor:pointer;border:1px solid rgba(145,180,255,.14);
      background:rgba(16,24,52,.18);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
      transition:transform .15s,border-color .2s,background .2s;
    }
    .nav-dot:hover{transform:translateY(-1px);border-color:rgba(103,233,255,.24)}
    .nav-dot.active{
      border-color:rgba(103,233,255,.42);background:rgba(25,72,112,.28);color:#ecfcff;
      box-shadow:0 0 0 1px rgba(103,233,255,.10),0 0 16px rgba(103,233,255,.08);
    }
    .nav-dot.done-correct{background:linear-gradient(145deg,#39d98a,#189c60);color:#fff;border-color:transparent;box-shadow:0 0 12px rgba(57,217,138,.18)}
    .nav-dot.done-wrong{background:linear-gradient(145deg,#ff7a92,#db506b);color:#fff;border-color:transparent;box-shadow:0 0 12px rgba(255,114,141,.16)}

    .conquest-banner{
      margin-top:16px;
      padding:18px;
      border-radius:24px;
      background:rgba(12,18,42,.20);
      border:1px solid rgba(145,180,255,.12);
      display:none;
      line-height:1.7;
      font-size:14px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04), 0 18px 40px rgba(0,0,0,.15);
    }

    .result-panel-head{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .result-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      font-size:12px;
      font-weight:800;
      color:#eef5ff;
    }

    .result-layout{
      display:grid;
      grid-template-columns:170px 1fr;
      gap:18px;
      align-items:center;
    }

    .result-planet-wrap{
      position:relative;
      min-height:170px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .result-planet-aura{
      position:absolute;
      width:160px;
      height:160px;
      border-radius:50%;
      background:
        radial-gradient(circle, color-mix(in srgb, var(--planet-core) 56%, white 8%), transparent 62%),
        radial-gradient(circle, rgba(103,233,255,.10), transparent 74%);
      filter:blur(14px);
      opacity:.95;
    }

    .result-planet{
      position:relative;
      width:110px;
      height:110px;
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 24%, rgba(255,255,255,.92), rgba(255,255,255,.14) 13%, transparent 20%),
        linear-gradient(150deg,var(--planet-core) 0%, var(--planet-core-2) 42%, var(--planet-core-3) 74%, #16100d 100%);
      box-shadow:
        inset -18px -22px 30px rgba(0,0,0,.38),
        inset 8px 8px 14px rgba(255,255,255,.06),
        0 0 30px var(--planet-glow-color),
        0 16px 26px rgba(0,0,0,.26);
      overflow:hidden;
      animation:planetFloat 5.5s ease-in-out infinite;
    }

    .result-planet::before{
      content:"";
      position:absolute;
      inset:9%;
      border-radius:50%;
      background:
        radial-gradient(circle at 25% 34%, rgba(255,255,255,.14), transparent 10%),
        radial-gradient(circle at 60% 28%, rgba(255,255,255,.12), transparent 8%),
        radial-gradient(circle at 58% 62%, rgba(0,0,0,.16), transparent 13%);
      opacity:.9;
    }

    .result-planet-ring{
      position:absolute;
      width:142px;
      height:42px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.14);
      transform:rotateX(78deg) rotateZ(-14deg);
      opacity:var(--planet-ring-opacity);
      box-shadow:0 0 18px rgba(255,255,255,.06);
    }

    .result-stats{
      display:grid;
      gap:10px;
    }

    .result-title{
      font-size:20px;
      font-weight:900;
      color:#f6f9ff;
      line-height:1.35;
    }

    .result-desc{
      color:#d3deff;
      font-size:14px;
      line-height:1.75;
    }

    .result-metrics{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:10px;
      margin-top:4px;
    }

    .metric-card{
      padding:12px;
      border-radius:16px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
    }

    .metric-card .label{
      font-size:11px;
      color:#aebbe4;
      text-transform:uppercase;
      letter-spacing:.08em;
      font-weight:800;
      margin-bottom:5px;
    }

    .metric-card .value{
      font-size:18px;
      font-weight:900;
      color:#ffffff;
    }

    .planet-reaction-text{
      margin-top:12px;
      font-size:13px;
      line-height:1.65;
      color:#d8e4ff;
      padding:11px 13px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.07);
    }

    .planet-particles{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:8;
    }

    .fx-particle{
      position:absolute;
      left:50%;
      top:50%;
      width:10px;
      height:10px;
      border-radius:50%;
      opacity:0;
      pointer-events:none;
    }

    .fx-particle.good{
      background:radial-gradient(circle, #fff, #67e9ff 45%, rgba(103,233,255,0));
      box-shadow:0 0 14px rgba(103,233,255,.8);
      animation:particleBurstGood 1s ease-out forwards;
    }

    .fx-particle.bad{
      background:radial-gradient(circle, #ffd4dc, #ff7a92 48%, rgba(255,122,146,0));
      box-shadow:0 0 14px rgba(255,122,146,.6);
      animation:particleBurstBad .9s ease-out forwards;
    }

    .planet-stage.is-boost .history-planet-shell{
      animation:boostPlanet .9s ease;
    }
    .planet-stage.is-damage .history-planet-shell{
      animation:damagePlanet .55s ease;
    }
    .planet-stage.is-boost .planet-aura{
      filter:blur(18px) saturate(1.2);
    }
    .planet-stage.is-damage .planet-night{
      background:linear-gradient(112deg,rgba(255,120,146,.05) 0%,rgba(255,255,255,0) 35%,rgba(0,0,0,.18) 58%,rgba(90,0,16,.36) 82%,rgba(45,0,10,.54) 100%);
    }
    .planet-stage.is-boost .planet-wave{
      animation:planetWavePulseFast .9s ease-out 2;
    }
    .planet-stage.is-damage .planet-wave{
      animation:planetWaveDamage 1s ease-out 1;
    }

    @keyframes hueShift{
      0%{transform:translate3d(0,0,0) scale(1);filter:blur(60px) hue-rotate(0)}
      50%{transform:translate3d(-2%,2%,0) scale(1.07);filter:blur(68px) hue-rotate(26deg)}
      100%{transform:translate3d(0,0,0) scale(1);filter:blur(60px) hue-rotate(0)}
    }
    @keyframes driftDust{from{transform:translate3d(0,0,0)}to{transform:translate3d(-60px,-40px,0)}}
    @keyframes driftStars{from{transform:translateY(0) translateX(0)}to{transform:translateY(-280px) translateX(-80px)}}
    @keyframes driftStarsReverse{from{transform:translateY(0) translateX(0)}to{transform:translateY(220px) translateX(60px)}}
    @keyframes twinkle{0%{opacity:.35;transform:scale(1)}100%{opacity:1;transform:scale(1.03)}}
    @keyframes shooting{
      0%,100%{opacity:0;transform:translate3d(0,0,0) rotate(-25deg) scaleX(.7)}
      8%{opacity:1}
      18%{opacity:0;transform:translate3d(-220px,140px,0) rotate(-25deg) scaleX(1)}
    }
    @keyframes planetFloat{0%,100%{transform:translateY(0) rotateZ(0)}50%{transform:translateY(-10px) rotateZ(.4deg)}}
    @keyframes auraPulse{0%,100%{transform:scale(1);opacity:.72}50%{transform:scale(1.08);opacity:1}}
    @keyframes surfaceDrift{from{transform:translateX(0) rotate(0)}to{transform:translateX(-10px) rotate(8deg)}}
    @keyframes atmosphereRotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    @keyframes bandShift{0%,100%{transform:rotate(-14deg) translateX(0);opacity:.55}50%{transform:rotate(-14deg) translateX(4px);opacity:.86}}
    @keyframes moonOrbit1{0%,100%{transform:translate3d(0,0,0) scale(1)}50%{transform:translate3d(8px,-10px,0) scale(1.08)}}
    @keyframes moonOrbit2{0%,100%{transform:translate3d(0,0,0) scale(1)}50%{transform:translate3d(-7px,8px,0) scale(.92)}}
    @keyframes planetWavePulse{0%{opacity:0;transform:scale(.82)}20%{opacity:.42}100%{opacity:0;transform:scale(1.22)}}
    @keyframes planetWavePulseFast{0%{opacity:.05;transform:scale(.84)}30%{opacity:.52}100%{opacity:0;transform:scale(1.28)}}
    @keyframes planetWaveDamage{0%{opacity:.08;transform:scale(.92)}35%{opacity:.45; box-shadow:0 0 22px rgba(255,122,146,.28)}100%{opacity:0;transform:scale(1.18)}}
    @keyframes haloPulseStage{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.74}50%{transform:translate(-50%,-50%) scale(1.06);opacity:1}}
    @keyframes starBlink{0%{opacity:.35;transform:scale(1)}100%{opacity:1;transform:scale(1.18)}}
    @keyframes miniFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes boostPlanet{
      0%{transform:scale(1) rotateZ(0deg)}
      30%{transform:scale(1.16) rotateZ(-1deg)}
      65%{transform:scale(1.08) rotateZ(1deg)}
      100%{transform:scale(1) rotateZ(0deg)}
    }
    @keyframes damagePlanet{
      0%{transform:translateX(0) rotate(0)}
      20%{transform:translateX(-8px) rotate(-2deg)}
      45%{transform:translateX(8px) rotate(2deg)}
      70%{transform:translateX(-5px) rotate(-1deg)}
      100%{transform:translateX(0) rotate(0)}
    }
    @keyframes particleBurstGood{
      0%{opacity:1; transform:translate(-50%,-50%) scale(.3)}
      100%{opacity:0; transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.55)}
    }
    @keyframes particleBurstBad{
      0%{opacity:.95; transform:translate(-50%,-50%) scale(.4)}
      100%{opacity:0; transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.25)}
    }

    @media (max-width:900px){
      .command-grid{grid-template-columns:1fr}
      .planet-column{min-height:auto}
      .result-layout{grid-template-columns:1fr}
      .result-planet-wrap{min-height:150px}
    }

    @media (max-width:720px){
      html,body{
        min-height:100%;
        overflow-x:hidden;
        overflow-y:auto;
      }

      .page{
        width:100%;
        padding:8px 8px 16px;
        min-height:100vh;
        height:auto;
      }

      .planet-stage{
        border-radius:22px;
        min-height:calc(100vh - 16px);
        height:auto;
        overflow:visible;
      }

      .planet-inner{
        padding:12px 10px 12px;
        height:auto;
        display:flex;
        flex-direction:column;
        gap:10px;
      }

      .top-head{
        gap:8px;
      }

      .planet-badge{
        padding:8px 12px;
        font-size:11px;
      }

      .command-grid{
        grid-template-columns:1fr;
        gap:10px;
      }

      .planet-column{
        min-height:unset;
        display:grid;
        grid-template-columns:120px 1fr;
        align-items:center;
        gap:10px;
        padding:6px 4px 2px;
      }

      .planet-wrap{
        min-height:auto;
        margin:0;
        width:120px;
        height:120px;
      }

      .planet-link-wrap{
        gap:6px;
      }

      .history-planet-shell,
      .history-planet{
        width:88px;
        height:88px;
      }

      .planet-link-wrap::before{
        width:170px;
        height:170px;
      }

      .planet-shadow{
        width:70%;
        height:12px;
        transform:translateY(-6px);
      }

      .planet-mini-status{
        max-width:none;
        text-align:left;
        padding:10px 12px;
        font-size:11px;
      }

      #mission-text{
        font-size:10.5px;
      }

      .floating-star,
      .mini-planet{
        display:none;
      }

      .mission-panel{
        min-height:0;
        height:auto;
        border-radius:22px;
        overflow:visible;
      }

      .mission-inner{
        padding:12px;
        height:auto;
        display:flex;
        flex-direction:column;
        min-height:0;
        overflow:visible;
      }

      .question-meta{
        margin-bottom:10px;
        gap:8px;
      }

      .progress-mini{
        font-size:11px;
      }

      .journey-bar{
        width:140px;
        height:8px;
      }

      .question{
        font-size:16px;
        line-height:1.45;
        margin-bottom:10px;
      }

      .options{
        gap:8px;
      }

      .option-btn{
        padding:10px 12px;
        font-size:13px;
        gap:10px;
        border-radius:14px;
      }

      .letter{
        width:28px;
        height:28px;
        font-size:12px;
      }

      .explanation{
        margin-top:10px;
        padding:12px 14px;
        font-size:12px;
        line-height:1.6;
      }

      .footer-controls{
        gap:8px;
        margin-top:10px;
        margin-bottom:10px;
      }

      .nav-btn{
        padding:10px 12px;
        font-size:13px;
        border-radius:12px;
      }

      .nav-grid{
        grid-template-columns:repeat(5,1fr);
        gap:6px;
      }

      .nav-dot{
        border-radius:10px;
        font-size:10px;
      }

      .conquest-banner{
        margin-top:10px;
        padding:14px;
        font-size:12px;
        line-height:1.6;
      }

      .result-title{font-size:17px}
      .result-metrics{grid-template-columns:1fr}
      .result-layout{gap:12px}
      .result-planet-wrap{min-height:120px}
      .result-planet{width:90px;height:90px}
      .result-planet-ring{width:118px;height:34px}
    }
  </style>
</head>
<body>
  <div class="universe">

  <script>
    const quizData = [
      { q: "Chủ tịch Hồ Chí Minh xuất thân trong một gia đình", a: "A", o: ["nhà nho yêu nước.", "tiểu tư sản trí thức.", "bần cố nông.", "tư sản dân tộc."], e: "Chính xác! Cụ Nguyễn Sinh Sắc thân phụ Người là một phó bảng nhà nho yêu nước.", w: "Chưa đúng. Tuy gia đình Người nghèo nhưng thuộc tầng lớp trí thức nho giáo yêu nước, không phải gia đình lao động thuần túy hay tư sản." },
      { q: "Năm 1908, Nguyễn Tất Thành có hoạt động nào sau đây?", a: "B", o: ["Ra Lời kêu gọi toàn quốc kháng chiến.", "Tham gia phong trào chống thuế ở Huế.", "Tham gia Hội Liên hiệp thuộc địa ở Pa-ri.", "Bắt đầu hành trình tìm đường cứu nước."], e: "Đúng. Đây là sự kiện đầu tiên thể hiện tinh thần nhập thế, đấu tranh vì dân của Người.", w: "Hoạt động này diễn ra muộn hơn. Năm 1908 Người còn đi học và tham gia biểu tình chống thuế tại Huế." },
      { q: "Nhân tố thúc đẩy Nguyễn Ái Quốc sang phương Tây tìm đường cứu nước (1911) là:", a: "B", o: ["Thất bại bước đầu của phong trào Đông Du.", "Những đòi hỏi bức thiết của toàn dân tộc.", "Sự phát triển của hệ thống xã hội chủ nghĩa.", "Ách thống trị tàn bạo của chế độ phát xít."], e: "Đúng! Cứu nước là yêu cầu khách quan của lịch sử lúc bấy giờ.", w: "Thời điểm 1911 chưa có phát xít hay hệ thống XHCN. Sự bế tắc của các phong trào cũ mới là nguyên nhân chính." },
      { q: "Trước năm 1911, tình hình Việt Nam có đặc điểm nổi bật nào?", a: "C", o: ["Mẫu thuẫn công nhân - địa chủ là cơ bản.", "Thực dân Pháp câu kết tay sai xâm lược.", "Phong trào chống Pháp diễn ra sôi nổi nhưng đều thất bại.", "Khuynh hướng phong kiến và tư sản cùng xuất hiện."], e: "Rất tốt. Chính vì thất bại nên Người mới phải ra đi tìm đường cứu nước mới.", w: "Lúc này mâu thuẫn dân tộc là chủ yếu. Các phong trào nổ ra sôi nổi nhưng chưa có đường lối đúng nên đều thất bại." },
      { q: "Yếu tố cơ bản tác động đến quyết định ra đi tìm đường cứu nước (1911) là:", a: "B", o: ["Phong trào theo khuynh hướng tư sản đã chấm dứt.", "Đất nước mất độc lập, sự nghiệp cứu nước bế tắc.", "Phong trào chống Pháp đã ngừng hoạt động.", "Nhân dân phản đối sĩ phu phong kiến."], e: "Đúng. Khủng hoảng về đường lối cứu nước là yếu tố trực tiếp nhất.", w: "Lưu ý: Phong trào chưa ngừng hẳn, nhưng sự bế tắc của các con đường hiện có mới là lý do thúc đẩy Người ra đi." },
      { q: "Từ năm 1890 đến năm 1911, Nguyễn Tất Thành có hoạt động tiêu biểu nào?", a: "A", o: ["Dạy học ở Trường Dục Thanh (Phan Thiết).", "Hoạt động yêu nước ở Pháp, Liên Xô.", "Trình bày tham luận ở Hội nghị Véc-xai.", "Mở lớp đào tạo cán bộ ở Trung Quốc."], e: "Chính xác. Người dạy học tại trường Dục Thanh (1910) trước khi vào Sài Gòn.", w: "Các hoạt động ở nước ngoài (Pháp, Liên Xô, Trung Quốc) đều diễn ra sau khi Người rời bến Nhà Rồng (1911)." },
      { q: "Trong những năm 1911-1919, Nguyễn Tất Thành có hoạt động tiêu biểu nào?", a: "A", o: ["Tìm hiểu thực tiễn các nước trên thế giới.", "Sáng lập Đảng Cộng sản Việt Nam.", "Tham gia sáng lập Đảng Cộng sản Pháp.", "Thành lập Thanh niên Cộng sản đoàn."], e: "Đúng. Đây là giai đoạn khảo sát, tích lũy thực tế quý báu tại nhiều nước.", w: "Việc sáng lập các tổ chức cộng sản chỉ bắt đầu từ năm 1920 khi Người đã tiếp cận chủ nghĩa Mác - Lênin." },
      { q: "Giai đoạn 1920-1930, hoạt động của Nguyễn Ái Quốc KHÔNG có sự kiện nào?", a: "C", o: ["Xác định con đường theo cách mạng vô sản.", "Lựa chọn con đường theo cách mạng vô sản.", "Trở về nước trực tiếp lãnh đạo giải phóng dân tộc.", "Chuẩn bị các điều kiện thành lập Đảng."], e: "Đúng. Người chỉ chính thức trở về nước trực tiếp lãnh đạo từ đầu năm 1941.", w: "Từ 1920-1930 là thời gian Người hoạt động ở nước ngoài để chuẩn bị mọi mặt cho việc thành lập Đảng." },
      { q: "Trong kháng chiến chống Pháp (1945-1954), Hồ Chí Minh có vai trò:", a: "A", o: ["Hoạch định đường lối xây dựng và bảo vệ chế độ.", "Đề ra kế hoạch Tổng tiến công ở Việt Bắc.", "Chủ trì Đại hội đại biểu lần III của Đảng.", "Trực tiếp chỉ đạo xây dựng CNXH miền Bắc."], e: "Đúng. Hồ Chí Minh là linh hồn, người vạch ra đường lối chiến lược.", w: "Kế hoạch quân sự do Bộ Tổng tư lệnh thực hiện. Đại hội III và xây dựng CNXH miền Bắc thuộc giai đoạn sau 1954." },
      { q: "Nguyễn Ái Quốc tìm thấy con đường cứu nước khi đang ở quốc gia nào?", a: "C", o: ["Anh.", "Liên Xô.", "Pháp.", "Trung Quốc."], e: "Chính xác. Paris (Pháp) là nơi Người đọc bản Sơ thảo Luận cương của Lênin tháng 7/1920.", w: "Dù đi nhiều nước, nhưng Pháp mới là nơi Người tìm thấy ánh sáng con đường giải phóng vô sản." },
      { q: "Nội dung SAI về yếu tố gia đình ảnh hưởng đến Hồ Chí Minh:", a: "A", o: ["Cụ Sắc rút ra bài học thất bại dân chủ tư sản.", "Truyền thống quê hương được gia đình nuôi dưỡng.", "Thân mẫu xuất thân nhà nho, sống chan hòa.", "Thân phụ là người thầy mẫu mực."], e: "Đúng. Cụ Nguyễn Sinh Sắc là nhà nho yêu nước, nhưng không liên quan đến bài học dân chủ tư sản.", w: "Các phương án còn lại đều phản ánh đúng về gia đình Người." },
      { q: "Hành trình tìm đường cứu nước của Người kết thúc khi:", a: "C", o: ["Gia nhập Hội người VN yêu nước (1917).", "Sáng lập Đảng Cộng sản Pháp (12/1920).", "Trở thành người Cộng sản Việt Nam đầu tiên (12/1920).", "Đọc Sơ thảo Luận cương của Lênin (7/1920)."], e: "Chính xác. Việc bỏ phiếu gia nhập Quốc tế III là dấu mốc hoàn thành việc tìm đường.", w: "Đọc Luận cương là tìm thấy, nhưng phải đến Đại hội Tua (12/1920) Người mới chính thức chọn con đường cộng sản." },
      { q: "Hoạt động nào KHÔNG phải của Người tại Trung Quốc?", a: "D", o: ["Mở lớp đào tạo cán bộ ở Quảng Châu.", "Thành lập Hội VN Cách mạng Thanh niên.", "Xuất bản tác phẩm Đường Kách mệnh.", "Tham dự Hội nghị Quốc tế Nông dân."], e: "Đúng. Hội nghị Quốc tế Nông dân diễn ra ở Liên Xô (1923).", w: "Các hoạt động ở Quảng Châu (mở lớp, lập Hội Thanh niên, viết sách) là trọng tâm hoạt động của Người tại Trung Quốc." },
      { q: "Sự phân hóa của Hội VNCM Thanh niên năm 1929 dẫn đến tổ chức nào?", a: "A", o: ["Đông Dương CS đảng, An Nam CS đảng.", "An Nam CS đảng, VN Quốc dân đảng.", "Đông Dương CS đảng, ĐDCS liên đoàn.", "ĐDCS liên đoàn, An Nam CS đảng."], e: "Chính xác. Sự phân hóa này dẫn tới sự ra đời của 2 tổ chức cộng sản liên tiếp.", w: "VN Quốc dân đảng và ĐDCS Liên đoàn không ra đời trực tiếp từ sự phân hóa của Hội Thanh niên." },
      { q: "Người chủ trì Hội nghị thành lập Đảng (1930) khi đang ở:", a: "D", o: ["Liên Xô.", "Thái Lan.", "Pháp.", "Trung Quốc."], e: "Đúng. Hội nghị diễn ra tại Cửu Long (Hương Cảng, Trung Quốc).", w: "Lúc đó Người từ Thái Lan sang Trung Quốc để triệu tập hội nghị hợp nhất." },
      { q: "Chiến lược và sách lược cách mạng VN được hoạch định hoàn chỉnh trong:", a: "A", o: ["Cương lĩnh chính trị đầu tiên (1930).", "Tác phẩm Đường Kách mệnh (1927).", "Luận cương chính trị (10/1930).", "Bản án chế độ thực dân Pháp (1925)."], e: "Chính xác. Cương lĩnh do Người soạn thảo mang tính đúng đắn và sáng tạo.", w: "Luận cương tháng 10 có phần máy móc, không đề cao vấn đề dân tộc như Cương lĩnh của Người." },
      { q: "Sự kiện kết thúc hành trình tìm đường cứu nước là:", a: "C", o: ["Gia nhập Hội người VN yêu nước (1917).", "Tham dự Đại hội Quốc tế III (1919).", "Lựa chọn con đường cách mạng vô sản (1920).", "Gửi bản Yêu sách nhân dân An Nam (1919)."], e: "Hoàn toàn đúng.", w: "Gửi yêu sách hay gia nhập Hội người yêu nước là các bước trung gian trong hành trình tìm tòi." },
      { q: "Tại Liên Xô (1923-1924), Nguyễn Ái Quốc tham dự:", a: "A", o: ["Hội nghị Quốc tế Nông dân.", "Thành lập Đảng Cộng sản Pháp.", "Thành lập Đảng Thanh niên.", "Thành lập Đảng Cộng sản."], e: "Đúng. Người tham dự Đại hội V Quốc tế Cộng sản và Quốc tế Nông dân.", w: "Đảng Pháp thành lập năm 1920 tại Pháp." },
      { q: "Yếu tố QUYẾT ĐỊNH việc Nguyễn Tất Thành ra đi tìm đường cứu nước:", a: "A", o: ["Đất nước bị khủng hoảng, bế tắc về đường lối.", "Truyền thống của gia đình và quê hương.", "Mong muốn tìm hiểu văn minh thế giới.", "Chế độ phong kiến không còn phù hợp."], e: "Chính xác. Nhu cầu lịch sử đòi hỏi một con đường mới.", w: "Gia đình là nền tảng, nhưng sự bế tắc của các tiền bối mới là động lực quyết định Người phải ra đi." }
    ];

    let currentIndex = 0;
    let correctCount = 0;
    const userAnswers = {};
    let audioCtx = null;
    let masterGain = null;

    const $ = id => document.getElementById(id);

    function initNav() {
      $("nav-grid").innerHTML = quizData.map((_, i) =>
        `<div class="nav-dot" id="nav-${i}" onclick="change(${i})">${i + 1}</div>`
      ).join("");
    }

    function ensureAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.16;
        masterGain.connect(audioCtx.destination);
      }
      return audioCtx;
    }

    async function warmupAudio() {
      const ctx = ensureAudioContext();
      if (ctx.state === "suspended") {
        await ctx.resume();
      }
    }

    async function playSoftCorrectSound() {
      try {
        const ctx = ensureAudioContext();
        if (ctx.state === "suspended") {
          await ctx.resume();
        }

        const now = ctx.currentTime;

        const notes = [
          { freq: 523.25, start: 0.00, dur: 0.12, type: "sine" },
          { freq: 659.25, start: 0.08, dur: 0.14, type: "triangle" },
          { freq: 783.99, start: 0.16, dur: 0.20, type: "triangle" }
        ];

        notes.forEach(note => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          const filter = ctx.createBiquadFilter();

          osc.type = note.type;
          osc.frequency.setValueAtTime(note.freq, now + note.start);

          filter.type = "lowpass";
          filter.frequency.setValueAtTime(2600, now + note.start);
          filter.Q.value = 1.2;

          gain.gain.setValueAtTime(0.0001, now + note.start);
          gain.gain.exponentialRampToValueAtTime(0.08, now + note.start + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + note.start + note.dur);

          osc.connect(filter);
          filter.connect(gain);
          gain.connect(masterGain);

          osc.start(now + note.start);
          osc.stop(now + note.start + note.dur);
        });

        const sparkle = ctx.createOscillator();
        const sparkleGain = ctx.createGain();
        sparkle.type = "sine";
        sparkle.frequency.setValueAtTime(1046.5, now + 0.18);
        sparkle.frequency.exponentialRampToValueAtTime(1318.5, now + 0.34);
        sparkleGain.gain.setValueAtTime(0.0001, now + 0.18);
        sparkleGain.gain.exponentialRampToValueAtTime(0.03, now + 0.22);
        sparkleGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.38);
        sparkle.connect(sparkleGain);
        sparkleGain.connect(masterGain);
        sparkle.start(now + 0.18);
        sparkle.stop(now + 0.38);
      } catch (e) {
        console.log("Audio error:", e);
      }
    }

    function getAnsweredCount() {
      return Object.keys(userAnswers).length;
    }

    function getConquestPercent() {
      return quizData.length ? correctCount / quizData.length : 0;
    }

    function getCompletionPercent() {
      return quizData.length ? getAnsweredCount() / quizData.length : 0;
    }

    function getConquestLabel() {
      const p = getConquestPercent();
      if (p >= 0.9) return "Thống lĩnh hành tinh";
      if (p >= 0.72) return "Khai phá thành công";
      if (p >= 0.5) return "Đổ bộ hiệu quả";
      if (p > 0) return "Thăm dò bề mặt";
      return "Khởi động thám hiểm";
    }

    function getStabilityLabel() {
      const answered = getAnsweredCount();
      if (!answered) return "Ổn định cơ bản";
      const rate = correctCount / answered;
      if (rate >= 0.85) return "Lõi hành tinh rất ổn định";
      if (rate >= 0.65) return "Năng lượng đang cân bằng";
      if (rate >= 0.45) return "Nhiễu động trung bình";
      return "Xuất hiện rung chấn dữ liệu";
    }

    function getPlanetVisualStage() {
      const p = getConquestPercent();
      if (p >= 0.9) {
        return {
          name: "Hành tinh vương giả",
          core: "#ffe78c",
          core2: "#ffb347",
          core3: "#b5651d",
          glow: "rgba(255,222,120,.34)",
          ringOpacity: ".92",
          sat: 1.25,
          bright: 1.12,
          surfaceOpacity: .96,
          reaction: "Hành tinh đã phát triển tới trạng thái cực thịnh, vòng năng lượng mở rộng tối đa."
        };
      }
      if (p >= 0.72) {
        return {
          name: "Hành tinh khai sáng",
          core: "#a9fff5",
          core2: "#57d6ff",
          core3: "#2564c7",
          glow: "rgba(103,233,255,.30)",
          ringOpacity: ".80",
          sat: 1.2,
          bright: 1.06,
          surfaceOpacity: .9,
          reaction: "Bề mặt hành tinh sáng rõ, lõi tri thức vận hành mạnh và quỹ đạo đã ổn định."
        };
      }
      if (p >= 0.5) {
        return {
          name: "Hành tinh tăng trưởng",
          core: "#ffd07c",
          core2: "#df8e36",
          core3: "#7a4a23",
          glow: "rgba(255,190,99,.27)",
          ringOpacity: ".65",
          sat: 1.04,
          bright: 1.0,
          surfaceOpacity: .84,
          reaction: "Hành tinh đã mở rộng vùng kiểm soát, nhưng vẫn còn khu vực cần tiếp tục chinh phục."
        };
      }
      if (p > 0) {
        return {
          name: "Hành tinh thăm dò",
          core: "#ffc59d",
          core2: "#c7775a",
          core3: "#5c2f29",
          glow: "rgba(255,140,110,.22)",
          ringOpacity: ".46",
          sat: .98,
          bright: .95,
          surfaceOpacity: .76,
          reaction: "Hành tinh mới chỉ được khai phá một phần, tín hiệu còn dao động và chưa ổn định."
        };
      }
      return {
        name: "Hành tinh sơ khai",
        core: "#c8b79f",
        core2: "#8f6d53",
        core3: "#45362f",
        glow: "rgba(210,180,140,.16)",
        ringOpacity: ".40",
        sat: .85,
        bright: .88,
        surfaceOpacity: .68,
        reaction: "Lõi hành tinh còn ngủ yên, cần trả lời đúng nhiều hơn để đánh thức năng lượng."
      };
    }

    function spawnPlanetParticles(type) {
      const holder = $("planetParticles");
      if (!holder) return;
      const count = type === "good" ? 10 : 8;

      for (let i = 0; i < count; i++) {
        const p = document.createElement("span");
        p.className = `fx-particle ${type === "good" ? "good" : "bad"}`;
        const angle = Math.random() * Math.PI * 2;
        const distance = type === "good" ? 50 + Math.random() * 54 : 34 + Math.random() * 42;
        const dx = Math.cos(angle) * distance + "px";
        const dy = Math.sin(angle) * distance + "px";
        p.style.setProperty("--dx", dx);
        p.style.setProperty("--dy", dy);
        p.style.width = `${6 + Math.random() * 8}px`;
        p.style.height = p.style.width;
        p.style.animationDelay = `${Math.random() * 0.08}s`;
        holder.appendChild(p);
        p.addEventListener("animationend", () => p.remove());
      }
    }

    function updatePlanetState(lastResult = null) {
      const conquest = getConquestPercent();
      const energy = 0.18 + conquest * 0.85;
      const scale = 1 + conquest * 0.18;
      const hue = conquest * 8;
      const visual = getPlanetVisualStage();

      document.documentElement.style.setProperty("--planet-energy", energy.toFixed(3));
      document.documentElement.style.setProperty("--planet-scale", scale.toFixed(3));
      document.documentElement.style.setProperty("--planet-bright", visual.bright.toFixed(3));
      document.documentElement.style.setProperty("--planet-sat", visual.sat.toFixed(3));
      document.documentElement.style.setProperty("--planet-hue", `${hue.toFixed(1)}deg`);
      document.documentElement.style.setProperty("--planet-core", visual.core);
      document.documentElement.style.setProperty("--planet-core-2", visual.core2);
      document.documentElement.style.setProperty("--planet-core-3", visual.core3);
      document.documentElement.style.setProperty("--planet-ring-opacity", visual.ringOpacity);
      document.documentElement.style.setProperty("--planet-glow-color", visual.glow);
      document.documentElement.style.setProperty("--planet-surface-pattern-opacity", visual.surfaceOpacity);

      $("conquest-level").textContent = getConquestLabel();
      $("planet-stability").textContent = getStabilityLabel();
      $("scan-progress").textContent = `${correctCount} / ${quizData.length} mốc đã chinh phục`;

      const remain = quizData.length - getAnsweredCount();
      if (remain > 0) {
        $("mission-text").textContent =
          lastResult === "correct"
            ? `Hành tinh hấp thụ thêm năng lượng. Còn ${remain} câu để tiếp tục tiến hóa.`
            : lastResult === "wrong"
            ? `Hành tinh vừa xuất hiện rung chấn. Còn ${remain} câu để phục hồi quỹ đạo.`
            : `Còn ${remain} câu để hoàn tất chiến dịch chinh phục hành tinh.`;
      } else {
        $("mission-text").textContent = `Chiến dịch kết thúc. Trạng thái cuối: ${visual.name}.`;
      }

      const stage = $("planetStage");
      stage.classList.remove("is-boost", "is-damage");

      if (lastResult === "correct") {
        stage.classList.add("is-boost");
        spawnPlanetParticles("good");
      }
      if (lastResult === "wrong") {
        stage.classList.add("is-damage");
        spawnPlanetParticles("bad");
      }

      clearTimeout(updatePlanetState.effectTimer);
      updatePlanetState.effectTimer = setTimeout(() => {
        stage.classList.remove("is-boost", "is-damage");
      }, 900);

      if (lastResult === "wrong") {
        document.documentElement.style.setProperty("--planet-shake", "2px");
        setTimeout(() => {
          document.documentElement.style.setProperty("--planet-shake", "0px");
        }, 320);
      }
    }

    function getFinalSummary() {
      const percent = Math.round(getConquestPercent() * 100);

      if (percent >= 90) {
        return {
          title: "👑 Thống lĩnh hành tinh",
          desc: "Bạn đã chinh phục gần như hoàn toàn Hành Tinh Lịch Sử. Lõi tri thức đã được kích hoạt ở mức tối đa."
        };
      }
      if (percent >= 72) {
        return {
          title: "🚀 Khai phá thành công",
          desc: "Bạn đã kiểm soát phần lớn hành tinh. Những mốc lịch sử trọng yếu đã được mở khóa rõ rệt."
        };
      }
      if (percent >= 50) {
        return {
          title: "🛰️ Đổ bộ hiệu quả",
          desc: "Bạn đã xây được vùng căn cứ ổn định trên hành tinh. Chỉ cần ôn thêm để chinh phục hoàn toàn."
        };
      }
      return {
        title: "🌌 Thăm dò bề mặt",
        desc: "Bạn đã có dữ liệu nền, nhưng hành tinh vẫn còn nhiều vùng chưa được khai phá. Cần ôn lại để quay lại mạnh hơn."
      };
    }

    function showFinalBanner() {
      const banner = $("conquest-banner");
      const percent = Math.round(getConquestPercent() * 100);
      const answered = getAnsweredCount();
      const missed = quizData.length - correctCount;
      const summary = getFinalSummary();
      const visual = getPlanetVisualStage();

      banner.style.display = "block";
      banner.innerHTML = `
        <div class="result-panel-head">
          <div>
            <div class="result-title">${summary.title}</div>
            <div class="result-desc">${summary.desc}</div>
          </div>
          <div class="result-badge">Trạng thái cuối: ${visual.name}</div>
        </div>

        <div class="result-layout">
          <div class="result-planet-wrap">
            <div class="result-planet-aura"></div>
            <div class="result-planet"></div>
            <div class="result-planet-ring"></div>
          </div>

          <div class="result-stats">
            <div class="result-metrics">
              <div class="metric-card">
                <div class="label">Độ chinh phục</div>
                <div class="value">${percent}%</div>
              </div>
              <div class="metric-card">
                <div class="label">Câu đúng</div>
                <div class="value">${correctCount}/${quizData.length}</div>
              </div>
              <div class="metric-card">
                <div class="label">Câu chưa đúng</div>
                <div class="value">${missed}</div>
              </div>
            </div>

            <div class="planet-reaction-text">
              <strong>Biến đổi hành tinh:</strong> ${visual.reaction}<br>
              <strong>Tiến độ hoàn thành:</strong> ${answered}/${quizData.length} câu đã mở.
            </div>
          </div>
        </div>
      `;
    }

    function updateJourneyUI(lastResult = null) {
      $("journey-fill").style.width = `${getCompletionPercent() * 100}%`;
      updatePlanetState(lastResult);

      if (getAnsweredCount() === quizData.length) {
        showFinalBanner();
      } else {
        $("conquest-banner").style.display = "none";
      }
    }

    function render(scrollTop = false, lastResult = null) {
      const data = quizData[currentIndex];
      const answered = userAnswers[currentIndex] !== undefined;

      $("question").textContent = `Câu ${currentIndex + 1}: ${data.q}`;
      $("progress-text").textContent = `CÂU ${currentIndex + 1} / ${quizData.length}`;

      $("options").innerHTML = data.o.map((text, i) => {
        const char = String.fromCharCode(65 + i);
        const isCorrect = char === data.a;
        const isWrong = char === userAnswers[currentIndex] && !isCorrect;
        const cls = answered ? (isCorrect ? "correct" : isWrong ? "wrong" : "") : "";
        const dim = answered && !isCorrect && !isWrong ? 'style="opacity:.35"' : "";
        return `
          <button class="option-btn ${cls}" ${answered ? "disabled" : `onclick="select('${char}')"`} ${dim}>
            <div class="letter">${char}</div><span>${text}</span>
          </button>
        `;
      }).join("");

      const expBox = $("explanation-box");
      if (answered) {
        const ok = userAnswers[currentIndex] === data.a;
        expBox.style.display = "block";
        expBox.style.borderLeft = `4px solid var(${ok ? "--success" : "--warning"})`;
        expBox.style.background = ok ? "rgba(18,64,42,.16)" : "rgba(66,38,12,.16)";
        expBox.style.color = ok ? "#ddffef" : "#fff1df";
        expBox.innerHTML = ok
          ? `<strong>✅ Tín hiệu chính xác:</strong> ${data.e}`
          : `<strong>⚠️ Dữ liệu cần hiệu chỉnh:</strong> ${data.w}`;
      } else {
        expBox.style.display = "none";
        expBox.innerHTML = "";
      }

      quizData.forEach((item, i) => {
        const dot = $(`nav-${i}`);
        if (!dot) return;
        dot.className = "nav-dot";
        if (i === currentIndex) dot.classList.add("active");
        if (userAnswers[i] !== undefined) {
          dot.classList.add(userAnswers[i] === item.a ? "done-correct" : "done-wrong");
        }
      });

      $("btn-prev").disabled = currentIndex === 0;
      $("btn-next").textContent = currentIndex === quizData.length - 1 ? "Hoàn tất chiến dịch →" : "Tiếp theo →";

      updateJourneyUI(lastResult);

      if (scrollTop) {
        if (window.innerWidth > 720) {
          document.querySelector(".mission-panel")?.scrollIntoView({ behavior: "smooth", block: "start" });
        } else {
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      }
    }

    async function select(char) {
      if (userAnswers[currentIndex] !== undefined) return;

      try {
        await warmupAudio();
      } catch (e) {}

      userAnswers[currentIndex] = char;
      const isCorrect = char === quizData[currentIndex].a;

      if (isCorrect) {
        correctCount++;
        playSoftCorrectSound();
      }

      render(false, isCorrect ? "correct" : "wrong");
    }

    function change(idx) {
      if (idx < 0) return;

      if (idx >= quizData.length) {
        if (getAnsweredCount() < quizData.length) {
          currentIndex = quizData.findIndex((_, i) => userAnswers[i] === undefined);
          if (currentIndex < 0) currentIndex = quizData.length - 1;
          render(true);
          return;
        }
        showFinalBanner();
        document.querySelector(".conquest-banner")?.scrollIntoView({ behavior: "smooth", block: "center" });
        return;
      }

      currentIndex = idx;
      render(true);
    }

    async function unlockAudio() {
      try {
        await warmupAudio();
      } catch (e) {}
      document.removeEventListener("touchstart", unlockAudio);
      document.removeEventListener("click", unlockAudio);
    }

    document.addEventListener("touchstart", unlockAudio, { passive: true });
    document.addEventListener("click", unlockAudio);

    const planetStage = $("planetStage");
    const planetTilt = $("planetTilt");

    if (planetStage && planetTilt && window.innerWidth > 720) {
      planetStage.addEventListener("mousemove", e => {
        const rect = planetStage.getBoundingClientRect();
        const rotateY = (e.clientX - rect.left - rect.width / 2) / 35;
        const rotateX = (rect.height / 2 - (e.clientY - rect.top)) / 42;
        planetTilt.style.transform = `translateY(-4px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
      });

      planetStage.addEventListener("mouseleave", () => {
        planetTilt.style.transform = "";
      });
    }

    initNav();
    render(false);
  </script>
</body>
</html>
