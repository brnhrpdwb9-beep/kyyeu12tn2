<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <meta name="theme-color" content="#050918">
  <title>Hành Tinh Sinh Học</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg-1:#02090a;
      --bg-2:#071713;
      --bg-3:#0d2e23;
      --bg-4:#163224;

      --text:#eef4ff;
      --muted:#b8d8c0;
      --success:#39d98a;
      --warning:#ffb763;
      --danger:#ff7a92;

      --planet-energy:.28;
      --planet-scale:1;
      --planet-hue:0deg;
      --planet-sat:1;
      --planet-bright:1;
      --planet-contrast:1;
      --planet-depth:.14;
      --planet-shadow-strength:.34;

      --planet-core:#e8ff8a;
      --planet-core-2:#68c84d;
      --planet-core-3:#154329;
      --planet-glow-color:rgba(132,255,146,.26);

      --planet-ring-opacity:.18;
      --planet-surface-pattern-opacity:.78;

      --planet-crack:0;
      --fracture-intensity:0;
      --fragment-opacity:0;
      --fragment-burst:0;
      --fragment-heat:0;
      --hole-opacity:0;
      --orbit-emphasis:0;
      --orbit-scale:1;
      --orbit-speed:1;
      --orbit-dash-opacity:.16;

      --lava-opacity:0;
      --ice-opacity:0;
      --continent-opacity:0;
      --continent-glow-opacity:0;
      --cloud-opacity:0;
      --ocean-opacity:0;
      --aurora-opacity:0;
      --debris-opacity:0;

      --ring-thin-opacity:0;
      --ring-outer-opacity:0;
      --ring-burst-scale:1;
      --ring-count-boost:1;

      --mini-planet-1:#d8ff8f;
      --mini-planet-2:#85dd6a;
      --mini-planet-3:#f0ffd0;
      --mini-planet-glow:rgba(149,255,172,.18);
      --mini-orbit-shift:0px;

      --mini-visible-1:0;
      --mini-visible-2:0;
      --mini-visible-3:0;
      --mini-visible-4:0;
      --mini-visible-5:0;

      --camera-zoom:1;
      --camera-rot-x:0deg;
      --camera-rot-y:0deg;

      --fx-blur-nebula:42px;
      --fx-blur-stage:22px;
      --fx-blur-aura:14px;
      --use-backdrop:1;
    }

    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{
      min-height:100%;
      font-family:"Inter",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 14% 18%, rgba(137,255,166,.18), transparent 18%),
        radial-gradient(circle at 84% 14%, rgba(73,212,149,.12), transparent 20%),
        radial-gradient(circle at 50% 78%, rgba(202,255,112,.10), transparent 22%),
        radial-gradient(circle at 48% 50%, rgba(255,255,255,.03), transparent 26%),
        linear-gradient(135deg,var(--bg-1),var(--bg-2) 38%,var(--bg-3) 72%,var(--bg-4));
      overflow-x:hidden;
      overflow-y:auto;
    }
    body{position:relative}
    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:1;
    }
    body::before{
      background:
        radial-gradient(circle at 12% 24%, rgba(210,255,190,.08) 0 1.4%, transparent 1.8%),
        radial-gradient(circle at 26% 68%, rgba(120,255,156,.07) 0 1.2%, transparent 1.7%),
        radial-gradient(circle at 72% 34%, rgba(198,255,141,.07) 0 1.5%, transparent 1.9%),
        radial-gradient(circle at 82% 74%, rgba(110,255,168,.06) 0 1.3%, transparent 1.8%);
      background-size:260px 260px, 340px 340px, 300px 300px, 380px 380px;
      opacity:.65;
      animation:driftDust 88s linear infinite reverse;
    }
    body::after{
      background:
        radial-gradient(circle at 20% 30%, rgba(124,255,146,.05), transparent 18%),
        radial-gradient(circle at 78% 26%, rgba(228,255,143,.04), transparent 16%),
        radial-gradient(circle at 60% 72%, rgba(118,231,151,.04), transparent 20%);
      filter:blur(26px);
      opacity:.7;
    }
    button{font-family:inherit}

    .universe,.stars,.stars2,.stars3,.cosmic-dust,.space-grid,.nebula-detail{position:absolute;inset:0}
    .universe{
      position:fixed;
      overflow:hidden;
      z-index:0;
      pointer-events:none;
      transform:translateZ(0);
      contain:layout paint style;
    }

    .nebula,.nebula::before,.nebula::after{
      content:"";
      position:absolute;
      inset:-16%;
      animation:hueShift 24s linear infinite;
      filter:blur(var(--fx-blur-nebula));
      transform:translateZ(0);
    }
    .nebula{
      background:
        radial-gradient(circle at 15% 28%, rgba(116,255,154,.20), transparent 14%),
        radial-gradient(circle at 78% 20%, rgba(76,214,155,.16), transparent 16%),
        radial-gradient(circle at 45% 76%, rgba(217,255,120,.12), transparent 18%),
        radial-gradient(circle at 60% 48%, rgba(255,255,255,.05), transparent 7%);
      opacity:.95;
    }
    .nebula::before{
      background:
        radial-gradient(circle at 24% 64%, rgba(170,255,131,.14), transparent 14%),
        radial-gradient(circle at 68% 58%, rgba(108,255,182,.10), transparent 14%),
        radial-gradient(circle at 88% 70%, rgba(201,255,164,.09), transparent 12%);
      animation-duration:30s;
      mix-blend-mode:screen;
    }
    .nebula::after{
      background:
        radial-gradient(circle at 48% 36%, rgba(255,255,255,.07), transparent 9%),
        radial-gradient(circle at 56% 28%, rgba(111,255,166,.09), transparent 12%),
        radial-gradient(circle at 36% 84%, rgba(222,255,127,.08), transparent 14%);
      animation-duration:36s;
      mix-blend-mode:screen;
    }

    .nebula-detail{
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.04), transparent 1.2%),
        radial-gradient(circle at 40% 72%, rgba(255,255,255,.03), transparent 1.4%),
        radial-gradient(circle at 70% 40%, rgba(120,255,164,.05), transparent 1.8%),
        radial-gradient(circle at 82% 60%, rgba(198,255,121,.05), transparent 1.6%);
      background-size:520px 520px,640px 640px,780px 780px,840px 840px;
      opacity:.55;
      filter:blur(1px);
      animation:driftDust 56s linear infinite;
    }

    .space-grid{
      background:
        linear-gradient(rgba(130,223,169,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(130,223,169,.04) 1px, transparent 1px);
      background-size:90px 90px;
      mask-image:radial-gradient(circle at center, rgba(0,0,0,.9), transparent 88%);
      opacity:.22;
      transform:perspective(1200px) rotateX(78deg) scale(1.8) translateY(16%);
      transform-origin:center center;
    }

    .cosmic-dust{
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.45), transparent),
        radial-gradient(1px 1px at 24% 66%, rgba(142,255,181,.34), transparent),
        radial-gradient(1px 1px at 48% 42%, rgba(255,255,255,.34), transparent),
        radial-gradient(1px 1px at 60% 74%, rgba(201,255,135,.24), transparent),
        radial-gradient(1px 1px at 82% 30%, rgba(255,255,255,.42), transparent),
        radial-gradient(1px 1px at 90% 64%, rgba(111,244,175,.28), transparent);
      background-size:360px 360px;
      opacity:.62;
      animation:driftDust 72s linear infinite reverse;
    }

    .stars,.stars2,.stars3{
      background-repeat:repeat;
      animation-timing-function:linear;
      animation-iteration-count:infinite;
      transform:translateZ(0);
    }
    .stars{
      background-image:
        radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.5px 1.5px at 120px 80px, rgba(130,190,255,.95), transparent),
        radial-gradient(2px 2px at 250px 140px, rgba(255,255,255,.9), transparent),
        radial-gradient(1.8px 1.8px at 350px 40px, rgba(178,125,255,.95), transparent),
        radial-gradient(2px 2px at 500px 160px, rgba(97,231,255,.95), transparent),
        radial-gradient(1.5px 1.5px at 700px 60px, rgba(255,255,255,.85), transparent);
      background-size:800px 300px;
      animation:driftStars 100s linear infinite;
      opacity:.9;
    }
    .stars2{
      background-image:
        radial-gradient(1.2px 1.2px at 40px 60px, rgba(255,255,255,.85), transparent),
        radial-gradient(1.7px 1.7px at 200px 120px, rgba(97,231,255,.75), transparent),
        radial-gradient(1.2px 1.2px at 420px 40px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.3px 1.3px at 600px 200px, rgba(170,140,255,.8), transparent),
        radial-gradient(1.5px 1.5px at 760px 100px, rgba(255,255,255,.8), transparent);
      background-size:900px 380px;
      animation:driftStarsReverse 145s linear infinite;
      opacity:.55;
    }
    .stars3{
      background-image:
        radial-gradient(3px 3px at 100px 90px, rgba(255,255,255,.9), transparent),
        radial-gradient(2.5px 2.5px at 500px 60px, rgba(97,231,255,.9), transparent),
        radial-gradient(3px 3px at 780px 170px, rgba(186,122,255,.85), transparent);
      background-size:1000px 420px;
      animation:twinkle 7s ease-in-out infinite alternate;
      opacity:.7;
      filter:drop-shadow(0 0 4px rgba(255,255,255,.22));
    }

    .page{
      position:relative;
      z-index:2;
      width:min(1040px,calc(100% - 20px));
      margin:0 auto;
      padding:20px 0 34px;
    }

    .planet-stage{
      position:relative;
      min-height:760px;
      overflow:hidden;
      border-radius:34px;
      background:
        radial-gradient(circle at top right, rgba(120,255,156,.08), transparent 24%),
        radial-gradient(circle at bottom left, rgba(212,255,131,.05), transparent 22%),
        linear-gradient(180deg, rgba(8,25,20,.58), rgba(6,16,18,.32));
      border:1px solid rgba(145,232,168,.12);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 20px 50px rgba(0,0,0,.14),0 0 0 1px rgba(102,205,142,.05);
      contain:layout paint;
    }
    .planet-stage::before{
      content:"";
      position:absolute;left:50%;top:34%;width:760px;height:760px;transform:translate(-50%,-50%);
      border-radius:50%;
      background:
        radial-gradient(circle, rgba(167,255,135,.18), transparent 40%),
        radial-gradient(circle, rgba(91,222,134,.11), transparent 50%),
        radial-gradient(circle, rgba(235,255,182,.08), transparent 62%);
      filter:blur(var(--fx-blur-stage));
      z-index:0;
      animation:haloPulseStage 10s ease-in-out infinite;
    }
    .planet-stage::after{
      content:"";
      position:absolute;left:50%;top:30%;width:560px;height:560px;transform:translate(-50%,-50%);
      border-radius:50%;
      border:1px dashed rgba(146,241,164,.12);
      opacity:.45;
      z-index:0;
    }

    .planet-inner{
      position:relative;
      z-index:2;
      padding:24px 18px 20px;
      display:grid;
      gap:20px;
      grid-template-columns:1fr;
    }

    .top-head{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
      text-align:center;
    }

    .planet-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      background:linear-gradient(145deg, rgba(18,53,39,.58), rgba(10,24,18,.40));
      border:1px solid rgba(145,235,169,.18);
      color:#effff1;
      font-size:12px;
      font-weight:800;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 10px 18px rgba(0,0,0,.18),0 0 18px rgba(112,232,146,.08);
    }
    .planet-badge::before{
      content:"";
      width:8px;height:8px;border-radius:50%;
      background:linear-gradient(135deg,#d7ff89,#60d65b);
      box-shadow:0 0 12px rgba(135,255,146,.58);
    }

    .command-grid{
      display:grid;
      grid-template-columns:360px minmax(0,1fr);
      gap:24px;
      align-items:start;
    }

    .planet-column{
      position:relative;
      min-height:560px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
    }

    .floating-star,.mini-planet{
      position:absolute;
      border-radius:50%;
      transform:translateZ(0);
    }
    .floating-star{
      background:#fff;
      opacity:.65;
      filter:drop-shadow(0 0 4px rgba(255,255,255,.45));
      z-index:0;
      animation:starBlink 5s ease-in-out infinite alternate;
    }
    .floating-star.s1{width:5px;height:5px;top:48px;left:28px;animation-delay:.2s}
    .floating-star.s2{width:4px;height:4px;top:140px;right:42px;animation-delay:1s}
    .floating-star.s3{width:6px;height:6px;top:250px;left:58px;animation-delay:2s}
    .floating-star.s4{width:4px;height:4px;bottom:180px;right:60px;animation-delay:1.5s}
    .floating-star.s5{width:5px;height:5px;bottom:110px;left:44px;animation-delay:2.8s}
    .floating-star.s6{width:4px;height:4px;top:52%;left:14%;animation-delay:2.1s}
    .floating-star.s7{width:6px;height:6px;top:20%;right:18%;animation-delay:.8s}

    .mini-planet{
      box-shadow:
        inset -8px -10px 14px rgba(0,0,0,.34),
        inset 5px 5px 8px rgba(255,255,255,.06),
        0 0 14px var(--mini-planet-glow);
      animation:miniFloat 8s ease-in-out infinite;
      opacity:.95;
      transition:transform .4s ease, background .45s ease, box-shadow .45s ease, filter .45s ease;
    }
    .mini-planet.one{
      width:24px;height:24px;top:17%;left:10%;
      background:linear-gradient(145deg,var(--mini-planet-1), #9f7330 62%, #2e1a06);
    }
    .mini-planet.two{
      width:18px;height:18px;right:12%;top:34%;
      background:linear-gradient(145deg,var(--mini-planet-2), #91591c 62%, #351c03);
      animation-delay:1.2s
    }
    .mini-planet.three{
      width:16px;height:16px;left:16%;bottom:17%;
      background:linear-gradient(145deg,var(--mini-planet-3), #7f5e22 62%, #362505);
      animation-delay:2.2s
    }

    .planet-wrap{
      position:relative;
      width:100%;
      min-height:360px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:8px 0 12px;
      perspective:1400px;
      transform-style:preserve-3d;
    }

    .mini-orbit-system{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      z-index:1;
      contain:layout paint;
    }
    .mini-orbit-track{
      position:absolute;
      left:50%;
      top:50%;
      border-radius:50%;
      border:1px solid rgba(255,232,180,.12);
      box-shadow:0 0 8px rgba(255,206,94,.04);
      transform-style:preserve-3d;
      will-change:transform,opacity;
      transition:opacity .35s ease, transform .35s ease;
      filter:drop-shadow(0 0 6px rgba(255,214,108,.08));
      overflow:visible;
    }

    .mini-orbit-track .mini-orbit-planet{display:none}

    .mini-orbit-track.m1{
      width:160px;height:66px;
      transform:translate(-50%,-50%) rotateX(76deg) rotateZ(-10deg);
      animation:miniOrbitSpin1 16s linear infinite;
      opacity:var(--mini-visible-1);
    }
    .mini-orbit-track.m2{
      width:196px;height:82px;
      transform:translate(-50%,-50%) rotateX(77deg) rotateZ(18deg);
      animation:miniOrbitSpin2 22s linear infinite reverse;
      opacity:var(--mini-visible-2);
    }
    .mini-orbit-track.m3{
      width:228px;height:96px;
      transform:translate(-50%,-50%) rotateX(74deg) rotateZ(-32deg);
      animation:miniOrbitSpin3 28s linear infinite;
      opacity:var(--mini-visible-3);
    }
    .mini-orbit-track.m4{
      width:258px;height:112px;
      transform:translate(-50%,-50%) rotateX(73deg) rotateZ(36deg);
      animation:miniOrbitSpin4 34s linear infinite reverse;
      opacity:var(--mini-visible-4);
    }
    .mini-orbit-track.m5{
      width:294px;height:128px;
      transform:translate(-50%,-50%) rotateX(72deg) rotateZ(-20deg);
      animation:miniOrbitSpin5 42s linear infinite;
      opacity:var(--mini-visible-5);
    }

    .planet-camera{
      position:relative;
      transform-style:preserve-3d;
      transform:scale(var(--camera-zoom)) rotateX(var(--camera-rot-x)) rotateY(var(--camera-rot-y));
      transition:transform .42s ease;
      z-index:3;
      will-change:transform;
    }

    .planet-link-wrap{
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
      z-index:3;
      transition:transform .18s linear;
      transform:translate3d(0,0,0);
      will-change:transform;
    }
    .planet-link-wrap::before{
      content:"";
      position:absolute;
      width:280px;
      height:280px;
      border-radius:50%;
      background:
        radial-gradient(circle, rgba(255,207,92,.18), transparent 54%),
        radial-gradient(circle, rgba(255,153,59,.08), transparent 72%);
      filter:blur(12px);
      opacity:.95;
      z-index:-2;
    }

    .history-planet-shell,.result-shell{
      position:relative;
      width:130px;height:130px;
      display:flex;
      align-items:center;
      justify-content:center;
      transform-style:preserve-3d;
      transition:transform .28s ease,filter .28s ease;
      filter:
        hue-rotate(var(--planet-hue))
        saturate(var(--planet-sat))
        brightness(var(--planet-bright))
        contrast(var(--planet-contrast));
      transform:translateZ(0);
      will-change:transform,filter;
    }
    .result-shell{
      width:110px;height:110px;
      transform:none !important;
      animation:none !important;
    }

    .planet-aura,.planet-wave,.planet-bloom,.planet-shockwave,.planet-flare,
    .planet-moon-orbit,.planet-ring,.planet-atmosphere,.planet-surface,.planet-night,
    .planet-band,.planet-moon,.planet-crater,.planet-ocean,.planet-clouds,.planet-aurora,
    .planet-debris,.planet-continents-glow,.planet-crack-svg,.planet-fragments,
    .planet-hole-svg,.planet-hole-rim,.planet-core-exposed,.planet-evolution-orbits{
      position:absolute;
      border-radius:50%;
    }

    .planet-aura{
      inset:-26%;
      background:
        radial-gradient(circle, rgba(232,255,180,.95) 0 10%, rgba(139,255,143,.34) 24%, rgba(75,205,118,.16) 42%, transparent 64%),
        radial-gradient(circle, rgba(229,255,196,.22), transparent 72%);
      filter:blur(var(--fx-blur-aura));
      opacity:.94;
      animation:auraPulse 4.8s ease-in-out infinite;
      z-index:-3;
    }

    .planet-wave{
      inset:-22%;
      border:1px solid rgba(160,255,171,.22);
      box-shadow:0 0 20px rgba(105,255,142,.16),0 0 42px rgba(198,255,111,.08);
      opacity:0;
      transform:scale(.84);
      pointer-events:none;
      z-index:-2;
      animation:planetWavePulse 3s ease-out infinite;
    }

    .planet-bloom{
      inset:-28%;
      background:
        radial-gradient(circle, rgba(250,255,243,.95) 0 7%, rgba(175,255,148,.68) 14%, rgba(111,222,97,.22) 34%, transparent 62%);
      opacity:0;
      transform:scale(.7);
      filter:blur(12px);
      pointer-events:none;
      z-index:21;
    }

    .planet-shockwave{
      inset:-34%;
      border:2px solid rgba(171,255,162,.20);
      opacity:0;
      transform:scale(.6);
      pointer-events:none;
      z-index:20;
      box-shadow:0 0 24px rgba(132,255,149,.20),0 0 42px rgba(214,255,130,.12);
    }

    .planet-flare{
      inset:-16%;
      background:
        conic-gradient(from 0deg,
          transparent 0deg,
          rgba(188,255,152,0) 12deg,
          rgba(180,255,145,.22) 32deg,
          transparent 58deg,
          transparent 168deg,
          rgba(121,255,145,0) 190deg,
          rgba(220,255,126,.18) 218deg,
          transparent 248deg,
          transparent 360deg);
      mix-blend-mode:screen;
      opacity:0;
      z-index:19;
      pointer-events:none;
      transform:scale(.82) rotate(0deg);
      filter:blur(3px);
    }

    .history-planet,.result-planet-core{
      position:relative;
      width:130px;height:130px;
      border-radius:50%;
      transform-style:preserve-3d;
      transition:transform .28s ease,box-shadow .28s ease,filter .28s ease, background .28s ease;
      transform:scale(var(--planet-scale));
      box-shadow:
        inset -22px -26px 34px rgba(78,40,0,var(--planet-shadow-strength)),
        inset 12px 12px 18px rgba(240,255,199,.10),
        inset 0 -18px 34px rgba(12,28,10,calc(var(--planet-depth) * 1.3)),
        0 22px 42px rgba(0,0,0,.34),
        0 0 calc(28px + 66px * var(--planet-energy)) var(--planet-glow-color);
      animation:planetFloat 7.2s ease-in-out infinite;
      overflow:visible;
      isolation:isolate;
      will-change:transform,box-shadow,filter;
      background:
        radial-gradient(circle at 31% 24%, rgba(247,255,226,.95), rgba(255,255,255,.10) 10%, transparent 18%),
        radial-gradient(circle at 62% 66%, rgba(203,255,164,.18), transparent 28%),
        radial-gradient(circle at 50% 50%, rgba(127,255,112,.12), transparent 46%),
        linear-gradient(155deg,var(--planet-core) 0%, var(--planet-core-2) 42%, var(--planet-core-3) 78%, #08160b 100%);
      transform-origin:center center;
    }
    .result-planet-core{
      width:110px;height:110px;
      animation:planetFloatMini 6.6s ease-in-out infinite;
      transform:none;
      box-shadow:
        inset -18px -22px 28px rgba(72,36,0,.32),
        inset 8px 8px 12px rgba(255,246,204,.08),
        inset 0 -16px 24px rgba(26,10,0,.20),
        0 16px 26px rgba(0,0,0,.26),
        0 0 28px var(--planet-glow-color);
    }

    .history-planet::before,.result-planet-core::before{
      content:"";
      position:absolute;inset:7%;border-radius:50%;
      background:

    .nav-icon{

      font-weight:900;
      border-radius:14px;
      flex:none;
      position:relative;
      overflow:hidden;
      transform:translateZ(0);
      will-change:transform;
    }

    .nav-icon.prev{
      color:#e9fff0;
      background:linear-gradient(145deg, rgba(24,62,42,.44), rgba(10,22,17,.28));
      border:1px solid rgba(145,237,170,.16);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 8px 18px rgba(0,0,0,.10);
    }

    .nav-icon.prev:hover:not(:disabled){
      transform:translateY(-1px);
      border-color:rgba(175,255,183,.24);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        0 10px 22px rgba(0,0,0,.14),
        0 0 14px rgba(112,232,146,.08);
    }

    .nav-icon.next{
      color:#fcfff8;
      background:linear-gradient(135deg, #d8ff85 0%, #86dc63 45%, #3da654 100%);
      border:1px solid rgba(225,255,195,.24);
      box-shadow:
        0 10px 22px rgba(102,191,92,.28),
        0 0 18px rgba(152,255,131,.22),
        inset 0 1px 0 rgba(255,255,255,.28);
    }

    .nav-icon.next::before{
      content:"";
      position:absolute;
      inset:-30%;
      background:
        radial-gradient(circle, rgba(237,255,190,.55) 0%, rgba(158,255,106,.18) 38%, transparent 68%);
      opacity:.95;
      filter:blur(10px);
      z-index:0;
      animation:nextPulse 1.8s ease-in-out infinite;
    }

    .nav-icon.next::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(120deg,
          transparent 0%,
          rgba(255,255,255,.00) 30%,
          rgba(255,255,255,.28) 48%,
          rgba(255,255,255,.00) 66%,
          transparent 100%);
      transform:translateX(-140%);
      animation:nextShine 2.8s ease-in-out infinite;
    }

    .nav-icon.next > *{position:relative;z-index:1}

    .nav-icon.next:hover:not(:disabled){
      transform:translateY(-1px) scale(1.03);
      filter:brightness(1.04);
      box-shadow:
        0 14px 28px rgba(80,179,89,.30),
        0 0 24px rgba(166,255,132,.24),
        0 0 44px rgba(135,230,120,.14),
        inset 0 1px 0 rgba(255,255,255,.34);
    }

    .nav-icon:disabled{
      opacity:.32;
      cursor:not-allowed;
      box-shadow:none;
      filter:none;
    }

    .nav-icon.next:disabled::before,
    .nav-icon.next:disabled::after{display:none}

      return shuffleArray(rawData).map((item, qIndex) => {
        const correctLetter = item.a;
        const originalOptions = item.o.map((text, idx) => ({
          originalLetter: LETTERS[idx],
          text
        }));

        const shuffledOptions = shuffleArray(originalOptions);

        return {
          id: qIndex + 1,
          q: item.q,
          options: shuffledOptions.map((opt, idx) => ({
            letter: LETTERS[idx],
            text: opt.text,
            isCorrect: opt.originalLetter === correctLetter,
            originalLetter: opt.originalLetter
          })),
          correctLetter: LETTERS[shuffledOptions.findIndex(opt => opt.originalLetter === correctLetter)],
          explanationMap: item.r || {}
        };
      });
    }

    function ensureAudioContext() {
      const AudioClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioClass) return null;

      if (!state.audioCtx || state.audioCtx.state === "closed") {
        state.audioCtx = new AudioClass();
        state.masterGain = state.audioCtx.createGain();
        state.masterGain.gain.value = 0.15;
        state.masterGain.connect(state.audioCtx.destination);
      }
      return state.audioCtx;
    }

    async function warmupAudio() {
      const ctx = ensureAudioContext();
      if (!ctx) return;
      if (ctx.state !== "running") await ctx.resume();
    }

    function createTone({ freq, type = "sine", start = 0, dur = 0.15, gain = 0.05, endFreq = null, filterFreq = 2600 }) {
      if (!state.audioCtx || !state.masterGain) return;
      const now = state.audioCtx.currentTime;
      const osc = state.audioCtx.createOscillator();
      const env = state.audioCtx.createGain();
      const filter = state.audioCtx.createBiquadFilter();

      osc.type = type;
      osc.frequency.setValueAtTime(freq, now + start);
      if (endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, now + start + dur);

      filter.type = "lowpass";
      filter.frequency.setValueAtTime(filterFreq, now + start);
      filter.Q.value = 1.1;

      env.gain.setValueAtTime(0.0001, now + start);
      env.gain.exponentialRampToValueAtTime(gain, now + start + 0.018);
      env.gain.exponentialRampToValueAtTime(0.0001, now + start + dur);

      osc.connect(filter);
      filter.connect(env);
      env.connect(state.masterGain);

      osc.start(now + start);
      osc.stop(now + start + dur + 0.02);
    }

    async function playSoftCorrectSound() {
      try {
        await warmupAudio();
        if (!state.audioCtx) return;
        createTone({ freq: 392, type: "triangle", start: 0.00, dur: 0.11, gain: 0.032, filterFreq: 2400 });
        createTone({ freq: 587.33, type: "triangle", start: 0.06, dur: 0.13, gain: 0.036, filterFreq: 2900 });
        createTone({ freq: 783.99, type: "sine", start: 0.12, dur: 0.20, gain: 0.032, filterFreq: 3600 });
        createTone({ freq: 1046.5, type: "sine", start: 0.18, dur: 0.28, gain: 0.018, endFreq: 1174.66, filterFreq: 4200 });
      } catch (e) {}
    }

    async function playPhaseShiftSound() {
      try {
        await warmupAudio();
        if (!state.audioCtx) return;
        createTone({ freq: 180, type: "sawtooth", start: 0.00, dur: 0.20, gain: 0.020, endFreq: 360, filterFreq: 1600 });
        createTone({ freq: 329.63, type: "triangle", start: 0.06, dur: 0.14, gain: 0.020, filterFreq: 2300 });
        createTone({ freq: 523.25, type: "triangle", start: 0.12, dur: 0.18, gain: 0.024, filterFreq: 2800 });
        createTone({ freq: 783.99, type: "sine", start: 0.20, dur: 0.26, gain: 0.022, endFreq: 987.77, filterFreq: 3800 });
      } catch (e) {}
    }

    function getPhaseIndexByPercent(percent) {
      let idx = 0;
      for (let i = 0; i < EVOLUTION_PHASES.length; i++) {
        if (percent >= EVOLUTION_PHASES[i].threshold) idx = i;

      if (percent >= 50) return { title: "🌍 Đã qua pha sơ khai", desc: "Hành tinh đã có bề mặt và khí quyển tương đối rõ, nhưng còn cần thêm tri thức để hoàn chỉnh." };
      return { title: "☄️ Mới qua giai đoạn đầu", desc: "Hành tinh vẫn đang ở giai đoạn bồi tụ và ổn định ban đầu. Cần thêm câu đúng để phát triển tiếp." };

    function setupPerfMode() {
      const isMobile = window.innerWidth <= 720;
      const verySmallScreen = window.innerWidth <= 480;
      const lowThreads = navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4;
      const lowMemory = navigator.deviceMemory && navigator.deviceMemory <= 4;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      if (reducedMotion) {
        state.perfMode = "low";
        document.body.classList.add("low-perf", "reduced-motion");
        applyRootVars({
          "--fx-blur-nebula": "10px",
          "--fx-blur-stage": "6px",
          "--fx-blur-aura": "3px",
          "--use-backdrop": "0"
        });
        return;
      }

      if (isMobile && (lowThreads || lowMemory || verySmallScreen)) {
        state.perfMode = "low";
        document.body.classList.add("low-perf");
        applyRootVars({
          "--fx-blur-nebula": "12px",
          "--fx-blur-stage": "7px",
          "--fx-blur-aura": "4px",
          "--use-backdrop": "0"
        });
      } else if (isMobile) {
        state.perfMode = "medium";
        document.body.classList.add("mid-perf");
        applyRootVars({
          "--fx-blur-nebula": "18px",
          "--fx-blur-stage": "10px",
          "--fx-blur-aura": "5px",
          "--use-backdrop": "0"
        });
      } else {
        state.perfMode = "full";
      }
    }

    function mulberry32(seed) {
      let t = seed >>> 0;
      return function() {
        t += 0x6D2B79F5;
        let r = Math.imul(t ^ (t >>> 15), 1 | t);
        r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
        return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
      };
    }

    function polarPoint(cx, cy, angleDeg, radius) {
      const a = angleDeg * Math.PI / 180;
      return [cx + Math.cos(a) * radius, cy + Math.sin(a) * radius];
    }

    function linePath(points) {
      return points.map((p, i) => `${i ? "L" : "M"} ${p[0].toFixed(2)} ${p[1].toFixed(2)}`).join(" ");
    }

    function createSvgPath(d, cls, strokeWidth, opacity = 1) {
      const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
      p.setAttribute("d", d);
      p.setAttribute("class", cls);
      p.setAttribute("stroke-width", strokeWidth);
      p.setAttribute("opacity", opacity);
      return p;
    }

    function createMaskCircle(cx, cy, r) {
      const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      c.setAttribute("cx", cx);
      c.setAttribute("cy", cy);
      c.setAttribute("r", r);
      c.setAttribute("fill", "black");
      return c;
    }

    function createHoleVisualPath(d, fill, opacity) {
      const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
      p.setAttribute("d", d);
      p.setAttribute("fill", fill);
      p.setAttribute("opacity", opacity);
      return p;
    }

    function createRimPath(d, cls, width, opacity) {
      const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
      p.setAttribute("d", d);
      p.setAttribute("class", cls);
      p.setAttribute("stroke-width", width);
      p.setAttribute("opacity", opacity);
      return p;
    }

    function clamp(min, value, max) {
      return Math.max(min, Math.min(max, value));
    }

    function nextDamageSeed(sourceIndex) {
      state.damageSeed = (Math.imul(state.damageSeed ^ (sourceIndex + 11), 1664525) + 1013904223) >>> 0;
      return state.damageSeed;
    }

    function buildFractureGeometry(damage, seedBase = 1) {
      els.crackGlowGroup.innerHTML = "";
      els.crackHeatGroup.innerHTML = "";
      els.crackCoreGroup.innerHTML = "";
      els.planetHoleMaskGroup.innerHTML = "";
      els.planetHoleVisualGroup.innerHTML = "";
      els.planetHoleRimOuterGroup.innerHTML = "";
      els.planetHoleRimInnerGroup.innerHTML = "";

      state.holeFragments = [];

      if (damage <= 0) return;

      const rnd = mulberry32(seedBase + damage * 131);
      const centers = [];
      const centerCount = clamp(1, 1 + Math.floor((damage - 1) / 2) + (damage >= 4 ? 1 : 0), 3);

      const centerPresets = [
        { x: 46, y: 50, r: 4.8 },
        { x: 61, y: 42, r: 3.8 },
        { x: 39, y: 66, r: 3.6 }
      ];

      for (let i = 0; i < centerCount; i++) {
        const preset = centerPresets[i];
        const cx = preset.x + (rnd() - 0.5) * (2 + damage * 0.8);
        const cy = preset.y + (rnd() - 0.5) * (2 + damage * 0.8);
        const r = preset.r + damage * 0.45 + rnd() * 0.9;
        centers.push({ cx, cy, r });
      }

      const allFragmentSeeds = [];

      centers.forEach((center, centerIndex) => {
        const arms = clamp(3, 4 + damage + centerIndex, 9);
        const baseSpread = 360 / arms;
        const localSeed = mulberry32(seedBase * 11 + centerIndex * 997 + damage * 17);

        if (damage >= 3) {
          els.planetHoleMaskGroup.appendChild(
            createMaskCircle(
              (center.cx / 100).toFixed(4),
              (center.cy / 100).toFixed(4),
              (center.r / 100).toFixed(4)
            )
          );

          const craterD = [
            `M ${(center.cx - center.r * .9).toFixed(2)} ${(center.cy - center.r * .2).toFixed(2)}`,
            `Q ${(center.cx - center.r * .5).toFixed(2)} ${(center.cy - center.r * 1.12).toFixed(2)} ${center.cx.toFixed(2)} ${(center.cy - center.r * .92).toFixed(2)}`,
            `Q ${(center.cx + center.r * .92).toFixed(2)} ${(center.cy - center.r * .82).toFixed(2)} ${(center.cx + center.r * 1.02).toFixed(2)} ${center.cy.toFixed(2)}`,
            `Q ${(center.cx + center.r * .78).toFixed(2)} ${(center.cy + center.r * 1.02).toFixed(2)} ${center.cx.toFixed(2)} ${(center.cy + center.r * 1.04).toFixed(2)}`,
            `Q ${(center.cx - center.r * 1.02).toFixed(2)} ${(center.cy + center.r * .62).toFixed(2)} ${(center.cx - center.r * .9).toFixed(2)} ${(center.cy - center.r * .2).toFixed(2)} Z`
          ].join(" ");

          els.planetHoleVisualGroup.appendChild(createHoleVisualPath(craterD, "rgba(18,3,0,.90)", .92));
          els.planetHoleVisualGroup.appendChild(createHoleVisualPath(craterD, "rgba(255,108,28,.14)", .46));
          els.planetHoleRimOuterGroup.appendChild(createRimPath(craterD, "hole-rim-outer", (1.15 + damage * .12).toFixed(2), .70));
          els.planetHoleRimInnerGroup.appendChild(createRimPath(craterD, "hole-rim-inner", (0.65 + damage * .08).toFixed(2), .60));

          allFragmentSeeds.push({
            angle: 20 + centerIndex * 100 + rnd() * 60,
            distance: 38 + damage * 8 + rnd() * 16,
            size: 15 + damage * 2 + rnd() * 4
          });
        }

        for (let a = 0; a < arms; a++) {
          const baseAngle = a * baseSpread + localSeed() * (18 + damage * 2);
          const outward = 9 + damage * 2.6 + localSeed() * (12 + damage * 3.6);
          const segs = 3 + Math.floor(localSeed() * 3);
          const pts = [[center.cx, center.cy]];
          let radiusAcc = center.r * .28;

          for (let s = 1; s <= segs; s++) {
            const jitterA = (localSeed() - .5) * (18 + damage * 5);
            const jitterR = (localSeed() - .5) * (2.2 + damage * .9);
            radiusAcc += outward / segs + jitterR;
            const angle = baseAngle + jitterA;
            pts.push(polarPoint(center.cx, center.cy, angle, radiusAcc));
          }

          const d = linePath(pts);
          const baseW = 0.9 + damage * .14 + localSeed() * .32;
          els.crackGlowGroup.appendChild(createSvgPath(d, "crack-glow", (baseW + 1.6).toFixed(2), .78));
          els.crackHeatGroup.appendChild(createSvgPath(d, "crack-heat", (baseW + .62).toFixed(2), .66));
          els.crackCoreGroup.appendChild(createSvgPath(d, "crack-core", baseW.toFixed(2), .96));

          const branchCount = clamp(1, Math.floor(localSeed() * (1 + damage)), damage >= 2 ? 4 : 2);
          for (let b = 0; b < branchCount; b++) {
            const pick = 1 + Math.floor(localSeed() * (pts.length - 1));
            const origin = pts[pick];
            const originAngle = Math.atan2(origin[1] - center.cy, origin[0] - center.cx) * 180 / Math.PI;
            const dir = originAngle + (localSeed() > .5 ? 1 : -1) * (18 + localSeed() * (40 + damage * 5));
            const len = 4 + localSeed() * (7 + damage * 2.8);
            const steps = 2 + Math.floor(localSeed() * 2);
            const bPts = [origin];

            for (let k = 1; k <= steps; k++) {
              const t = k / steps;
              const a2 = dir + (localSeed() - .5) * 16;
              const r2 = len * t;
              bPts.push([
                origin[0] + Math.cos(a2 * Math.PI / 180) * r2,
                origin[1] + Math.sin(a2 * Math.PI / 180) * r2
              ]);
            }

            const bd = linePath(bPts);
            const bw = Math.max(.48, baseW * .55);
            els.crackGlowGroup.appendChild(createSvgPath(bd, "crack-glow", (bw + .92).toFixed(2), .52));
            els.crackHeatGroup.appendChild(createSvgPath(bd, "crack-heat", (bw + .38).toFixed(2), .44));
            els.crackCoreGroup.appendChild(createSvgPath(bd, "crack-core", bw.toFixed(2), .82));
          }

          if (damage >= 4 && a % 2 === 0) {
            const last = pts[pts.length - 1];
            const tearRadius = 1.8 + damage * .34 + localSeed() * .8;
            els.planetHoleMaskGroup.appendChild(
              createMaskCircle(
                (last[0] / 100).toFixed(4),
                (last[1] / 100).toFixed(4),
                (tearRadius / 100).toFixed(4)
              )
            );

            const tearD = [
              `M ${(last[0] - tearRadius).toFixed(2)} ${last[1].toFixed(2)}`,
              `Q ${last[0].toFixed(2)} ${(last[1] - tearRadius * 1.2).toFixed(2)} ${(last[0] + tearRadius * 1.1).toFixed(2)} ${last[1].toFixed(2)}`,
              `Q ${last[0].toFixed(2)} ${(last[1] + tearRadius).toFixed(2)} ${(last[0] - tearRadius).toFixed(2)} ${last[1].toFixed(2)} Z`
            ].join(" ");

            els.planetHoleVisualGroup.appendChild(createHoleVisualPath(tearD, "rgba(14,2,0,.86)", .74));
            els.planetHoleRimOuterGroup.appendChild(createRimPath(tearD, "hole-rim-outer", "0.85", .56));
            els.planetHoleRimInnerGroup.appendChild(createRimPath(tearD, "hole-rim-inner", "0.45", .42));

            allFragmentSeeds.push({
              angle: baseAngle + (localSeed() - .5) * 40,
              distance: 28 + damage * 6 + localSeed() * 14,
              size: 10 + damage * 1.6 + localSeed() * 3
            });
          }
        }
      });

      state.holeFragments = allFragmentSeeds;
    }

    function initFragments() {
      const clips = [
        "polygon(8% 18%, 68% 0, 100% 40%, 78% 96%, 18% 82%, 0 48%)",
        "polygon(14% 6%, 84% 14%, 100% 62%, 54% 100%, 0 76%, 4% 28%)",
        "polygon(10% 18%, 64% 0, 100% 44%, 84% 100%, 26% 88%, 0 52%)",
        "polygon(6% 20%, 50% 2%, 94% 30%, 100% 70%, 62% 100%, 18% 84%, 0 50%)",
        "polygon(16% 4%, 82% 18%, 100% 58%, 76% 96%, 26% 100%, 0 52%)",
        "polygon(8% 8%, 72% 0, 100% 42%, 86% 88%, 34% 100%, 0 58%)",
        "polygon(18% 0, 90% 18%, 100% 62%, 68% 100%, 12% 84%, 0 34%)",
        "polygon(10% 10%, 58% 0, 100% 34%, 94% 84%, 42% 100%, 0 60%)",
        "polygon(4% 24%, 50% 0, 92% 16%, 100% 70%, 58% 100%, 14% 88%, 0 48%)"
      ];

      const frag = document.createDocumentFragment();
      state.fragmentNodes.length = 0;
      const total = state.perfMode === "low" ? 5 : state.perfMode === "medium" ? 7 : 9;

      for (let i = 0; i < total; i++) {
        const node = document.createElement("span");
        node.className = "fragment-chip";
        node.style.setProperty("--clip", clips[i % clips.length]);
        node.style.setProperty("--size", `${12 + i * 1.6}px`);
        node.style.setProperty("--o", `${i < 4 ? 1 : .76}`);
        frag.appendChild(node);
        state.fragmentNodes.push(node);
      }
      els.planetFragments.appendChild(frag);
    }

    function updateFragments(damage) {
      const burst = Math.max(0, damage - 2);
      rootStyle.setProperty("--fragment-opacity", burst > 0 ? Math.min(1, .12 + burst * .24).toFixed(3) : "0");
      rootStyle.setProperty("--fragment-burst", burst.toFixed(3));
      rootStyle.setProperty("--fragment-heat", (damage / 5).toFixed(3));

      const count = state.fragmentNodes.length;
      for (let i = 0; i < count; i++) {
        const node = state.fragmentNodes[i];
        const seed = state.holeFragments[i % Math.max(1, state.holeFragments.length)] || {
          angle: -30 + i * 40,
          distance: 24 + i * 6,
          size: 12 + i * 2
        };

        const rad = seed.angle * Math.PI / 180;
        const spread = seed.distance * burst * .56;
        const x = Math.cos(rad) * spread;
        const y = Math.sin(rad) * spread - burst * (i % 3 === 0 ? 6 : 0);
        const rot = (seed.angle * .9) + burst * (i % 2 === 0 ? 26 : -22);
        const scale = 1 + burst * (.04 + (i % 4) * .02);

        node.style.setProperty("--size", `${seed.size}px`);
        node.style.setProperty("--x", `${x.toFixed(2)}px`);
        node.style.setProperty("--y", `${y.toFixed(2)}px`);
        node.style.setProperty("--r", `${rot.toFixed(2)}deg`);
        node.style.setProperty("--s", `${scale.toFixed(3)}`);
      }
    }

    function updateProceduralDamageVisuals(force = false) {
      const key = `${state.planetDamage}|${state.damageSeed}`;
      if (!force && key === state.damageCacheKey) return;
      state.damageCacheKey = key;

      buildFractureGeometry(state.planetDamage, state.damageSeed);
      updateFragments(state.planetDamage);
    }

    function updateMiniOrbitVisibility(conquest, phaseIndex) {
      const orbitLevels = [
        conquest >= 0.10 ? 1 : 0,
        conquest >= 0.24 ? 1 : 0,
        conquest >= 0.40 ? 1 : 0,
        conquest >= 0.60 ? 1 : 0,
        conquest >= 0.82 ? 1 : 0
      ];

      rootStyle.setProperty("--mini-visible-1", orbitLevels[0]);
      rootStyle.setProperty("--mini-visible-2", orbitLevels[1]);
      rootStyle.setProperty("--mini-visible-3", orbitLevels[2]);
      rootStyle.setProperty("--mini-visible-4", orbitLevels[3]);
      rootStyle.setProperty("--mini-visible-5", orbitLevels[4]);
      rootStyle.setProperty("--mini-orbit-shift", `${Math.max(1, phaseIndex) * 1.2}px`);
    }

    function updatePlanetState(lastResult = null) {
      const conquest = getConquestPercent();
      const answered = getAnsweredCount();
      const visual = getPlanetVisualStage();
      const phaseIndex = getPhaseIndexByPercent(conquest);

      if (lastResult === "wrong") {
        if (state.planetDamage < 5) {
          state.planetDamage = Math.min(5, state.planetDamage + 1);
          nextDamageSeed(state.currentIndex);
        }
      } else if (lastResult === "correct" && state.planetDamage > 0) {
        state.planetDamage = Math.max(0, state.planetDamage - 1);
      }

      const energy = 0.16 + conquest * 0.84 + (phaseIndex * 0.012);
      const scale = 1 + conquest * 0.14;
      const fractureIntensity = state.planetDamage / 5;
      const holeOpacity = state.planetDamage >= 3 ? clamp(0, .18 + (state.planetDamage - 2) * .28, 1) : 0;

      applyRootVars({
        "--planet-energy": energy.toFixed(3),
        "--planet-scale": scale.toFixed(3),
        "--planet-bright": visual.bright.toFixed(3),
        "--planet-sat": visual.sat.toFixed(3),
        "--planet-contrast": visual.contrast.toFixed(3),
        "--planet-depth": visual.depth.toFixed(3),
        "--planet-shadow-strength": visual.shadow.toFixed(3),
        "--planet-hue": `${visual.hue.toFixed(1)}deg`,
        "--planet-core": visual.core,
        "--planet-core-2": visual.core2,
        "--planet-core-3": visual.core3,
        "--planet-ring-opacity": visual.ringOpacity,
        "--planet-glow-color": visual.glow,
        "--planet-surface-pattern-opacity": (0.66 + conquest * 0.24).toFixed(3),
        "--lava-opacity": visual.lava,
        "--continent-opacity": visual.continents,
        "--continent-glow-opacity": visual.continentGlow,
        "--ice-opacity": visual.ice,
        "--cloud-opacity": visual.cloud,
        "--ocean-opacity": visual.ocean,
        "--aurora-opacity": visual.aurora,
        "--debris-opacity": visual.debris,
        "--ring-thin-opacity": visual.thinRing,
        "--ring-outer-opacity": visual.outerRing,
        "--planet-crack": state.planetDamage,
        "--fracture-intensity": fractureIntensity.toFixed(3),
        "--mini-planet-1": visual.mini[0],
        "--mini-planet-2": visual.mini[1],
        "--mini-planet-3": visual.mini[2],
        "--mini-planet-glow": visual.glow,
        "--ring-count-boost": visual.ringBoost.toFixed(2),
        "--hole-opacity": holeOpacity.toFixed(3),
        "--orbit-emphasis": visual.orbitEmphasis.toFixed(3),
        "--orbit-scale": visual.orbitScale.toFixed(3),
        "--orbit-speed": visual.orbitSpeed.toFixed(3),
        "--orbit-dash-opacity": visual.orbitDash.toFixed(3)
      });

      updateMiniOrbitVisibility(conquest, phaseIndex);
      updateProceduralDamageVisuals();

      els.planetStage.dataset.phase = visual.key;

      const conquestLabel = visual.label;
      if (els.conquestLevel.textContent !== conquestLabel) {
        els.conquestLevel.textContent = conquestLabel;
      }

      const stabilityText = `${visual.type} • ${visual.status}`;
      if (els.planetStability.textContent !== stabilityText) {
        els.planetStability.textContent = stabilityText;
      }

      const scanText = `Chinh Phục Hành Tinh: ${phaseIndex + 1} / ${EVOLUTION_PHASES.length}`;
      if (els.scanProgress.textContent !== scanText) {
        els.scanProgress.textContent = scanText;
      }

      const missionText =
        answered < state.quizData.length
          ? `Đã trả lời ${answered}/${state.quizData.length} câu • ${visual.reaction}`
          : `Chiến dịch kết thúc • ${visual.reaction}`;

      if (els.missionText.textContent !== missionText) {
        els.missionText.textContent = missionText;
      }

      if (lastResult === "correct") {
        spawnPlanetParticles("good");
        setStageFx(state.planetDamage > 0 ? "is-heal" : "is-boost");
      }
      if (lastResult === "wrong") {
        spawnPlanetParticles("bad");
        setStageFx("is-damage");
      }

      if (phaseIndex !== state.currentPhaseIndex) {
        if (state.currentPhaseIndex !== -1) triggerPhaseShiftCutscene();
        state.currentPhaseIndex = phaseIndex;
      }
    }

    function createResultPlanetNode() {
      const shell = document.createElement("div");
      shell.className = "result-shell";
      shell.innerHTML = `
        <div class="planet-aura"></div>
        <div class="planet-wave"></div>
        <div class="planet-evolution-orbits">
          <div class="orbit o1"></div>
          <div class="orbit o2"></div>
          <div class="orbit o3"></div>
        </div>
        <div class="result-planet-core">
          <div class="planet-core-exposed"></div>

          <div class="planet-body">
            <div class="planet-atmosphere"></div>
            <div class="planet-surface"></div>
            <div class="planet-night"></div>
            <div class="planet-band"></div>
            <div class="planet-ocean"></div>
            <div class="planet-clouds"></div>
            <div class="planet-aurora"></div>
            <div class="planet-lava"></div>
            <div class="planet-continents"></div>
            <div class="planet-continents-glow"></div>
            <div class="planet-ice"></div>
            <div class="planet-debris"></div>
          </div>

          <div class="planet-hole-svg">
            <svg viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
              ${els.planetHoleVisualGroup.innerHTML}
            </svg>
          </div>
          <div class="planet-hole-rim">
            <svg viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
              ${els.planetHoleRimOuterGroup.innerHTML}
              ${els.planetHoleRimInnerGroup.innerHTML}
            </svg>
          </div>

          <div class="planet-crack-svg">
            <svg viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
              ${els.crackGlowGroup.innerHTML}
              ${els.crackHeatGroup.innerHTML}
              ${els.crackCoreGroup.innerHTML}
            </svg>
          </div>
        </div>
      `;
      return shell;
    }

    function showFinalBanner() {
      const percent = Math.round(getConquestPercent() * 100);
      const answered = getAnsweredCount();
      const summary = getFinalSummary();
      const visual = getPlanetVisualStage();
      const phaseIndex = getPhaseIndexByPercent(getConquestPercent());

      els.banner.style.display = "block";

      if (!state.finalBannerRendered) {
        els.banner.innerHTML = `
          <div class="result-panel-head">
            <div>
              <div class="result-title" id="finalTitle"></div>
              <div class="result-desc" id="finalDesc"></div>
            </div>
            <div class="result-badge" id="finalBadge"></div>
          </div>

          <div class="result-layout">
            <div class="result-planet-wrap" id="resultPlanetWrap"></div>
            <div class="result-stats">
              <div class="result-metrics">
                <div class="metric-card">
                  <div class="label">Độ chinh phục</div>
                  <div class="value" id="finalPercent"></div>
                </div>
                <div class="metric-card">
                  <div class="label">Câu đúng</div>
                  <div class="value" id="finalCorrect"></div>
                </div>
                <div class="metric-card">
                  <div class="label">Mốc tiến hóa</div>
                  <div class="value" id="finalPhase"></div>
                </div>
              </div>

              <div class="planet-reaction-text" id="finalReaction"></div>
            </div>
          </div>
        `;

        const wrap = document.getElementById("resultPlanetWrap");
        if (wrap) wrap.appendChild(createResultPlanetNode());
        state.finalBannerRendered = true;
      }

      document.getElementById("finalTitle").textContent = summary.title;
      document.getElementById("finalDesc").textContent = summary.desc;
      document.getElementById("finalBadge").textContent = visual.label;
      document.getElementById("finalPercent").textContent = `${percent}%`;
      document.getElementById("finalCorrect").textContent = `${state.correctCount}/${state.quizData.length}`;
      document.getElementById("finalPhase").textContent = `${phaseIndex + 1}/${EVOLUTION_PHASES.length}`;
      document.getElementById("finalReaction").innerHTML = `
        <strong>Trạng thái hành tinh:</strong> ${visual.reaction}<br>
        <strong>Loại hành tinh:</strong> ${visual.type}<br>
        <strong>Tiến độ hoàn thành:</strong> ${answered}/${state.quizData.length} câu đã mở.<br>
        <strong>Mức nứt vỡ còn lại:</strong> ${state.planetDamage}/5.
      `;
    }

    function updateJourneyUI(lastResult = null) {
      const width = `${getCompletionPercent() * 100}%`;
      if (els.journeyFill.style.width !== width) {
        els.journeyFill.style.width = width;
      }

      updatePlanetState(lastResult);

      if (getAnsweredCount() === state.quizData.length) {
        showFinalBanner();
      } else {
        els.banner.style.display = "none";
      }
    }

    function renderOptions(data, answered) {
      const selected = state.userAnswers[state.currentIndex];

      for (let i = 0; i < state.optionButtons.length; i++) {
        const btn = state.optionButtons[i];
        const option = data.options[i];
        const char = option.letter;
        const isCorrect = char === data.correctLetter;
        const isWrong = char === selected && !isCorrect;

        if (btn._currentLetter !== char) {
          btn._letterNode.textContent = char;
          btn._currentLetter = char;
        }

        if (btn._currentText !== option.text) {
          btn._textNode.textContent = option.text;
          btn._currentText = option.text;
        }

        let nextClass = "option-btn";
        let nextOpacity = "";
        const nextDisabled = answered;

        if (answered) {
          if (isCorrect) nextClass += " correct";
          else if (isWrong) nextClass += " wrong";
          else nextOpacity = ".35";
        }

        if (btn.className !== nextClass) btn.className = nextClass;
        if (btn.disabled !== nextDisabled) btn.disabled = nextDisabled;

        const currentOpacity = btn.style.opacity || "";
        if (currentOpacity !== nextOpacity) btn.style.opacity = nextOpacity;

        if (!answered) {
          if (btn.dataset.char !== char) btn.dataset.char = char;
        } else if (btn.dataset.char) {
          btn.removeAttribute("data-char");
        }
      }
    }

    function updateExplanation(data, answered) {
      if (!answered) {
        if (els.explanationBox.style.display !== "none") {
          els.explanationBox.style.display = "none";
        }
        if (els.explanationBox.innerHTML !== "") {
          els.explanationBox.innerHTML = "";
        }
        state.ui.lastExplanationKey = "";
        return;
      }

      const selectedLetter = state.userAnswers[state.currentIndex];
      const selectedOption = data.options.find(opt => opt.letter === selectedLetter);
      const originalLetter = selectedOption ? selectedOption.originalLetter : selectedLetter;
      const explanation = data.explanationMap?.[originalLetter] || "Chưa có giải thích cho đáp án này.";
      const ok = selectedLetter === data.correctLetter;
      const key = `${state.currentIndex}|${selectedLetter}|${originalLetter}`;

      if (state.ui.lastExplanationKey === key) return;
      state.ui.lastExplanationKey = key;

      els.explanationBox.style.display = "block";
      els.explanationBox.style.borderLeft = `4px solid var(${ok ? "--success" : "--warning"})`;
      els.explanationBox.style.background = ok ? "rgba(18,64,42,.16)" : "rgba(66,38,12,.16)";
      els.explanationBox.style.color = ok ? "#ddffef" : "#fff1df";
      els.explanationBox.innerHTML = explanation;
    }

    function updateNavDots() {
      for (let i = 0; i < state.navDots.length; i++) {
        const dot = state.navDots[i];
        let cls = "nav-dot";

        if (i === state.currentIndex) cls += " active";
        if (state.userAnswers[i] !== undefined) {
          cls += state.userAnswers[i] === state.quizData[i].correctLetter
            ? " done-correct"
            : " done-wrong";
        }

        if (dot.className !== cls) dot.className = cls;
      }
    }

    function render(scrollTop = false, lastResult = null) {
      const data = state.quizData[state.currentIndex];
      const answered = state.userAnswers[state.currentIndex] !== undefined;

      const questionText = `Câu ${state.currentIndex + 1}: ${data.q}`;
      if (state.ui.lastQuestionText !== questionText) {
        state.ui.lastQuestionText = questionText;
        els.question.textContent = questionText;
      }

      const progressText = `CÂU ${state.currentIndex + 1} / ${state.quizData.length}`;
      if (state.ui.lastProgressText !== progressText) {
        state.ui.lastProgressText = progressText;
        els.progressText.textContent = progressText;
      }

      renderOptions(data, answered);
      updateExplanation(data, answered);
      updateNavDots();

      els.btnPrev.disabled = state.currentIndex === 0;
      els.btnNext.disabled = false;

      updateJourneyUI(lastResult);

      if (scrollTop) {
        scrollToTopSmart();
      }
    }

    function scrollToTopSmart() {
      const behavior = state.smoothScrollEnabled ? "smooth" : "auto";

      if (window.innerWidth > 720) {
        const y = els.missionPanel
          ? window.scrollY + els.missionPanel.getBoundingClientRect().top - 12
          : 0;
        window.scrollTo({ top: Math.max(0, y), behavior });
      } else {
        window.scrollTo({ top: 0, behavior });
      }
    }

    async function select(char) {
      if (state.userAnswers[state.currentIndex] !== undefined) return;

      try { await warmupAudio(); } catch (e) {}

      state.userAnswers[state.currentIndex] = char;
      const isCorrect = char === state.quizData[state.currentIndex].correctLetter;

      if (isCorrect) {
        state.correctCount++;
        playSoftCorrectSound();
      }

      render(false, isCorrect ? "correct" : "wrong");
    }

    function change(idx) {
      if (idx < 0) return;

      if (idx >= state.quizData.length) {
        if (getAnsweredCount() < state.quizData.length) {
          state.currentIndex = state.quizData.findIndex((_, i) => state.userAnswers[i] === undefined);
          if (state.currentIndex < 0) state.currentIndex = state.quizData.length - 1;
          render(true);
          return;
        }
        showFinalBanner();
        requestAnimationFrame(() => {
          els.banner?.scrollIntoView({ behavior: state.smoothScrollEnabled ? "smooth" : "auto", block: "center" });
        });
        return;
      }

      if (state.currentIndex === idx) return;
      state.currentIndex = idx;
      render(true);
    }

    async function unlockAudio() {
      try { await warmupAudio(); } catch (e) {}
      document.removeEventListener("touchstart", unlockAudio);
      document.removeEventListener("click", unlockAudio);
    }

    function setupOptionEvents() {
      els.options.addEventListener("click", e => {
        const btn = e.target.closest(".option-btn[data-char]");
        if (!btn) return;
        select(btn.dataset.char);
      });
    }

    function applyTilt() {
      state.pointerRAF = 0;
      const transform = `translate3d(0,-4px,0) rotateX(${state.targetRotateX.toFixed(2)}deg) rotateY(${state.targetRotateY.toFixed(2)}deg)`;
      if (transform !== state.lastAppliedTilt) {
        els.planetTilt.style.transform = transform;
        state.lastAppliedTilt = transform;
      }
    }

    function setupTilt() {
      if (!els.planetStage || !els.planetTilt || window.innerWidth <= 720) return;

      let rect = null;
      let active = false;
      let resizeRAF = 0;

      const updateRect = () => {
        rect = els.planetStage.getBoundingClientRect();
        resizeRAF = 0;
      };

      const scheduleRectUpdate = () => {
        if (resizeRAF) return;
        resizeRAF = requestAnimationFrame(updateRect);
      };

      const onMove = (e) => {
        if (!active || !rect) return;

        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        state.targetRotateY = (x - rect.width / 2) / 55;
        state.targetRotateX = (rect.height / 2 - y) / 62;

        if (!state.pointerRAF) {
          state.pointerRAF = requestAnimationFrame(applyTilt);
        }
      };

      updateRect();
      window.addEventListener("resize", scheduleRectUpdate, { passive: true });

      els.planetStage.addEventListener("mouseenter", () => {
        active = true;
        updateRect();
      }, { passive: true });

      els.planetStage.addEventListener("mousemove", onMove, { passive: true });

      els.planetStage.addEventListener("mouseleave", () => {
        active = false;
        state.targetRotateX = 0;
        state.targetRotateY = 0;

        if (!state.pointerRAF) {
          state.pointerRAF = requestAnimationFrame(() => {
            els.planetTilt.style.transform = "";
            state.lastAppliedTilt = "";
            state.pointerRAF = 0;
          });
        }
      }, { passive: true });
    }

    function setupButtons() {
      els.btnPrev.addEventListener("click", () => change(state.currentIndex - 1));
      els.btnNext.addEventListener("click", () => change(state.currentIndex + 1));
      els.navGrid.addEventListener("click", e => {
        const dot = e.target.closest(".nav-dot");
        if (!dot) return;
        change(Number(dot.dataset.idx));
      });
    }

    function setupKeyboardShortcuts() {
      const answerKeys = new Set(["A", "B", "C", "D"]);

      document.addEventListener("keydown", e => {
        const target = e.target;
        const tagName = target?.tagName;
        const isTypingField =
          tagName === "INPUT" ||
          tagName === "TEXTAREA" ||
          tagName === "SELECT" ||
          target?.isContentEditable;

        if (isTypingField || e.altKey || e.ctrlKey || e.metaKey) return;

        const key = String(e.key || "").toUpperCase();

        if (answerKeys.has(key)) {
          e.preventDefault();
          select(key);
          return;
        }

        if (e.key === "ArrowRight") {
          e.preventDefault();
          change(state.currentIndex + 1);
        }
      });
    }

    function bootstrap() {
      const rawSource =
        (typeof quizData !== "undefined" && Array.isArray(quizData) && quizData) ||
        (typeof RAW_QUIZ_DATA !== "undefined" && Array.isArray(RAW_QUIZ_DATA) && RAW_QUIZ_DATA) ||
        null;

      if (!rawSource) {
        alert("Không tìm thấy dữ liệu câu hỏi. Hãy kiểm tra file quiz-data-sinh.js");
        return;
      }

      state.quizData = normalizeQuizData(rawSource);

      cacheDom();
      setupPerfMode();
      initNav();
      buildOptions();
      initParticlePool();
      initFragments();
      setupOptionEvents();
      setupButtons();
      setupKeyboardShortcuts();
      setupTilt();

      document.addEventListener("touchstart", unlockAudio, { passive: true });
      document.addEventListener("click", unlockAudio);

      updateProceduralDamageVisuals(true);
      render(false);
    }

    bootstrap();
  </script>
</body>
</html>
