<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <meta name="theme-color" content="#1a0722" />
  <title>Trạm Tin Học TN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg-1:#0f0414;
      --bg-2:#1a0722;
      --bg-3:#2c1038;
      --bg-4:#451b53;
      --text:#fff4fb;
      --muted:#f1cfe2;
      --line:rgba(255,193,226,.22);
      --card:rgba(53,12,45,.48);
      --card-2:rgba(24,7,24,.30);
      --planet-1:#ffe9f5;
      --planet-2:#ff9ccc;
      --planet-3:#4a1734;
      --planet-glow:rgba(255,126,194,.25);
    }

    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{
      min-height:100%;
      font-family:"Inter",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 14% 16%, rgba(255,168,221,.18), transparent 18%),
        radial-gradient(circle at 86% 14%, rgba(255,126,194,.14), transparent 19%),
        radial-gradient(circle at 50% 80%, rgba(233,158,255,.12), transparent 23%),
        linear-gradient(135deg,var(--bg-1),var(--bg-2) 38%,var(--bg-3) 72%,var(--bg-4));
      overflow-x:hidden;
    }
    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
    }
    body::before{
      background:
        radial-gradient(circle at 12% 24%, rgba(255,210,236,.10) 0 1.4%, transparent 1.8%),
        radial-gradient(circle at 26% 68%, rgba(255,141,200,.08) 0 1.2%, transparent 1.7%),
        radial-gradient(circle at 72% 34%, rgba(255,189,227,.08) 0 1.5%, transparent 1.9%),
        radial-gradient(circle at 82% 74%, rgba(255,122,191,.07) 0 1.3%, transparent 1.8%);
      background-size:260px 260px,340px 340px,300px 300px,380px 380px;
      opacity:.75;
      animation:driftDust 90s linear infinite reverse;
    }
    body::after{
      background:
        radial-gradient(circle at 20% 30%, rgba(255,186,224,.09), transparent 18%),
        radial-gradient(circle at 78% 26%, rgba(255,125,193,.08), transparent 16%),
        radial-gradient(circle at 60% 72%, rgba(244,167,255,.06), transparent 20%);
      filter:blur(26px);
      opacity:.8;
    }

    .universe,.stars,.stars2,.nebula,.dust{position:fixed;inset:0;pointer-events:none;z-index:0}
    .nebula{
      background:
        radial-gradient(circle at 15% 28%, rgba(255,123,196,.22), transparent 14%),
        radial-gradient(circle at 78% 20%, rgba(255,171,222,.16), transparent 16%),
        radial-gradient(circle at 45% 76%, rgba(225,132,255,.14), transparent 18%);
      filter:blur(48px);
      animation:nebulaShift 26s ease-in-out infinite alternate;
    }
    .dust{
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.5), transparent),
        radial-gradient(1px 1px at 24% 66%, rgba(255,176,223,.36), transparent),
        radial-gradient(1px 1px at 48% 42%, rgba(255,255,255,.34), transparent),
        radial-gradient(1px 1px at 60% 74%, rgba(255,131,198,.30), transparent),
        radial-gradient(1px 1px at 82% 30%, rgba(255,255,255,.42), transparent);
      background-size:360px 360px;
      opacity:.65;
      animation:driftDust 70s linear infinite;
    }
    .stars{
      background-image:
        radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.5px 1.5px at 120px 80px, rgba(255,190,228,.9), transparent),
        radial-gradient(2px 2px at 250px 140px, rgba(255,255,255,.9), transparent),
        radial-gradient(1.8px 1.8px at 350px 40px, rgba(225,145,255,.9), transparent),
        radial-gradient(2px 2px at 500px 160px, rgba(255,142,202,.85), transparent);
      background-size:800px 300px;
      animation:driftStars 100s linear infinite;
      opacity:.85;
    }
    .stars2{
      background-image:
        radial-gradient(1.2px 1.2px at 40px 60px, rgba(255,255,255,.85), transparent),
        radial-gradient(1.7px 1.7px at 200px 120px, rgba(255,185,228,.75), transparent),
        radial-gradient(1.2px 1.2px at 420px 40px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.3px 1.3px at 600px 200px, rgba(215,150,255,.8), transparent);
      background-size:900px 380px;
      animation:driftStarsReverse 145s linear infinite;
      opacity:.5;
    }

    .page{
      position:relative;
      z-index:1;
      width:min(100%, 540px);
      margin:0 auto;
      min-height:100vh;
      padding:18px 14px 26px;
    }
    .hero{
      padding:12px 8px 18px;
      text-align:center;
    }
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 14px;
      border-radius:999px;
      background:linear-gradient(145deg, rgba(69,17,53,.62), rgba(31,8,32,.44));
      border:1px solid rgba(255,177,219,.22);
      color:#fff2fb;
      font-size:12px;
      font-weight:800;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 10px 18px rgba(0,0,0,.18),0 0 18px rgba(255,124,194,.10);
    }
    .eyebrow::before{
      content:"";
      width:8px;
      height:8px;
      border-radius:50%;
      background:linear-gradient(135deg,#ffd8ec,#ff71b3);
      box-shadow:0 0 12px rgba(255,128,192,.58);
    }
    h1{
      margin-top:14px;
      font-size:clamp(28px,9vw,44px);
      line-height:1.05;
      letter-spacing:-.03em;
    }
    .hero p{
      margin-top:10px;
      color:var(--muted);
      font-size:14px;
      line-height:1.6;
    }

    .hub{
      position:relative;
      min-height:620px;
      border-radius:30px;
      padding:26px 14px 20px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), transparent 24%),
        radial-gradient(circle at top right, rgba(255,154,209,.08), transparent 22%),
        radial-gradient(circle at bottom left, rgba(236,154,255,.07), transparent 24%),
        linear-gradient(145deg, rgba(39,10,37,.62), rgba(17,6,24,.36));
      border:1px solid rgba(255,190,225,.16);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 18px 34px rgba(0,0,0,.18);
      overflow:hidden;
      isolation:isolate;
    }
    .hub::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(rgba(255,192,226,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,192,226,.05) 1px, transparent 1px);
      background-size:84px 84px;
      mask-image:radial-gradient(circle at center, rgba(0,0,0,.85), transparent 86%);
      opacity:.2;
      z-index:-2;
    }

    .orbit-map{
      position:relative;
      min-height:470px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-top:6px;
    }
    .connector{
      position:absolute;
      width:180px;
      height:180px;
      border-radius:50%;
      border:1px dashed rgba(255,193,226,.16);
      box-shadow:0 0 18px rgba(255,132,196,.06);
    }
    .connector.small{
      width:246px;
      height:246px;
      transform:rotate(-10deg);
    }
    .connector.large{
      width:310px;
      height:310px;
      transform:rotate(12deg);
      opacity:.72;
    }

    .planet-link{
      position:absolute;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      color:inherit;
      text-decoration:none;
    }
    .planet-link.center{position:relative;z-index:2}
    .planet-link.satellite-a{top:30px;left:8px}
    .planet-link.satellite-b{right:4px;bottom:64px}

    .planet{
      position:relative;
      border-radius:50%;
      overflow:visible;
      isolation:isolate;
      box-shadow:inset -26px -30px 40px rgba(0,0,0,.44),inset 10px 10px 20px rgba(255,255,255,.12),0 20px 40px rgba(0,0,0,.28);
      background:
        radial-gradient(circle at 28% 24%, rgba(255,255,255,.98), rgba(255,255,255,.20) 14%, transparent 20%),
        radial-gradient(circle at 55% 60%, rgba(255,181,224,.16), transparent 28%),
        linear-gradient(155deg, var(--planet-1) 0%, var(--planet-2) 38%, #bc4f8c 68%, var(--planet-3) 100%);
      animation:planetFloat 6.5s ease-in-out infinite;
    }
    .planet::before{
      content:"";
      position:absolute;
      inset:-18%;
      border-radius:50%;
      background:
        radial-gradient(circle, rgba(255,231,244,.95) 0 10%, rgba(255,157,208,.34) 24%, rgba(255,108,183,.16) 42%, transparent 64%),
        radial-gradient(circle, rgba(255,220,239,.22), transparent 72%);
      filter:blur(14px);
      z-index:-2;
      animation:auraPulse 4.5s ease-in-out infinite;
    }
    .planet::after{
      content:"";
      position:absolute;
      inset:-10px;
      border-radius:50%;
      border:1px solid rgba(255,227,240,.16);
      box-shadow:0 0 22px rgba(255,131,198,.14), inset 0 0 18px rgba(255,255,255,.05);
    }
    .planet-main{
      width:168px;
      height:168px;
    }
    .planet-small{
      width:92px;
      height:92px;
      animation-duration:7.3s;
    }
    .ring{
      position:absolute;
      left:50%;
      top:50%;
      border-radius:50%;
      transform:translate(-50%,-50%) rotateX(72deg) rotateY(18deg);
      border:1px solid rgba(255,176,219,.44);
      box-shadow:0 0 18px rgba(255,126,194,.18);
      pointer-events:none;
    }
    .planet-main .ring{
      width:220px;
      height:220px;
    }
    .planet-small .ring{
      width:122px;
      height:122px;
      border-color:rgba(255,193,226,.30);
    }
    .surface{
      position:absolute;
      inset:8%;
      border-radius:50%;
      background:
        radial-gradient(circle at 26% 36%, rgba(255,255,255,.24), transparent 16%),
        radial-gradient(circle at 54% 56%, rgba(80,0,40,.16), transparent 22%),
        radial-gradient(circle at 68% 30%, rgba(255,255,255,.12), transparent 12%),
        linear-gradient(45deg, rgba(255,154,209,.10), rgba(255,103,175,.05));
      mix-blend-mode:screen;
      opacity:.88;
    }
    .band{
      position:absolute;
      left:12%;
      right:12%;
      top:46%;
      height:14%;
      border-radius:999px;
      filter:blur(4px);
      background:linear-gradient(90deg, transparent, rgba(255,153,204,.36), transparent);
    }
    .shadow{
      width:76%;
      height:16px;
      margin-top:-2px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,0,0,.46), transparent 72%);
      filter:blur(10px);
      opacity:.85;
    }
    .label{
      text-align:center;
      max-width:150px;
    }
    .label strong{
      display:block;
      font-size:14px;
      font-weight:800;
      line-height:1.3;
    }
    .label span{
      display:block;
      margin-top:4px;
      color:var(--muted);
      font-size:12.5px;
      line-height:1.5;
    }

    .footer-note{
      margin-top:18px;
      padding:14px;
      border-radius:18px;
      background:linear-gradient(145deg, rgba(53,14,46,.46), rgba(20,7,24,.26));
      border:1px solid rgba(255,190,225,.14);
      color:#ffe7f4;
      font-size:13px;
      line-height:1.6;
      text-align:center;
    }

    @keyframes planetFloat{
      0%,100%{transform:translateY(0) rotateZ(0deg)}
      50%{transform:translateY(-10px) rotateZ(.5deg)}
    }
    @keyframes auraPulse{
      0%,100%{transform:scale(1);opacity:.72}
      50%{transform:scale(1.08);opacity:1}
    }
    @keyframes driftDust{
      from{transform:translate3d(0,0,0)}
      to{transform:translate3d(-60px,-40px,0)}
    }
    @keyframes driftStars{
      from{transform:translate3d(0,0,0)}
      to{transform:translate3d(-80px,-280px,0)}
    }
    @keyframes driftStarsReverse{
      from{transform:translate3d(0,0,0)}
      to{transform:translate3d(60px,220px,0)}
    }
    @keyframes nebulaShift{
      0%{transform:translate3d(0,0,0) scale(1);opacity:.8}
      100%{transform:translate3d(-2%,2%,0) scale(1.05);opacity:1}
    }

    @media (min-width: 541px){
      .page{padding-top:28px}
      .hub{min-height:680px}
      .orbit-map{min-height:520px}
      .planet-link.satellite-a{top:48px;left:24px}
      .planet-link.satellite-b{right:18px;bottom:78px}
    }

    @media (max-width: 390px){
      .planet-main{width:150px;height:150px}
      .planet-main .ring{width:198px;height:198px}
      .planet-link.satellite-a{top:36px;left:-2px}
      .planet-link.satellite-b{right:-4px;bottom:72px}
      .planet-small{width:84px;height:84px}
    }
  </style>
</head>
<body>
  <div class="universe">
    <div class="nebula"></div>
    <div class="dust"></div>
    <div class="stars"></div>
    <div class="stars2"></div>
  </div>

  <main class="page">
    <section class="hero">
      <div class="eyebrow">Trạm Điều Hướng Tin Học TN</div>
      <h1>Chọn quỹ đạo làm bài</h1>
    </section>

    <section class="hub">
      <div class="orbit-map">
        <div class="connector small"></div>
        <div class="connector large"></div>

        <a class="planet-link center" href="tinhoctn.html">
          <div class="planet planet-main">
            <div class="ring"></div>
            <div class="surface"></div>
            <div class="band"></div>
          </div>
          <div class="shadow"></div>
          <div class="label">
            <strong>Hành tinh Tin Học TN</strong>
          </div>
        </a>

        <a class="planet-link satellite-a" href="tinhoctn1.html">
          <div class="planet planet-small">
            <div class="ring"></div>
            <div class="surface"></div>
            <div class="band"></div>
          </div>
          <div class="shadow"></div>
          <div class="label">
            <strong>Bài E1</strong>
          </div>
        </a>

        <a class="planet-link satellite-b" href="tinhoctn2.html">
          <div class="planet planet-small">
            <div class="ring"></div>
            <div class="surface"></div>
            <div class="band"></div>
          </div>
          <div class="shadow"></div>
          <div class="label">
            <strong>Bài E2</strong>
          </div>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
