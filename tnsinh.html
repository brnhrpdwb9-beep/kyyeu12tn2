<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <meta name="theme-color" content="#1a0722" />
  <title>Trạm Tin Học TN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg-1:#0f0414;
      --bg-2:#1a0722;
      --bg-3:#2c1038;
      --bg-4:#451b53;
      --text:#fff4fb;
      --muted:#f1cfe2;
      --planet-1:#ffe9f5;
      --planet-2:#ff9ccc;
      --planet-3:#4a1734;
    }

    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{
      min-height:100%;
      font-family:"Inter",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 14% 16%, rgba(255,168,221,.18), transparent 18%),
        radial-gradient(circle at 86% 14%, rgba(255,126,194,.14), transparent 19%),
        radial-gradient(circle at 50% 80%, rgba(233,158,255,.12), transparent 23%),
        linear-gradient(135deg,var(--bg-1),var(--bg-2) 38%,var(--bg-3) 72%,var(--bg-4));
      overflow-x:hidden;
    }
    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
    }
    body::before{
      background:
        radial-gradient(circle at 12% 24%, rgba(255,210,236,.10) 0 1.4%, transparent 1.8%),
        radial-gradient(circle at 26% 68%, rgba(255,141,200,.08) 0 1.2%, transparent 1.7%),
        radial-gradient(circle at 72% 34%, rgba(255,189,227,.08) 0 1.5%, transparent 1.9%),
        radial-gradient(circle at 82% 74%, rgba(255,122,191,.07) 0 1.3%, transparent 1.8%);
      background-size:260px 260px,340px 340px,300px 300px,380px 380px;
      opacity:.75;
      animation:driftDust 90s linear infinite reverse;
    }
    body::after{
      background:
        radial-gradient(circle at 20% 30%, rgba(255,186,224,.09), transparent 18%),
        radial-gradient(circle at 78% 26%, rgba(255,125,193,.08), transparent 16%),
        radial-gradient(circle at 60% 72%, rgba(244,167,255,.06), transparent 20%);
      filter:blur(26px);
      opacity:.8;
    }

    .universe,.stars,.stars2,.nebula,.dust{position:fixed;inset:0;pointer-events:none;z-index:0}
    .nebula{
      background:
        radial-gradient(circle at 15% 28%, rgba(255,123,196,.22), transparent 14%),
        radial-gradient(circle at 78% 20%, rgba(255,171,222,.16), transparent 16%),
        radial-gradient(circle at 45% 76%, rgba(225,132,255,.14), transparent 18%);
      filter:blur(48px);
      animation:nebulaShift 26s ease-in-out infinite alternate;
    }
    .dust{
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.5), transparent),
        radial-gradient(1px 1px at 24% 66%, rgba(255,176,223,.36), transparent),
        radial-gradient(1px 1px at 48% 42%, rgba(255,255,255,.34), transparent),
        radial-gradient(1px 1px at 60% 74%, rgba(255,131,198,.30), transparent),
        radial-gradient(1px 1px at 82% 30%, rgba(255,255,255,.42), transparent);
      background-size:360px 360px;
      opacity:.65;
      animation:driftDust 70s linear infinite;
    }
    .stars{
      background-image:
        radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.5px 1.5px at 120px 80px, rgba(255,190,228,.9), transparent),
        radial-gradient(2px 2px at 250px 140px, rgba(255,255,255,.9), transparent),
        radial-gradient(1.8px 1.8px at 350px 40px, rgba(225,145,255,.9), transparent),
        radial-gradient(2px 2px at 500px 160px, rgba(255,142,202,.85), transparent);
      background-size:800px 300px;
      animation:driftStars 100s linear infinite;
      opacity:.85;
    }
    .stars2{
      background-image:
        radial-gradient(1.2px 1.2px at 40px 60px, rgba(255,255,255,.85), transparent),
        radial-gradient(1.7px 1.7px at 200px 120px, rgba(255,185,228,.75), transparent),
        radial-gradient(1.2px 1.2px at 420px 40px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.3px 1.3px at 600px 200px, rgba(215,150,255,.8), transparent);
      background-size:900px 380px;
      animation:driftStarsReverse 145s linear infinite;
      opacity:.5;
    }

    .page{
      position:relative;
      z-index:1;
      width:min(100%, 760px);
      margin:0 auto;
      min-height:100vh;
      padding:18px 18px 36px;
    }
    .hero{
      padding:12px 8px 8px;
      text-align:center;
    }
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 14px;
      border-radius:999px;
      background:linear-gradient(145deg, rgba(69,17,53,.62), rgba(31,8,32,.44));
      border:1px solid rgba(255,177,219,.22);
      color:#fff2fb;
      font-size:12px;
      font-weight:800;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 10px 18px rgba(0,0,0,.18),0 0 18px rgba(255,124,194,.10);
    }
    .eyebrow::before{
      content:"";
      width:8px;
      height:8px;
      border-radius:50%;
      background:linear-gradient(135deg,#ffd8ec,#ff71b3);
      box-shadow:0 0 12px rgba(255,128,192,.58);
    }
    h1{
      margin-top:14px;
      font-size:clamp(28px,9vw,44px);
      line-height:1.05;
      letter-spacing:-.03em;
    }

    .constellation{
      position:relative;
      min-height:690px;
      margin-top:18px;
    }
    .constellation-lines{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      overflow:visible;
      pointer-events:none;
      filter:drop-shadow(0 0 14px rgba(255,143,205,.14));
    }
    .constellation-lines path{
      fill:none;
      stroke:rgba(255,210,234,.28);
      stroke-width:1.2;
      stroke-linecap:round;
      stroke-dasharray:4 9;
      animation:constellationFlow 11s linear infinite;
    }
    .constellation-lines circle{
      fill:rgba(255,231,244,.62);
      opacity:.75;
    }

    .planet-link{
      --x:50%;
      --y:50%;
      --size:94px;
      --delay:0s;
      position:absolute;
      left:var(--x);
      top:var(--y);
      transform:translate(-50%,-50%);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      color:inherit;
      text-decoration:none;
      text-align:center;
    }
    .planet-link:hover .planet,
    .planet-link:focus-visible .planet{
      transform:translateY(-8px) scale(1.04);
      box-shadow:inset -24px -28px 36px rgba(0,0,0,.42),inset 10px 10px 20px rgba(255,255,255,.14),0 22px 42px rgba(0,0,0,.32);
    }
    .planet-link:hover .label,
    .planet-link:focus-visible .label{
      color:#fff;
    }
    .planet-link:focus-visible{
      outline:none;
    }

    .planet{
      position:relative;
      width:var(--size);
      height:var(--size);
      border-radius:50%;
      isolation:isolate;
      box-shadow:inset -20px -24px 32px rgba(0,0,0,.44),inset 10px 10px 20px rgba(255,255,255,.12),0 18px 34px rgba(0,0,0,.28);
      background:
        radial-gradient(circle at 28% 24%, rgba(255,255,255,.98), rgba(255,255,255,.20) 14%, transparent 20%),
        radial-gradient(circle at 55% 60%, rgba(255,181,224,.16), transparent 28%),
        linear-gradient(155deg, var(--planet-1) 0%, var(--planet-2) 38%, #bc4f8c 68%, var(--planet-3) 100%);
      transition:transform .35s ease, box-shadow .35s ease;
      animation:planetFloat 6.5s ease-in-out infinite;
      animation-delay:var(--delay);
    }
    .planet::before{
      content:"";
      position:absolute;
      inset:-20%;
      border-radius:50%;
      background:
        radial-gradient(circle, rgba(255,231,244,.92) 0 10%, rgba(255,157,208,.28) 24%, rgba(255,108,183,.14) 42%, transparent 64%),
        radial-gradient(circle, rgba(255,220,239,.18), transparent 72%);
      filter:blur(14px);
      z-index:-2;
      animation:auraPulse 4.8s ease-in-out infinite;
      animation-delay:var(--delay);
    }
    .planet::after{
      content:"";
      position:absolute;
      inset:-8px;
      border-radius:50%;
      border:1px solid rgba(255,227,240,.14);
      box-shadow:0 0 18px rgba(255,131,198,.12), inset 0 0 18px rgba(255,255,255,.05);
    }
    .ring{
      position:absolute;
      left:50%;
      top:50%;
      width:calc(var(--size) + 28px);
      height:calc(var(--size) + 28px);
      border-radius:50%;
      transform:translate(-50%,-50%) rotateX(72deg) rotateY(18deg);
      border:1px solid rgba(255,183,222,.26);
      box-shadow:0 0 16px rgba(255,126,194,.12);
      pointer-events:none;
    }
    .surface{
      position:absolute;
      inset:8%;
      border-radius:50%;
      background:
        radial-gradient(circle at 26% 36%, rgba(255,255,255,.24), transparent 16%),
        radial-gradient(circle at 54% 56%, rgba(80,0,40,.16), transparent 22%),
        radial-gradient(circle at 68% 30%, rgba(255,255,255,.12), transparent 12%),
        linear-gradient(45deg, rgba(255,154,209,.10), rgba(255,103,175,.05));
      mix-blend-mode:screen;
      opacity:.88;
    }
    .band{
      position:absolute;
      left:12%;
      right:12%;
      top:46%;
      height:14%;
      border-radius:999px;
      filter:blur(4px);
      background:linear-gradient(90deg, transparent, rgba(255,153,204,.36), transparent);
    }
    .shadow{
      width:68%;
      height:14px;
      margin-top:-4px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,0,0,.42), transparent 72%);
      filter:blur(10px);
      opacity:.78;
    }
    .label{
      font-size:14px;
      font-weight:800;
      line-height:1.25;
      color:#ffeef7;
      text-shadow:0 2px 16px rgba(34,0,18,.44);
      transition:color .35s ease;
    }

    .p1{--x:18%;--y:22%;--delay:-.2s}
    .p2{--x:50%;--y:12%;--delay:-1s}
    .p3{--x:82%;--y:24%;--delay:-1.8s}
    .p4{--x:26%;--y:48%;--delay:-2.6s}
    .p5{--x:70%;--y:50%;--delay:-3.4s}
    .p6{--x:18%;--y:76%;--delay:-4.2s}
    .p7{--x:58%;--y:82%;--delay:-5s}

    @keyframes planetFloat{
      0%,100%{transform:translateY(0) rotateZ(0deg)}
      50%{transform:translateY(-10px) rotateZ(.5deg)}
    }
    @keyframes auraPulse{
      0%,100%{transform:scale(1);opacity:.72}
      50%{transform:scale(1.08);opacity:1}
    }
    @keyframes driftDust{
      from{transform:translate3d(0,0,0)}
      to{transform:translate3d(-60px,-40px,0)}
    }
    @keyframes driftStars{
      from{transform:translate3d(0,0,0)}
      to{transform:translate3d(-80px,-280px,0)}
    }
    @keyframes driftStarsReverse{
      from{transform:translate3d(0,0,0)}
      to{transform:translate3d(60px,220px,0)}
    }
    @keyframes nebulaShift{
      0%{transform:translate3d(0,0,0) scale(1);opacity:.8}
      100%{transform:translate3d(-2%,2%,0) scale(1.05);opacity:1}
    }
    @keyframes constellationFlow{
      from{stroke-dashoffset:0}
      to{stroke-dashoffset:-130}
    }

    @media (max-width: 680px){
      .page{padding-inline:14px}
      .constellation{min-height:760px}
      .planet-link{--size:88px}
      .p1{--x:16%;--y:18%}
      .p2{--x:54%;--y:10%}
      .p3{--x:84%;--y:24%}
      .p4{--x:28%;--y:40%}
      .p5{--x:72%;--y:48%}
      .p6{--x:18%;--y:68%}
      .p7{--x:58%;--y:82%}
    }

    @media (max-width: 430px){
      .hero{padding-top:8px}
      .constellation{min-height:760px;margin-top:10px}
      .planet-link{--size:78px;gap:8px}
      .label{font-size:13px}
      .p1{--x:18%;--y:17%}
      .p2{--x:56%;--y:11%}
      .p3{--x:83%;--y:24%}
      .p4{--x:29%;--y:38%}
      .p5{--x:72%;--y:47%}
      .p6{--x:19%;--y:64%}
      .p7{--x:58%;--y:79%}
    }
  </style>
</head>
<body>

  </div>

        <circle cx="18" cy="22" r="0.85" />

        <circle cx="58" cy="82" r="0.85" />
      </svg>

      <a class="planet-link p1" href="tinhoctn1.html">
        <div class="planet"><div class="ring"></div><div class="surface"></div><div class="band"></div></div>
        <div class="shadow"></div>
        <div class="label">Bài E1</div>
      </a>

      <a class="planet-link p2" href="tinhoctn2.html">
        <div class="planet"><div class="ring"></div><div class="surface"></div><div class="band"></div></div>
        <div class="shadow"></div>
        <div class="label">Bài E2</div>
      </a>

      <a class="planet-link p3" href="tinhoctn3.html">
        <div class="planet"><div class="ring"></div><div class="surface"></div><div class="band"></div></div>
        <div class="shadow"></div>
        <div class="label">Bài E3</div>
      </a>

      <a class="planet-link p4" href="tinhoctn4.html">
        <div class="planet"><div class="ring"></div><div class="surface"></div><div class="band"></div></div>
        <div class="shadow"></div>
        <div class="label">Bài E4</div>
      </a>

      <a class="planet-link p5" href="tinhoctn5.html">
        <div class="planet"><div class="ring"></div><div class="surface"></div><div class="band"></div></div>

      <a class="planet-link p6" href="tinhoctn6.html">
        <div class="planet"><div class="ring"></div><div class="surface"></div><div class="band"></div></div>
        <div class="shadow"></div>
        <div class="label">Bài E6</div>
      </a>

      <a class="planet-link p7" href="tinhoctn7.html">
        <div class="planet"><div class="ring"></div><div class="surface"></div><div class="band"></div></div>
        <div class="shadow"></div>
        <div class="label">Bài E7</div>
      </a>
    </section>
  </main>
</body>
