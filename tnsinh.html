<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <meta name="theme-color" content="#1a0722" />
  <title>Trạm Tin Học TN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg-1:#02030a;
      --bg-2:#050918;
      --bg-3:#0a1230;
      --bg-4:#130f2d;
      --text:#eef4ff;
      --muted:#aab7df;
      --planet-1:#ffdff6;
      --planet-2:#ff8fd0;
      --planet-3:#59206f;
    }

    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{
      min-height:100%;
      font-family:"Inter",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 15% 18%, rgba(93,126,255,.18), transparent 18%),
        radial-gradient(circle at 82% 16%, rgba(87,226,255,.12), transparent 18%),
        radial-gradient(circle at 50% 76%, rgba(201,105,255,.10), transparent 22%),
        radial-gradient(circle at 48% 50%, rgba(255,255,255,.025), transparent 26%),
        linear-gradient(135deg,var(--bg-1),var(--bg-2) 40%,var(--bg-3) 72%,var(--bg-4));
      overflow-x:hidden;
    }
    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
    }
    body::before{
      background:
        radial-gradient(circle at 12% 24%, rgba(164,193,255,.08) 0 1.4%, transparent 1.8%),
        radial-gradient(circle at 26% 68%, rgba(105,228,255,.07) 0 1.2%, transparent 1.7%),
        radial-gradient(circle at 72% 34%, rgba(225,178,255,.07) 0 1.5%, transparent 1.9%),
        radial-gradient(circle at 82% 74%, rgba(255,205,120,.06) 0 1.3%, transparent 1.8%);
      background-size:260px 260px,340px 340px,300px 300px,380px 380px;
      opacity:.65;
      animation:driftDust 88s linear infinite reverse;
    }
    body::after{
      background:
        radial-gradient(circle at 20% 30%, rgba(120,171,255,.05), transparent 18%),
        radial-gradient(circle at 78% 26%, rgba(255,214,125,.04), transparent 16%),
        radial-gradient(circle at 60% 72%, rgba(178,120,255,.04), transparent 20%);
      filter:blur(26px);
      opacity:.7;
    }

    .universe,.stars,.stars2,.stars3,.nebula,.dust,.nebula-detail,.space-grid{position:fixed;inset:0;pointer-events:none;z-index:0}
    .nebula{
      background:
        radial-gradient(circle at 15% 28%, rgba(82,110,255,.22), transparent 14%),
        radial-gradient(circle at 78% 20%, rgba(84,234,255,.14), transparent 16%),
        radial-gradient(circle at 45% 76%, rgba(192,96,255,.14), transparent 18%),
        radial-gradient(circle at 60% 48%, rgba(255,255,255,.05), transparent 7%);
      filter:blur(60px);
      opacity:.95;
      animation:nebulaShift 24s ease-in-out infinite alternate;
    }
    .dust{
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.45), transparent),
        radial-gradient(1px 1px at 24% 66%, rgba(133,212,255,.38), transparent),
        radial-gradient(1px 1px at 48% 42%, rgba(255,255,255,.34), transparent),
        radial-gradient(1px 1px at 60% 74%, rgba(201,135,255,.30), transparent),
        radial-gradient(1px 1px at 82% 30%, rgba(255,255,255,.42), transparent),
        radial-gradient(1px 1px at 90% 64%, rgba(102,235,255,.28), transparent);
      background-size:360px 360px;
      opacity:.75;
      animation:driftDust 60s linear infinite reverse;
    }
    .nebula-detail{
      inset:-10%;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.04), transparent 1.2%),
        radial-gradient(circle at 40% 72%, rgba(255,255,255,.03), transparent 1.4%),
        radial-gradient(circle at 70% 40%, rgba(103,231,255,.05), transparent 1.8%),
        radial-gradient(circle at 82% 60%, rgba(198,121,255,.05), transparent 1.6%);
      background-size:520px 520px,640px 640px,780px 780px,840px 840px;
      opacity:.65;
      filter:blur(2px);
      animation:driftDust 48s linear infinite;
    }
    .space-grid{
      background:
        linear-gradient(rgba(130,170,255,.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(130,170,255,.045) 1px, transparent 1px);
      background-size:90px 90px;
      mask-image:radial-gradient(circle at center, rgba(0,0,0,.9), transparent 88%);
      -webkit-mask-image:radial-gradient(circle at center, rgba(0,0,0,.9), transparent 88%);
      opacity:.28;
      transform:perspective(1200px) rotateX(78deg) scale(1.8) translateY(16%);
    }
    .stars{
      background-image:
        radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.5px 1.5px at 120px 80px, rgba(130,190,255,.95), transparent),
        radial-gradient(2px 2px at 250px 140px, rgba(255,255,255,.9), transparent),
        radial-gradient(1.8px 1.8px at 350px 40px, rgba(178,125,255,.95), transparent),
        radial-gradient(2px 2px at 500px 160px, rgba(97,231,255,.95), transparent),
        radial-gradient(1.5px 1.5px at 700px 60px, rgba(255,255,255,.85), transparent);
      background-size:800px 300px;
      animation:driftStars 90s linear infinite;
      opacity:.95;
    }
    .stars2{
      background-image:
        radial-gradient(1.2px 1.2px at 40px 60px, rgba(255,255,255,.85), transparent),
        radial-gradient(1.7px 1.7px at 200px 120px, rgba(97,231,255,.75), transparent),
        radial-gradient(1.2px 1.2px at 420px 40px, rgba(255,255,255,.95), transparent),
        radial-gradient(1.3px 1.3px at 600px 200px, rgba(170,140,255,.8), transparent),
        radial-gradient(1.5px 1.5px at 760px 100px, rgba(255,255,255,.8), transparent);
      background-size:900px 380px;
      animation:driftStarsReverse 130s linear infinite;
      opacity:.7;
    }
    .stars3{
      background-image:
        radial-gradient(3px 3px at 100px 90px, rgba(255,255,255,.9), transparent),
        radial-gradient(2.5px 2.5px at 500px 60px, rgba(97,231,255,.9), transparent),
        radial-gradient(3px 3px at 780px 170px, rgba(186,122,255,.85), transparent);
      background-size:1000px 420px;
      animation:twinkle 5s ease-in-out infinite alternate;
      opacity:.9;
    }

    .page{
      position:relative;
      z-index:1;
      width:min(100%, 760px);
      margin:0 auto;
      min-height:100vh;
      padding:18px 18px 36px;
    }
    .hero{
      padding:12px 8px 8px;
      text-align:center;
    }
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 14px;
      border-radius:999px;
      background:linear-gradient(145deg, rgba(69,17,53,.62), rgba(31,8,32,.44));
      border:1px solid rgba(255,177,219,.22);
      color:#dbe8ff;
      font-size:12px;
      font-weight:800;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 10px 18px rgba(0,0,0,.18),0 0 18px rgba(103,232,255,.12);
    }
    .eyebrow::before{
      content:"";
      width:8px;
      height:8px;
      border-radius:50%;
      background:linear-gradient(135deg,#66dcff,#cb7bff);
      box-shadow:0 0 14px rgba(103,232,255,.8);
    }
    h1{
      margin-top:14px;
      font-size:clamp(28px,9vw,44px);
      line-height:1.05;
      letter-spacing:-.03em;
    }

    .constellation{
      position:relative;
      min-height:690px;
      margin-top:18px;
    }

    .planet-link{
      --x:50%;
      --y:50%;
      --size:94px;
      --delay:0s;
      position:absolute;
      left:var(--x);
      top:var(--y);
      transform:translate(-50%,-50%);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      color:inherit;
      text-decoration:none;
      text-align:center;
    }
    .planet-link:hover .planet,
    .planet-link:focus-visible .planet{
      transform:translateY(-8px) scale(1.04);
      box-shadow:inset -24px -28px 36px rgba(0,0,0,.42),inset 10px 10px 20px rgba(255,255,255,.14),0 22px 42px rgba(0,0,0,.32);
    }
    .planet-link:hover .label,
    .planet-link:focus-visible .label{
      color:#fff;
    }
    .planet-link:focus-visible{
      outline:none;
    }

    .planet{
      position:relative;
      width:var(--size);
      height:var(--size);
      border-radius:50%;
      isolation:isolate;
      box-shadow:inset -20px -24px 32px rgba(0,0,0,.44),inset 10px 10px 20px rgba(255,255,255,.12),0 18px 34px rgba(0,0,0,.28),0 0 26px rgba(128,209,255,.12);
      background:
        radial-gradient(circle at 28% 24%, rgba(255,255,255,.98), rgba(255,255,255,.20) 14%, transparent 20%),
        radial-gradient(circle at 55% 60%, rgba(255,181,224,.16), transparent 28%),
        linear-gradient(155deg, var(--planet-1) 0%, var(--planet-2) 38%, #bc4f8c 68%, var(--planet-3) 100%);
      transition:transform .35s ease, box-shadow .35s ease;
      animation:planetFloat 6.5s ease-in-out infinite;
      animation-delay:var(--delay);
    }
    .planet::before{
      content:"";
      position:absolute;
      inset:-20%;
      border-radius:50%;
      background:
        radial-gradient(circle, rgba(235,244,255,.92) 0 10%, rgba(133,217,255,.22) 24%, rgba(196,124,255,.16) 42%, transparent 64%),
        radial-gradient(circle, rgba(214,232,255,.18), transparent 72%);
      filter:blur(14px);
      z-index:-2;
      animation:auraPulse 4.8s ease-in-out infinite;
      animation-delay:var(--delay);
    }
    .planet::after{
      content:"";
      position:absolute;
      inset:-8px;
      border-radius:50%;
      border:1px solid rgba(225,238,255,.14);
      box-shadow:0 0 18px rgba(103,220,255,.12), inset 0 0 18px rgba(255,255,255,.05);
    }
    .ring{
      position:absolute;
      left:50%;
      top:50%;
      width:calc(var(--size) + 28px);
      height:calc(var(--size) + 28px);
      border-radius:50%;
      transform:translate(-50%,-50%) rotateX(72deg) rotateY(18deg);
      border:1px solid rgba(174,219,255,.24);
      box-shadow:0 0 16px rgba(103,220,255,.12);
      pointer-events:none;
    }
    .surface{
      position:absolute;
      inset:8%;
      border-radius:50%;
      background:
        radial-gradient(circle at 26% 36%, rgba(255,255,255,.24), transparent 16%),
        radial-gradient(circle at 54% 56%, rgba(80,0,40,.16), transparent 22%),
        radial-gradient(circle at 68% 30%, rgba(255,255,255,.12), transparent 12%),
        linear-gradient(45deg, rgba(255,154,209,.10), rgba(255,103,175,.05));
      mix-blend-mode:screen;
      opacity:.88;
    }
    .band{
      position:absolute;
      left:12%;
      right:12%;
      top:46%;
      height:14%;
      border-radius:999px;
      filter:blur(4px);
      background:linear-gradient(90deg, transparent, rgba(255,153,204,.36), transparent);
    }
    .shadow{
      width:68%;
      height:14px;
      margin-top:-4px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,0,0,.42), transparent 72%);
      filter:blur(10px);
      opacity:.78;
    }
    .label{
      font-size:14px;
      font-weight:800;
      line-height:1.25;
      color:#eff6ff;
      text-shadow:0 2px 18px rgba(10,18,54,.58);
      transition:color .35s ease;
    }

    .p1{--x:14%;--y:20%;--delay:-.2s}
    .p2{--x:62%;--y:11%;--delay:-1s}
    .p3{--x:87%;--y:31%;--delay:-1.8s}
    .p4{--x:33%;--y:38%;--delay:-2.6s}
    .p5{--x:74%;--y:57%;--delay:-3.4s}
    .p6{--x:17%;--y:70%;--delay:-4.2s}
    .p7{--x:49%;--y:83%;--delay:-5s}

    @keyframes planetFloat{
      0%,100%{transform:translateY(0) rotateZ(0deg)}
      50%{transform:translateY(-10px) rotateZ(.5deg)}
    }
    @keyframes auraPulse{
      0%,100%{transform:scale(1);opacity:.72}
      50%{transform:scale(1.08);opacity:1}
    }
    @keyframes driftDust{
      from{transform:translate3d(0,0,0)}
      to{transform:translate3d(-60px,-40px,0)}
    }
    @keyframes driftStars{
      from{transform:translate3d(0,0,0)}
      to{transform:translate3d(-80px,-280px,0)}
    }
    @keyframes driftStarsReverse{
      from{transform:translate3d(0,0,0)}
      to{transform:translate3d(60px,220px,0)}
    }
    @keyframes twinkle{
      0%{opacity:.35;transform:scale(1)}
      100%{opacity:1;transform:scale(1.03)}
    }
    @keyframes nebulaShift{
      0%{transform:translate3d(0,0,0) scale(1);opacity:.8}
      100%{transform:translate3d(-2%,2%,0) scale(1.05);opacity:1}
    }
    @media (max-width: 680px){
      .page{padding-inline:14px}
      .constellation{min-height:760px}
      .planet-link{--size:88px}
      .p1{--x:14%;--y:17%}
      .p2{--x:64%;--y:11%}
      .p3{--x:86%;--y:28%}
      .p4{--x:34%;--y:39%}
      .p5{--x:74%;--y:55%}
      .p6{--x:16%;--y:65%}
      .p7{--x:50%;--y:81%}
    }

    @media (max-width: 430px){
      .hero{padding-top:8px}
      .constellation{min-height:760px;margin-top:10px}
      .planet-link{--size:78px;gap:8px}
      .label{font-size:13px}
      .p1{--x:15%;--y:16%}
      .p2{--x:66%;--y:10%}
      .p3{--x:85%;--y:27%}
      .p4{--x:35%;--y:39%}
      .p5{--x:75%;--y:54%}
      .p6{--x:17%;--y:64%}
      .p7{--x:50%;--y:79%}
    }
  </style>
</head>
<body>
  <div class="universe">
    <div class="nebula"></div>
    <div class="nebula-detail"></div>
    <div class="space-grid"></div>
    <div class="dust"></div>
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="stars3"></div>
  </div>

  <main class="page">
    <section class="hero">
      <div class="eyebrow">Trạm Điều Hướng Tin Học TN</div>
      <h1>Chọn bài để bắt đầu</h1>
    </section>

    <section class="constellation" aria-label="Danh sách 7 bài Tin Học TN">
      <a class="planet-link p1" href="tinhoctn1.html">
        <div class="planet"><div class="ring"></div><div class="surface"></div><div class="band"></div></div>
        <div class="shadow"></div>
        <div class="label">Bài 1</div>
      </a>

      <a class="planet-link p2" href="tinhoctn2.html">
        <div class="planet"><div class="ring"></div><div class="surface"></div><div class="band"></div></div>
        <div class="shadow"></div>
        <div class="label">Bài 2</div>
      </a>

      <a class="planet-link p3" href="tinhoctn3.html">
        <div class="planet"><div class="ring"></div><div class="surface"></div><div class="band"></div></div>
        <div class="shadow"></div>
        <div class="label">Bài 3</div>
      </a>

      <a class="planet-link p4" href="tinhoctn4.html">
        <div class="planet"><div class="ring"></div><div class="surface"></div><div class="band"></div></div>
        <div class="shadow"></div>
        <div class="label">Bài 4</div>
      </a>

      <a class="planet-link p5" href="tinhoctn5.html">
        <div class="planet"><div class="ring"></div><div class="surface"></div><div class="band"></div></div>
        <div class="shadow"></div>
        <div class="label">Bài 5</div>
      </a>

      <a class="planet-link p6" href="tinhoctn6.html">
        <div class="planet"><div class="ring"></div><div class="surface"></div><div class="band"></div></div>
        <div class="shadow"></div>
        <div class="label">Bài 6</div>
      </a>

      <a class="planet-link p7" href="tinhoctn7.html">
        <div class="planet"><div class="ring"></div><div class="surface"></div><div class="band"></div></div>
        <div class="shadow"></div>
        <div class="label">Bài 7</div>
      </a>
    </section>
  </main>
</body>
</html>
